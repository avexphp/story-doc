          event.preventDefault();
          els.canvasWrap.classList.remove('drag-active');
          return;
        }
        if (app.suppressInternalDrop) {
          event.preventDefault();
          app.suppressInternalDrop = false;
          return;
        }
        event.preventDefault();
        els.canvasWrap.classList.remove('drag-active');
        await handleDroppedResources(event);
      });

      els.canvasWrap.addEventListener('dragend', () => {
        app.suppressInternalDrop = false;
      });

      els.canvasWrap.addEventListener('contextmenu', (event) => {
        if (app.mode !== 'edit') return;
        if (event.target.closest('.element')) return;
        event.preventDefault();
        event.stopPropagation();

        if (!page) return;

          { label: 'Insert Page After', onSelect: () => createPage() },
          { label: 'Duplicate Page', onSelect: () => duplicatePageById(page.id) },
          {
            label: 'Delete Page',
            danger: true,
            disabled: app.document.storyBook.pageOrder.length <= 1,
            onSelect: () => deletePageById(page.id)
          },
          { separator: true },
          { label: 'Add Text', onSelect: () => addElementFromCanvas('text', point.x, point.y) },
          { label: 'Add Image URL', onSelect: () => addElementFromCanvas('image', point.x, point.y) },
          { label: 'Add Video URL', onSelect: () => addElementFromCanvas('video', point.x, point.y) },
          { label: 'Add Audio URL', onSelect: () => addElementFromCanvas('audio', point.x, point.y) },
          { label: 'Add Embedded Image', onSelect: () => addElementFromCanvas('embedded-image', point.x, point.y) }
        ]);
      });

      window.addEventListener('click', () => hideContextMenu());
      window.addEventListener('blur', () => hideContextMenu());
      window.addEventListener('resize', () => hideContextMenu());

      window.addEventListener('dragover', (event) => {
        if (!hasDroppedResourcePayload(event.dataTransfer)) return;
        if (els.canvasWrap.contains(event.target)) return;
        event.preventDefault();
      });

      window.addEventListener('drop', (event) => {
        if (!hasDroppedResourcePayload(event.dataTransfer)) return;
        if (els.canvasWrap.contains(event.target)) return;
        event.preventDefault();
      });

      const liveSyncInputs = [
        els.bookTitle,
        els.pageName,
        els.elementContent,
        els.elementFontWeight,
        els.elementFontFamily,
        els.elementTextAlign,
        els.elementFontColor,
        els.elementBackgroundColor
      ];
      const commitSyncInputs = [
        els.bookWidth,
        els.bookHeight,
        els.bookImagePath,
        els.bookDropMode,
        els.pageWidth,
        els.pageHeight,
        els.pageImagePath,
        els.elementX,
        els.elementY,
        els.elementW,
        els.elementH,
        els.elementRotation,
        els.elementFontSize,
        els.elementLineHeight
      ];

      for (const input of [...liveSyncInputs, ...commitSyncInputs]) {
        input.addEventListener('focus', () => {
          if (app.mode === 'edit') captureHistory();
        });
      }

      for (const input of liveSyncInputs) {
        input.addEventListener('input', syncDocFromInspector);
      }

      for (const input of commitSyncInputs) {
        input.addEventListener('change', syncDocFromInspector);
      }

      if (els.elementBackgroundTransparent) {
        els.elementBackgroundTransparent.addEventListener('focus', () => {
          if (app.mode === 'edit') captureHistory();
        });
        els.elementBackgroundTransparent.addEventListener('change', syncDocFromInspector);
      }

      for (const input of [els.elementControls, els.elementAutoplay, els.elementLoop]) {
        input.addEventListener('focus', () => {
          if (app.mode === 'edit') captureHistory();
        });
        input.addEventListener('change', syncDocFromInspector);
      }

      // Any button clicked with a pointer keeps DOM focus afterwards. That is invisible while
      // the browser is in mouse modality, but the next key press — Escape, typically — flips it
      // to keyboard modality and :focus-visible lights up a control the user has already moved
      // on from. Applied to every button rather than per button, because the symptom simply
      // moves to whichever one was clicked last.
      //
      // event.detail is 0 when a button is activated by Enter or Space, and non-zero for a real
      // click, so keyboard users keep the focus ring they need to navigate by.
      //

      // focused is a no-op, so running early is safe even when a handler moves focus itself.
      document.addEventListener('click', (event) => {
        if (event.detail === 0) return;

        const button = target && typeof target.closest === 'function' ? target.closest('button') : null;
        if (button) button.blur();
      }, true);

        event.preventDefault();

      });

      window.addEventListener('keydown', (event) => {
        const reviewOpen = els.dropReviewModal && !els.dropReviewModal.classList.contains('hidden');
        if (reviewOpen) {
          if (event.key === 'Escape') {
            event.preventDefault();
            resolveDropReview(false);
          }
          if ((event.ctrlKey || event.metaKey) && event.key === 'Enter') {
            event.preventDefault();
            resolveDropReview(true);
          }
          return;
        }
        if (event.target && (event.target.tagName === 'INPUT' || event.target.tagName === 'TEXTAREA')) return;

        // Zoom shortcuts follow the universal convention (browsers, Figma, VS Code). They are
        // deliberately allowed in view mode too, since zoom is a viewing concern, but not while
        // a text element is being edited: the INPUT/TEXTAREA guard above does not cover the
        // canvas editor, which is contenteditable.
        if ((event.ctrlKey || event.metaKey) && !event.altKey && !app.editingElementId) {
          const zoomInKey = event.key === '=' || event.key === '+' || event.code === 'NumpadAdd';
          const zoomOutKey = event.key === '-' || event.key === '_' || event.code === 'NumpadSubtract';
          const zoomResetKey = event.key === '0' || event.code === 'Numpad0';
          if (zoomInKey || zoomOutKey || zoomResetKey) {
            // preventDefault stops the browser's own zoom from firing alongside ours.
            event.preventDefault();
            if (zoomInKey) setZoom(app.zoom + 0.1);
            else if (zoomOutKey) setZoom(app.zoom - 0.1);
            else setZoom(1);
            // Surfaced here because panning has no button to advertise it.
            const zoomLabel = `Zoom ${Math.round(app.zoom * 100)}%`;
            if (!canvasCanScroll()) {
              els.statusText.textContent = zoomLabel;
            } else if (app.mode === 'view') {
              els.statusText.textContent = `${zoomLabel} · Arrow keys pan the overflowing axis, and change page on the other`;
            } else {
              els.statusText.textContent = `${zoomLabel} · Arrow keys pan when nothing is selected`;
            }
            return;
          }
        }

        const moveStep = event.shiftKey ? 10 : 1;
        const resizeStep = event.shiftKey ? 10 : 1;
        if (event.key === 'Delete') {
          if (getCurrentElement() && app.mode === 'edit') deleteSelectedElement();
        }
        if ((event.ctrlKey || event.metaKey) && !event.altKey && event.key === 'ArrowLeft') {
          event.preventDefault();
          resizeSelectedElement(-resizeStep, 0);
        }
        if ((event.ctrlKey || event.metaKey) && !event.altKey && event.key === 'ArrowRight') {
          event.preventDefault();
          resizeSelectedElement(resizeStep, 0);
        }
        if ((event.ctrlKey || event.metaKey) && !event.altKey && event.key === 'ArrowUp') {
          event.preventDefault();
          resizeSelectedElement(0, -resizeStep);
        }
        if ((event.ctrlKey || event.metaKey) && !event.altKey && event.key === 'ArrowDown') {
          event.preventDefault();
          resizeSelectedElement(0, resizeStep);
        }
        if (event.altKey && event.shiftKey && !event.ctrlKey && !event.metaKey && event.key === 'ArrowLeft') {
          event.preventDefault();
          resizeSelectedElement(-resizeStep, 0);
        }
        if (event.altKey && event.shiftKey && !event.ctrlKey && !event.metaKey && event.key === 'ArrowRight') {
          event.preventDefault();
          resizeSelectedElement(resizeStep, 0);
        }
        if (event.altKey && event.shiftKey && !event.ctrlKey && !event.metaKey && event.key === 'ArrowUp') {
          event.preventDefault();
          resizeSelectedElement(0, -resizeStep);
        }
        if (event.altKey && event.shiftKey && !event.ctrlKey && !event.metaKey && event.key === 'ArrowDown') {
          event.preventDefault();
          resizeSelectedElement(0, resizeStep);
        }
        // With nothing selected there is no element to nudge, so the arrows pan the canvas
        // instead. This branch must precede the nudge handlers below and return, or they
        // would swallow the keys on their way to doing nothing.
        if (app.mode === 'edit'
          && !event.altKey && !event.ctrlKey && !event.metaKey
          && !app.editingElementId
          && !getCurrentElement()
          && (event.key === 'ArrowLeft' || event.key === 'ArrowRight'
            || event.key === 'ArrowUp' || event.key === 'ArrowDown')) {
          event.preventDefault();
          panCanvas(event.key, event.shiftKey);
          return;
        }
        if (app.mode === 'edit' && !event.altKey && !event.ctrlKey && !event.metaKey && event.key === 'ArrowLeft') {
          event.preventDefault();
          nudgeSelectedElement(-moveStep, 0);
        }
        if (app.mode === 'edit' && !event.altKey && !event.ctrlKey && !event.metaKey && event.key === 'ArrowRight') {
          event.preventDefault();
          nudgeSelectedElement(moveStep, 0);
        }
        if (app.mode === 'edit' && !event.altKey && !event.ctrlKey && !event.metaKey && event.key === 'ArrowUp') {
          event.preventDefault();
          nudgeSelectedElement(0, -moveStep);
        }
        if (app.mode === 'edit' && !event.altKey && !event.ctrlKey && !event.metaKey && event.key === 'ArrowDown') {
          event.preventDefault();
          nudgeSelectedElement(0, moveStep);
        }
        // View mode: each arrow pair decides for itself. An axis that overflows the viewport
        // has somewhere to pan, so the arrows along it move the page; an axis that fits has
        // nothing to pan, so they turn the page instead. Up/Down page as well as Left/Right,
        // so the book reads the same whichever pair the reader reaches for. Overflow, not
        // scroll position, is the test: an arrow must not change meaning at the edge of a pan.
        if (app.mode === 'view'
          && !event.altKey && !event.ctrlKey && !event.metaKey
          && !app.editingElementId
          && (event.key === 'ArrowLeft' || event.key === 'ArrowRight'
            || event.key === 'ArrowUp' || event.key === 'ArrowDown')) {
          event.preventDefault();
          const horizontal = event.key === 'ArrowLeft' || event.key === 'ArrowRight';
          if (canvasAxisOverflows(horizontal ? 'x' : 'y')) {
            panCanvas(event.key, event.shiftKey);
          } else {
            navigatePage(event.key === 'ArrowLeft' || event.key === 'ArrowUp' ? -1 : 1);
          }
          return;
        }
        // Select every page. Scoped to the page list rather than the canvas, which has no
        // multi-selection of its own; the browser's own select-all is suppressed either way.
        if ((event.ctrlKey || event.metaKey) && !event.altKey && event.key.toLowerCase() === 'a'
          && app.mode === 'edit' && !app.editingElementId) {
          event.preventDefault();
          selectAllPages();
          renderAll();
          els.statusText.textContent = `Selected ${getSelectedPageIds().length} pages`;
          return;
        }
        if ((event.ctrlKey || event.metaKey) && event.key.toLowerCase() === 'c') {
          event.preventDefault();
          copySelectedElement();
        }
        if ((event.ctrlKey || event.metaKey) && event.key.toLowerCase() === 'v') {
          event.preventDefault();
          pasteClipboardElement();
        }
        if ((event.ctrlKey || event.metaKey) && event.key.toLowerCase() === 'd') {
          event.preventDefault();
          if (app.mode === 'edit') duplicateSelectedElement();
        }
        if ((event.ctrlKey || event.metaKey) && !event.shiftKey && event.key.toLowerCase() === 'z') {
          event.preventDefault();
          undoHistory();
        }
        if (!event.altKey && !event.ctrlKey && !event.metaKey && event.key === 'PageUp') {
          event.preventDefault();
          navigatePage(-1);
        }
        if (!event.altKey && !event.ctrlKey && !event.metaKey && event.key === 'PageDown') {
          event.preventDefault();
          navigatePage(1);
        }
        if (((event.ctrlKey || event.metaKey) && event.key.toLowerCase() === 'y') || ((event.ctrlKey || event.metaKey) && event.shiftKey && event.key.toLowerCase() === 'z')) {
          event.preventDefault();
          redoHistory();
        }
        if (event.altKey && !event.shiftKey && event.key === 'ArrowUp') {
          event.preventDefault();
          moveCurrentPage(-1);
        }
        if (event.altKey && !event.shiftKey && event.key === 'ArrowDown') {
          event.preventDefault();
          moveCurrentPage(1);
        }
        if (event.altKey && !event.shiftKey && !event.ctrlKey && !event.metaKey && event.key === '[') {
          event.preventDefault();
          rotateSelectedElement(-1);
        }
        if (event.altKey && !event.shiftKey && !event.ctrlKey && !event.metaKey && event.key === ']') {
          event.preventDefault();
          rotateSelectedElement(1);
        }
        if ((event.ctrlKey || event.metaKey) && event.shiftKey && event.key.toLowerCase() === 's') {
          event.preventDefault();
          void saveBook({ forcePicker: true });
          return;
        }
        if ((event.ctrlKey || event.metaKey) && event.key.toLowerCase() === 's') {
          event.preventDefault();
          buttons.saveBook.click();
        }
        if ((event.ctrlKey || event.metaKey) && event.shiftKey && event.key === ']') {
          event.preventDefault();
          bringSelectedElementToFront();
        }
        if ((event.ctrlKey || event.metaKey) && event.shiftKey && event.key === '[') {
          event.preventDefault();
          sendSelectedElementToBack();
        }
        if (event.key === '+') setZoom(app.zoom + 0.1);
        if (event.key === '-') setZoom(app.zoom - 0.1);
        if (!event.altKey && !event.ctrlKey && !event.metaKey && event.key.toLowerCase() === 'f') {
          event.preventDefault();
          toggleFullScreenMode();
        }
        if (event.key === 'Escape') {
          if (els.contextMenu && !els.contextMenu.classList.contains('hidden')) {
            event.preventDefault();
            hideContextMenu();
            return;
          }
          if (app.fullscreen) {
            event.preventDefault();
            setFullScreenMode(false);
            return;
          }
          // Collapses a multi-selection back to the page on the canvas, before falling through
          // to clearing the element selection. Escape undoes the most recent widening first.
          if (getSelectedPageIds().length > 1) {
            event.preventDefault();
            setPageSelection([app.currentPageId], { current: app.currentPageId });
            renderAll();
            return;
          }
          app.selectedElementId = null;
          app.editingElementId = null;
          renderAll();
        }
      });

      const initialPayload = parseEmbeddedPayload(document.getElementById(PAYLOAD_ID)?.textContent);
      loadDocument(initialPayload || blankDocument());
      setMode(app.document.appState?.mode || 'edit');
      setZoom(Number(app.document.appState?.zoom) || 1);
      renderAll();
    })();
  </script>


</body></html>
