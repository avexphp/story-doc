<!doctype html>
<html lang="en"><head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>First - Story Book Editor</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #0f172a;
      --panel: #111827;
      --panel-2: #1f2937;
      --surface: #f8fafc;
      --surface-2: #e2e8f0;
      --text: #e5e7eb;
      --text-muted: #94a3b8;
      --ink: #0f172a;
      --border: #334155;
      --accent: #f97316;
      --accent-2: #fb923c;
      --shadow: 0 20px 40px rgba(15, 23, 42, 0.22);
      --radius: 16px;
      --radius-sm: 10px;
    }

    * { box-sizing: border-box; }
    html, body {
      height: 100%;
      margin: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(249, 115, 22, 0.16), transparent 28%),
        radial-gradient(circle at bottom right, rgba(59, 130, 246, 0.12), transparent 26%),
        linear-gradient(180deg, #0b1120, #111827 30%, #0f172a);
      color: var(--text);
    }

    button, input, textarea, select {
      font: inherit;
    }

    button {
      border: 1px solid transparent;
      background: var(--panel-2);
      color: var(--text);
      border-radius: 10px;
      padding: 0.6rem 0.85rem;
      cursor: pointer;
      transition: transform 0.12s ease, background 0.12s ease, border-color 0.12s ease;
    }

    button:hover { transform: translateY(-1px); border-color: rgba(255,255,255,0.1); }
    button:active { transform: translateY(0); }
    button.primary { background: linear-gradient(180deg, var(--accent), #ea580c); color: white; }
    button.ghost { background: transparent; border-color: var(--border); }
    /* Toggle state uses a ring drawn with box-shadow, leaving `outline` free for focus so the
       two never compete for the same property. */
    button.active { box-shadow: 0 0 0 2px rgba(249, 115, 22, 0.55); }

    /* Without this the browser draws its own focus ring, which is white on a dark background
       and easily mistaken for a stuck toggle. It appears on Escape rather than on click
       because a key press switches the browser into keyboard modality, at which point
       :focus-visible starts matching the button that the click had already focused. */
    button:focus-visible,
    input:focus-visible,
    select:focus-visible,
    textarea:focus-visible {
      outline: 2px solid rgba(96, 165, 250, 0.9);
      outline-offset: 1px;
    }
    button.danger { background: #7f1d1d; }
    button.small { padding: 0.45rem 0.65rem; font-size: 0.92rem; }

    input[type="text"], input[type="number"], textarea, select {
      width: 100%;
      border: 1px solid var(--border);
      background: #0b1220;
      color: var(--text);
      border-radius: 10px;
      padding: 0.55rem 0.7rem;
    }

    textarea { min-height: 7rem; resize: vertical; }

    .app {
      height: 100%;
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 12px;
      padding: 12px;
    }

    /* Row track must match .app's three children. This was `1fr auto` back when full screen
       hid the toolbar entirely and only the workspace and status bar remained; with the bar
       now visible the toolbar took the 1fr row and swallowed a quarter of the viewport. */
    .app.fullscreen-mode {
      grid-template-rows: auto 1fr auto;
      gap: 0;
      padding: 0;
    }

    /* Full screen hides the authoring groups within the toolbar rather than the whole bar, so
       the view controls stay present in both modes and need no duplicate buttons. */
    .app.fullscreen-mode .toolbar-group.authoring {
      display: none;
    }

    .app.fullscreen-mode .canvas-title-bar {
      display: none;
    }

    .app.fullscreen-mode .workspace {
      grid-template-columns: 1fr;
      gap: 0;
      padding: 0;
    }

    .app.fullscreen-mode .workspace > aside {
      display: none;
    }

    .app.fullscreen-mode .canvas-panel {
      border-radius: 0;
      border: none;
      min-height: 0;
      box-shadow: none;
    }

    .app.fullscreen-mode .canvas-wrap {
      border-radius: 0;
    }

    .toolbar, .statusbar, .panel {
      background: rgba(15, 23, 42, 0.82);
      backdrop-filter: blur(14px);
      border: 1px solid rgba(148, 163, 184, 0.2);
      box-shadow: var(--shadow);
    }

    .toolbar {
      border-radius: 18px;
      padding: 12px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      justify-content: space-between;
    }

    .toolbar-group {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    /* A pure spacing container. It used to carry its own fill, border and radius, which put a
       third bordered box around every 36px icon and drew sub-groups with the same border colour
       as the toolbar itself, flattening the hierarchy. Grouping is proximity plus one hairline. */
    .icon-cluster {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    /* Wider than the 6px gap inside a cluster, so proximity alone reads as grouping. */
    .toolbar-group .icon-cluster + .icon-cluster {
      position: relative;
      margin-left: 12px;
    }

    /* The single boundary cue now that clusters have no pill of their own.
       Two properties space adjacent clusters: the group's own `gap: 8px` plus the
       `margin-left: 12px` above, so the real gap is 20px, not 12px. The line is therefore
       centred at -10px; -10.5px accounts for its own 1px width so the stroke straddles that
       centre rather than starting at it. */
    .toolbar-group .icon-cluster + .icon-cluster::before {
      content: '';
      position: absolute;
      left: -10.5px;
      top: 7px;
      bottom: 7px;
      width: 1px;
      background: rgba(148, 163, 184, 0.28);
    }

    .icon-btn {
      width: 36px;
      height: 36px;
      padding: 0;
      display: inline-grid;
      place-items: center;
      border-radius: 9px;
      background: rgba(15, 23, 42, 0.5);
      border-color: rgba(148, 163, 184, 0.28);
    }

    .icon-btn svg {
      width: 17px;
      height: 17px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      pointer-events: none;
    }

    /* Hover lifts the background only. The generic button:hover tints the border white, which
       on an icon button reads as a highlight and is easily confused with the toggled state. */
    .icon-btn:hover {
      background: rgba(51, 65, 85, 0.92);
      border-color: rgba(148, 163, 184, 0.5);
    }

    .icon-btn:disabled {
      opacity: 0.45;
    }

    .icon-btn.zoom-btn {
      width: 32px;
      height: 32px;
    }

    .icon-btn.zoom-btn svg {
      width: 16px;
      height: 16px;
    }

    .icon-btn svg.fill {
      fill: currentColor;
      stroke: none;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    .brand {
      display: flex;
      flex-direction: column;
      gap: 2px;
      margin-right: 8px;
    }

    .brand strong { font-size: 1rem; }
    .brand span { font-size: 0.82rem; color: var(--text-muted); }

    .workspace {
      display: grid;
      grid-template-columns: 250px 1fr 290px;
      gap: 12px;
      min-height: 0;
    }

    .panel {
      border-radius: 18px;
      padding: 12px;
      min-height: 0;
      overflow: auto;
    }

    /* Scope sections: Element, Page, Document, Assets. Each collapses so the panel can be
       narrowed to whatever the user is actually working on. */
    .prop-section {
      border: 1px solid rgba(148, 163, 184, 0.18);
      border-radius: 12px;
      background: rgba(30, 41, 59, 0.32);
      margin-bottom: 10px;
      overflow: hidden;
    }

    .prop-section-header {
      display: flex;
      align-items: baseline;
      gap: 8px;
      width: 100%;
      margin: 0;
      padding: 9px 10px;
      border: none;
      border-radius: 0;
      background: rgba(15, 23, 42, 0.5);
      color: #e2e8f0;
      text-align: left;
      cursor: pointer;
    }

    .prop-section-header:hover {
      background: rgba(51, 65, 85, 0.6);
    }

    .prop-twisty {
      flex: 0 0 auto;
      width: 12px;
      font-size: 0.7rem;
      color: #94a3b8;
    }

    .prop-scope {
      flex: 0 0 auto;
      font-size: 0.76rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    /* Says which page or element the section currently refers to. */
    .prop-context {
      flex: 1 1 auto;
      min-width: 0;
      font-size: 0.78rem;
      font-weight: 500;
      color: #94a3b8;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .prop-section-body {
      padding: 10px;
    }

    .prop-section.collapsed .prop-section-body {
      display: none;
    }

    /* Actions sit above the fields: what you can do, then what it is. */
    .prop-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      padding-bottom: 10px;
      margin-bottom: 10px;
      border-bottom: 1px solid rgba(148, 163, 184, 0.18);
    }

    .prop-empty {
      font-size: 0.82rem;
      color: var(--text-muted);
    }

    /* Compact field metrics, borrowed from the drop review dialog, which is already proven
       comfortable in this app. Scoped to the properties panel so dialogs and the inline
       rename editor keep their own sizing. */
    .inspector .field {
      gap: 4px;
      margin-bottom: 6px;
    }

    .inspector .field label {
      font-size: 0.8rem;
    }

    .inspector .field-grid {
      gap: 8px;
    }

    .inspector .field input[type="text"],
    .inspector .field input[type="number"],
    .inspector .field select {
      min-height: 32px;
      font-size: 0.8rem;
      padding: 5px 8px;
    }

    .inspector .field textarea {
      font-size: 0.8rem;
      padding: 5px 8px;
    }

    /* A URL needs one line, not seven. The tall box is only right for text content, so the
       height follows the selected element's type. */
    .inspector .field textarea.content-compact {
      min-height: 2.6rem;
    }

    .panel h2, .panel h3 {
      margin: 0 0 12px;
      font-size: 0.95rem;
      letter-spacing: 0.02em;
    }

    .panel h3 { margin-top: 18px; color: #cbd5e1; }

    .muted { color: var(--text-muted); font-size: 0.9rem; }

    .page-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .page-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 0.65rem 0.75rem;
      border-radius: 12px;
      border: 1px solid rgba(148, 163, 184, 0.18);
      background: rgba(30, 41, 59, 0.7);
      cursor: pointer;
    }

    /* Page actions stay reachable however far the list is scrolled. Negative margins let the
       block span the panel's 12px padding, so rows pass cleanly underneath instead of showing
       through the gutter. */
    .page-panel-header {
      position: sticky;
      top: -12px;
      z-index: 2;
      margin: -12px -12px 10px;
      padding: 12px 12px 10px;
      background: rgba(15, 23, 42, 0.97);
      border-bottom: 1px solid rgba(148, 163, 184, 0.2);
    }

    .page-create-row {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 6px;
    }

    /* Both buttons take an equal half of the row. Sized to content, "Add Page" is several
       characters wider than "Group", and the primary fill amplifies that difference into
       looking like a bigger control. Emphasis stays in the colour, not the size. */
    .page-create-row button {
      flex: 1 1 0;
      min-width: 0;
      margin: 0;
      min-height: 32px;
      padding: 5px 8px;
      font-size: 0.8rem;
      white-space: nowrap;
    }

    .page-action-row {
      display: flex;
      align-items: center;
      gap: 5px;
    }

    /* 32px matches the compact control height used in the properties panel, and is what
       lets six icons plus a gap fit the 250px column. */
    .page-action-row .icon-btn {
      width: 32px;
      height: 32px;
    }

    .page-action-row .icon-btn svg {
      width: 15px;
      height: 15px;
    }

    /* Destructive action kept away from Duplicate, which sits beside it in the toolbar today. */
    .page-action-row .icon-btn.danger {
      margin-left: auto;
    }

    /* Small circular button used for unobtrusive panel-header affordances. */
    .dot-btn {
      flex: 0 0 auto;
      width: 22px;
      height: 22px;
      padding: 0;
      display: inline-grid;
      place-items: center;
      border-radius: 50%;
      border: 1px solid rgba(148, 163, 184, 0.35);
      background: transparent;
      color: var(--text-muted);
      font-size: 0.72rem;
      font-weight: 700;
      cursor: pointer;
    }

    .dot-btn:hover {
      color: #e2e8f0;
      border-color: rgba(148, 163, 184, 0.6);
    }

    /* Modifier for dots that only explain: the tooltip is the whole point, so the cursor says
       so. Buttons that actually do something keep the pointer cursor above. */
    .help-dot {
      cursor: help;
    }

    .panel-heading-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .panel-heading-row h2 {
      margin: 0;
    }

    /* .panel h2 normally supplies a 12px bottom margin; the row above zeroes it, so the
       spacing has to be restored here or the next row butts against the heading. */
    .page-panel-header .panel-heading-row {
      margin-bottom: 8px;
    }

    .page-group-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0.4rem 0.6rem;
      margin-top: 2px;
      border-radius: 10px;
      border: 1px solid rgba(148, 163, 184, 0.22);
      background: rgba(15, 23, 42, 0.72);
      cursor: pointer;
      user-select: none;
    }

    .page-group-header:hover {
      border-color: rgba(148, 163, 184, 0.4);
    }

    .page-group-twisty {
      flex: 0 0 auto;
      width: 20px;
      min-height: 20px;
      padding: 0;
      margin: 0;
      border: none;
      background: transparent;
      color: #cbd5e1;
      font-size: 0.8rem;
      line-height: 1;
      cursor: pointer;
    }

    .page-group-label {
      flex: 1 1 auto;
      min-width: 0;
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      color: #e2e8f0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .inline-rename-input {
      flex: 1 1 auto;
      min-width: 0;
      width: 100%;
      margin: 0;
      min-height: 26px;
      padding: 3px 6px;
      font-size: 0.8rem;
      font-weight: 600;
    }

    .page-name,
    .page-group-label {
      cursor: text;
    }

    .page-group-count {
      flex: 0 0 auto;
      font-size: 0.7rem;
      font-weight: 700;
      color: #94a3b8;
      background: rgba(148, 163, 184, 0.16);
      border-radius: 999px;
      padding: 1px 7px;
    }

    /* Placeholder shown under an empty chapter's header; also a drop target for pages. */
    .page-group-empty {
      margin: 2px 0 2px 14px;
      padding: 8px 10px;
      border: 1px dashed rgba(148, 163, 184, 0.35);
      border-radius: 8px;
      font-size: 0.76rem;
      color: var(--text-muted);
      text-align: center;
      /* It adds a page on click, so it has to read as a control and not as a caption. */
      cursor: pointer;
    }

    .page-group-empty:hover {
      border-color: rgba(148, 163, 184, 0.6);
      color: #cbd5f5;
      background: rgba(148, 163, 184, 0.08);
    }

    .page-group-empty.drag-over {
      border-color: rgba(249, 115, 22, 0.75);
      color: #e2e8f0;
      box-shadow: 0 0 0 1px rgba(249, 115, 22, 0.45) inset;
    }

    /* Indent groups' pages so the run reads as a block under its header. */
    .page-item.grouped {
      margin-left: 14px;
    }

    .page-group-header.dragging,
    .page-item.dragging {
      opacity: 0.5;
    }

    .page-group-header.drag-over,
    .page-item.drag-over {
      border-color: rgba(249, 115, 22, 0.75);
      box-shadow: 0 0 0 1px rgba(249, 115, 22, 0.45) inset;
    }

    /* Two different things, so two different cues: `selected` is a blue fill marking a member
       of the picked set, `active` is the orange frame marking the one page on the canvas. The
       current page is always in the selection, so a row commonly carries both. */
    .page-item.selected {
      background: rgba(59, 130, 246, 0.16);
      border-color: rgba(96, 165, 250, 0.5);
    }

    .page-item.active {
      border-color: rgba(249, 115, 22, 0.75);
      background: rgba(249, 115, 22, 0.14);
    }

    .page-item.selected.active {
      border-color: rgba(249, 115, 22, 0.75);
      background: rgba(59, 130, 246, 0.16);
    }

    .panel-count {
      font-size: 0.72rem;
      color: var(--text-muted);
      white-space: nowrap;
    }

    .page-item-main {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
      flex: 1;
    }

    .page-meta {
      min-width: 0;
    }

    /* Dimensions are set per page from its aspect ratio; only the framing lives here. */
    .page-thumb {
      position: relative;
      flex: 0 0 auto;
      border-radius: 6px;
      overflow: hidden;
      border: 1px solid rgba(15, 23, 42, 0.12);
      background: white;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.15);
    }

    .page-thumb-element img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* Real artwork replaces the placeholder styling entirely. */
    .page-thumb-element.image.has-image {
      background: none;
      border: none;
    }

    /* Compact mode: names only, for scanning a long book quickly. */
    .page-list.compact .page-thumb {
      display: none;
    }

    .page-list.compact .page-item {
      padding: 0.28rem 0.55rem;
      border-radius: 8px;
    }

    .page-list.compact .page-meta small {
      display: none;
    }

    .page-list.compact {
      gap: 4px;
    }

    .page-thumb-element {
      position: absolute;
      border-radius: 2px;
      overflow: hidden;
      max-width: 100%;
      max-height: 100%;
    }

    .page-thumb-element.text {
      border: 1px solid rgba(148, 163, 184, 0.45);
      background: rgba(255, 255, 255, 0.8);
    }

    .page-thumb-element.text::after {
      content: '';
      display: block;
      width: 100%;
      height: 100%;
      background: repeating-linear-gradient(
        180deg,
        rgba(15, 23, 42, 0.22),
        rgba(15, 23, 42, 0.22) 1px,
        transparent 1px,
        transparent 5px
      );
    }

    .page-thumb-element.image {
      background: linear-gradient(135deg, rgba(59, 130, 246, 0.28), rgba(16, 185, 129, 0.22));
      border: 1px solid rgba(59, 130, 246, 0.25);
    }

    .page-thumb-element.image::after {
      content: '';
      position: absolute;
      inset: 16% 14% 16% 14%;
      border-radius: 2px;
      background: rgba(255, 255, 255, 0.55);
      clip-path: polygon(0 100%, 28% 52%, 48% 72%, 66% 34%, 100% 100%);
    }

    .page-item small { color: var(--text-muted); }

    /* Flex column rather than fixed grid rows: the title strip is hidden in full screen, and a
       `grid-template-rows: auto 1fr` track list silently mis-assigns rows when a child
       disappears — the canvas would slide into the auto row and collapse to its content. With
       flex, whichever children remain simply share the space. */
    .canvas-panel {
      position: relative;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Context strip above the canvas: page identity only, no controls. */
    .canvas-title-bar {
      display: flex;
      align-items: center;
      flex: 0 0 auto;
      margin-bottom: 8px;
      min-width: 0;
    }

    /* Holds the title in whichever container is showing it. Grows so the counter's
       margin-left:auto pushes it to the far end of the available space in both modes. */
    .title-slot {
      display: flex;
      align-items: baseline;
      gap: 8px;
      flex: 1 1 auto;
      min-width: 0;
      overflow: hidden;
    }

    .canvas-wrap {
      /* Takes whatever height is left, with or without the title strip above it. */
      flex: 1 1 auto;
      min-height: 0;
      overflow: auto;
      border-radius: 14px;
      background:
        linear-gradient(transparent 23px, rgba(148, 163, 184, 0.12) 24px),
        linear-gradient(90deg, transparent 23px, rgba(148, 163, 184, 0.12) 24px),
        #f1f5f9;
      background-size: 24px 24px;
      padding: 28px;
      position: relative;
    }

    /* One title for both normal and full-screen modes, living in the toolbar rather than
       over the canvas so it never intercepts clicks meant for page content. */
    .canvas-page-title {
      display: inline-flex;
      align-items: baseline;
      gap: 8px;
      min-width: 0;
      flex: 1 1 200px;
      padding: 5px 10px;
      border-radius: 999px;
      border: 1px solid transparent;
      white-space: nowrap;
      overflow: hidden;
    }

    .app:not(.mode-view) .canvas-page-title {
      cursor: grab;
      border-color: rgba(148, 163, 184, 0.28);
      background: rgba(15, 23, 42, 0.35);
    }

    .app:not(.mode-view) .canvas-page-title:hover {
      border-color: rgba(148, 163, 184, 0.5);
    }

    .canvas-page-title.dragging {
      opacity: 0.55;
      cursor: grabbing;
    }

    /* Pushed to the far right of the bar in both modes: it is positional information, not
       part of the page's identity, so it reads like a page number rather than a title. */
    .canvas-title-position {
      margin-left: auto;
      padding-left: 12px;
      font-size: 0.74rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: #94a3b8;
      flex: 0 0 auto;
      white-space: nowrap;
    }

    /* Group name as a breadcrumb ahead of the page name. */
    .canvas-title-group {
      flex: 0 0 auto;
      font-size: 0.8rem;
      font-weight: 600;
      color: #94a3b8;
      white-space: nowrap;
    }

    .canvas-title-group:empty {
      display: none;
    }

    .canvas-title-group::after {
      content: '›';
      margin-left: 6px;
      color: #64748b;
    }

    .canvas-title-name {
      font-size: 0.95rem;
      font-weight: 700;
      color: #e2e8f0;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .canvas-title-meta {
      font-size: 0.74rem;
      font-weight: 500;
      color: #64748b;
      flex: 0 0 auto;
    }

    /* Dimensions are the first thing to go when the toolbar gets tight. */
    @media (max-width: 1180px) {
      .canvas-title-meta {
        display: none;
      }
    }

    /* Briefly marks the page row that a reveal jumped to. */
    @keyframes page-reveal-flash {
      0%   { box-shadow: 0 0 0 2px rgba(249, 115, 22, 0.9) inset; }
      100% { box-shadow: 0 0 0 2px rgba(249, 115, 22, 0) inset; }
    }

    .page-item.reveal-flash {
      animation: page-reveal-flash 1.1s ease-out 1;
    }

    .canvas-wrap.drag-active {
      box-shadow: inset 0 0 0 3px rgba(14, 165, 233, 0.55);
      background:
        linear-gradient(transparent 23px, rgba(148, 163, 184, 0.12) 24px),
        linear-gradient(90deg, transparent 23px, rgba(148, 163, 184, 0.12) 24px),
        linear-gradient(180deg, rgba(14, 165, 233, 0.08), rgba(14, 165, 233, 0.02)),
        #f1f5f9;
      background-size: 24px 24px, 24px 24px, auto, auto;
    }

    .stage {
      position: relative;
      transform-origin: top left;
    }

    .page {
      position: relative;
      background: white;
      border-radius: 0;
      box-shadow: 0 18px 50px rgba(15, 23, 42, 0.18);
      overflow: hidden;
      border: 1px solid rgba(15, 23, 42, 0.08);
    }

    .page-surface {
      position: absolute;
      inset: 0;
    }

    .page-label {
      position: absolute;
      left: 16px;
      top: 14px;
      color: rgba(15, 23, 42, 0.54);
      font-size: 0.84rem;
      pointer-events: none;
    }

    .element {
      position: absolute;
      border: 1px solid transparent;
      border-radius: 8px;
      overflow: hidden;
      user-select: none;
      touch-action: none;
    }

    .element.selected {
      border-color: rgba(249, 115, 22, 0.95);
      box-shadow: 0 0 0 2px rgba(249, 115, 22, 0.2), 0 0 0 4px rgba(15, 23, 42, 0.22);
      overflow: visible;
    }

    .element.selected.keyboard-focus {
      border-color: rgba(59, 130, 246, 0.95);
      box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.25), 0 0 0 4px rgba(15, 23, 42, 0.3);
      overflow: visible;
    }

    .element.dragging,
    .element.resizing {
      opacity: 0.96;
      transition: none;
    }

    .element.dragging {
      cursor: grabbing;
      box-shadow: 0 0 0 2px rgba(14, 165, 233, 0.35), 0 8px 22px rgba(15, 23, 42, 0.26);
    }

    .element.resizing {
      box-shadow: 0 0 0 2px rgba(249, 115, 22, 0.35), 0 8px 22px rgba(15, 23, 42, 0.26);
      overflow: visible;
    }

    .element .content {
      width: 100%;
      height: 100%;
      padding: 8px;
      color: #111827;
      font-size: 14px;
      line-height: 1.4;
      white-space: pre-wrap;
      overflow: hidden;
      background: rgba(255,255,255,0.02);
    }

    .element.text .content {
      display: block;
    }

    .element.image {
      background: transparent;
    }

    .element.image img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: transparent;
    }

    .element.placeholder {
      display: grid;
      place-items: center;
      color: #475569;
      background: repeating-linear-gradient(45deg, #e2e8f0, #e2e8f0 12px, #f8fafc 12px, #f8fafc 24px);
      font-size: 0.84rem;
      text-align: center;
      padding: 8px;
    }

    .resize-handle {
      position: absolute;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--accent);
      border: 2px solid white;
      z-index: 6;
      display: none;
    }

    .resize-handle.handle-se {
      right: -7px;
      bottom: -7px;
    }

    .resize-handle.handle-ne {
      right: -7px;
      top: -7px;
    }

    .resize-handle.handle-nw {
      left: -7px;
      top: -7px;
    }

    .resize-handle.handle-sw {
      left: -7px;
      bottom: -7px;
    }

    .resize-handle.handle-e {
      right: -7px;
      top: 50%;
      transform: translate(50%, -50%);
    }

    .resize-handle.handle-w {
      left: -7px;
      top: 50%;
      transform: translate(-50%, -50%);
    }

    .resize-handle.handle-n {
      left: 50%;
      top: -7px;
      transform: translate(-50%, -50%);
    }

    .resize-handle.handle-s {
      left: 50%;
      bottom: -7px;
      transform: translate(-50%, 50%);
    }

    .element.selected .resize-handle { display: block; }

    .field-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 10px;
    }

    .field label {
      font-size: 0.84rem;
      color: #cbd5e1;
    }

    .statusbar {
      border-radius: 18px;
      padding: 10px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      font-size: 0.9rem;
      color: #cbd5e1;
    }

    .statusbar strong { color: white; }

    .status-warn {
      color: #fca5a5;
      font-weight: 600;
    }

    .asset-status-line {
      margin-top: -2px;
      margin-bottom: 10px;
      font-size: 0.84rem;
    }

    .asset-status-line.warn {
      color: #fca5a5;
      font-weight: 600;
    }

    .asset-manager-summary {
      margin-bottom: 10px;
      font-size: 0.84rem;
      line-height: 1.35;
    }

    .asset-manager-actions {
      margin-bottom: 10px;
    }

    .asset-manager-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .asset-manager-section {
      border: 1px solid rgba(148, 163, 184, 0.22);
      border-radius: 10px;
      padding: 8px;
      background: rgba(15, 23, 42, 0.3);
    }

    .asset-manager-section-title {
      font-size: 0.78rem;
      color: #cbd5e1;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      font-weight: 700;
    }

    .asset-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 6px 8px;
      border-radius: 8px;
      background: rgba(30, 41, 59, 0.5);
    }

    .asset-row + .asset-row {
      margin-top: 6px;
    }

    .asset-row-main {
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .asset-row-title {
      color: #e2e8f0;
      font-size: 0.82rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .asset-row-meta {
      color: var(--text-muted);
      font-size: 0.74rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .asset-row-actions {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
    }

    .asset-row-actions button {
      margin: 0;
      padding: 0.34rem 0.5rem;
      border-radius: 8px;
      font-size: 0.74rem;
    }

    .asset-manager-empty {
      color: var(--text-muted);
      font-size: 0.82rem;
      padding: 8px;
      border: 1px dashed rgba(148, 163, 184, 0.28);
      border-radius: 8px;
      background: rgba(15, 23, 42, 0.2);
    }

    .element.asset-warning {
      border-color: rgba(248, 113, 113, 0.9);
      box-shadow: 0 0 0 2px rgba(248, 113, 113, 0.18);
    }

    .asset-warning-badge {
      position: absolute;
      top: 6px;
      right: 6px;
      padding: 2px 6px;
      border-radius: 999px;
      background: rgba(127, 29, 29, 0.9);
      color: #fee2e2;
      border: 1px solid rgba(252, 165, 165, 0.7);
      font-size: 0.68rem;
      font-weight: 700;
      pointer-events: none;
      z-index: 3;
    }

    .text-editor {
      position: absolute;
      z-index: 20;
      inset: 0;
      padding: 8px;
      border: 1px solid rgba(249, 115, 22, 0.95);
      border-radius: 8px;
      background: white;
      color: #111827;
      resize: none;
      outline: none;
      font: inherit;
      line-height: inherit;
      overflow: auto;
    }

    .hidden { display: none !important; }

    .context-menu {
      position: fixed;
      z-index: 80;
      min-width: 180px;
      padding: 6px;
      border-radius: 10px;
      border: 1px solid rgba(148, 163, 184, 0.36);
      background: rgba(15, 23, 42, 0.96);
      box-shadow: 0 12px 30px rgba(2, 6, 23, 0.45);
      display: flex;
      flex-direction: column;
      /* Flush rows. A gap between items would compete with the group spacing, which is the
         only separation the menu should show. */
      gap: 0;
    }

    /* Flat rows rather than filled tiles: six item boxes drew six boundaries, so a group
       boundary had nothing left to distinguish it. The fill now marks the hovered row only. */
    .context-menu-item {
      width: 100%;
      padding: 0.5rem 0.6rem;
      border-radius: 6px;
      border: 0;
      background: transparent;
      color: var(--text);
      text-align: left;
      cursor: pointer;
    }

    .context-menu-item:hover {
      background: rgba(59, 130, 246, 0.22);
      /* Cancels the global button lift: a row in a list should not rise off the surface. */
      transform: none;
    }

    /* Destructive actions are named in red rather than drawn as a red slab, which at full
       width read as the menu's primary action. */
    .context-menu-item.danger {
      background: transparent;
      color: #fca5a5;
    }

    .context-menu-item.danger:hover {
      background: rgba(127, 29, 29, 0.55);
      color: #fee2e2;
    }

    .context-menu-item:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* Groups the menu into families. Space does the grouping, as it does between toolbar
       clusters: 11px between groups against flush rows within one, and the rule only sharpens
       a boundary the spacing has already made. Full-bleed into the menu's 6px padding, so it
       reads as dividing the menu rather than as an item of its own.
       Drawn as a 1px background rather than a border on a zero-height box: with the global
       `* { box-sizing: border-box }` that construction is visible only via the border-box
       floor, and `flex-shrink` could still collapse it. */
    .context-menu hr {
      flex: 0 0 auto;
      width: auto;
      height: 1px;
      margin: 5px -6px;
      border: 0;
      background: rgba(148, 163, 184, 0.3);
    }

    .drop-review-modal {
      position: fixed;
      inset: 0;
      z-index: 95;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background: rgba(2, 6, 23, 0.72);
      backdrop-filter: blur(2px);
    }

    .drop-review-dialog {
      width: min(980px, 96vw);
      max-height: min(88vh, 820px);
      border-radius: 14px;
      border: 1px solid rgba(148, 163, 184, 0.32);
      background: rgba(15, 23, 42, 0.98);
      box-shadow: 0 20px 50px rgba(2, 6, 23, 0.55);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .drop-review-header {
      padding: 12px 14px;
      border-bottom: 1px solid rgba(148, 163, 184, 0.22);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .drop-review-header h3 {
      margin: 0;
      font-size: 1rem;
      color: #e2e8f0;
    }

    .drop-review-summary {
      color: var(--text-muted);
      font-size: 0.82rem;
      padding: 10px 14px;
      border-bottom: 1px solid rgba(148, 163, 184, 0.16);
    }

    .drop-review-toolbar {
      padding: 8px 14px;
      border-bottom: 1px solid rgba(148, 163, 184, 0.16);
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .drop-review-newpage-label {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 0.82rem;
      color: #cbd5e1;
      cursor: pointer;
      user-select: none;
    }

    .drop-review-newpage-label input[type="checkbox"] {
      width: auto;
      min-height: auto;
      margin: 0;
      padding: 0;
      cursor: pointer;
    }

    /* A checkbox alone does not look disabled; the label has to say so too. */
    .drop-review-newpage-label.is-disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .drop-review-newpage-label.is-disabled input[type="checkbox"] {
      cursor: not-allowed;
    }

    .drop-review-list {
      overflow: auto;
      padding: 10px 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .drop-review-row {
      display: grid;
      grid-template-columns: minmax(170px, 1.3fr) 92px minmax(120px, 0.8fr) minmax(190px, 1.5fr) minmax(150px, 1fr);
      gap: 8px;
      align-items: center;
      padding: 8px;
      border-radius: 10px;
      background: rgba(30, 41, 59, 0.5);
      border: 1px solid rgba(148, 163, 184, 0.18);
    }

    .drop-review-row.unsupported {
      opacity: 0.82;
      border-color: rgba(248, 113, 113, 0.35);
      background: rgba(127, 29, 29, 0.22);
    }

    .drop-review-cell {
      min-width: 0;
    }

    .drop-review-name {
      font-size: 0.82rem;
      color: #e2e8f0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .drop-review-meta {
      font-size: 0.72rem;
      color: var(--text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .drop-review-row select,
    .drop-review-row input {
      width: 100%;
      margin: 0;
      min-height: 34px;
      font-size: 0.78rem;
      padding: 6px 8px;
    }

    .drop-review-row input[disabled],
    .drop-review-row select[disabled] {
      opacity: 0.6;
    }

    .drop-review-globalpath {
      display: flex;
      align-items: center;
      gap: 8px;
      flex: 1 1 320px;
      min-width: 0;
    }

    .drop-review-globalpath label {
      font-size: 0.78rem;
      color: #cbd5e1;
      white-space: nowrap;
    }

    .drop-review-globalpath input {
      flex: 1 1 auto;
      min-width: 0;
      margin: 0;
      min-height: 32px;
      font-size: 0.78rem;
      padding: 6px 8px;
    }

    .drop-review-globalpath button {
      flex: 0 0 auto;
      min-height: 32px;
      font-size: 0.76rem;
      padding: 6px 10px;
      white-space: nowrap;
    }

    .drop-review-kind {
      font-size: 0.76rem;
      color: #cbd5e1;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      font-weight: 700;
    }

    .drop-review-footer {
      padding: 10px 12px;
      border-top: 1px solid rgba(148, 163, 184, 0.22);
      display: flex;
      justify-content: flex-end;
      gap: 8px;
    }

    .drop-review-footer button {
      margin: 0;
    }

    @media (max-width: 1200px) {
      .workspace { grid-template-columns: 220px 1fr; }
      .inspector { grid-column: 1 / -1; }
    }

    @media (max-width: 860px) {
      .workspace { grid-template-columns: 1fr; }
      .panel { min-height: 240px; }
    }
  </style>
</head>
<body>
  <div class="app" id="story-book-app">
    <header class="toolbar">
      <!-- Authoring: hidden in full screen, where the page title takes its place. -->
      <div class="toolbar-group authoring">
        <div class="brand">
          <strong>Story Book Editor</strong>
        </div>
        <div class="icon-cluster" aria-label="Document actions">
          <button class="primary icon-btn" id="newBookBtn" title="New Book" aria-label="New Book">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M14 3H7a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V8z"></path><path d="M14 3v5h5"></path><path d="M12 11v6"></path><path d="M9 14h6"></path></svg>
            <span class="sr-only">New Book</span>
          </button>
          <button class="icon-btn" id="openBookBtn" title="Open HTML" aria-label="Open HTML">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 7h6l2 2h10v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><path d="M3 7V5a2 2 0 0 1 2-2h4l2 2h3"></path></svg>
            <span class="sr-only">Open HTML</span>
          </button>
          <button class="icon-btn" id="saveBookBtn" title="Save HTML" aria-label="Save HTML">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 3h12l2 2v16H5z"></path><path d="M8 3v6h8V3"></path><path d="M8 21v-6h8v6"></path></svg>
            <span class="sr-only">Save HTML</span>
          </button>
          <button class="icon-btn" id="saveBookAsBtn" title="Save As (Ctrl+Shift+S)" aria-label="Save As">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 3h10l4 4v8"></path><path d="M5 3v18h8"></path><path d="M8 3v6h7"></path><path d="M17 17v6"></path><path d="M14 20h6"></path></svg>
            <span class="sr-only">Save As</span>
          </button>
        </div>
        <div class="icon-cluster" aria-label="History actions">
          <button class="icon-btn" id="undoBtn" title="Undo (Ctrl+Z)" aria-label="Undo">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M9 14 4 9l5-5"></path><path d="M4 9h10.5a5.5 5.5 0 0 1 5.5 5.5 5.5 5.5 0 0 1-5.5 5.5H11"></path></svg>
            <span class="sr-only">Undo</span>
          </button>
          <button class="icon-btn" id="redoBtn" title="Redo (Ctrl+Y)" aria-label="Redo" disabled="">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m15 14 5-5-5-5"></path><path d="M20 9H9.5A5.5 5.5 0 0 0 9.5 20H13"></path></svg>
            <span class="sr-only">Redo</span>
          </button>
        </div>
        <div class="icon-cluster" aria-label="Element insert actions">
          <button class="icon-btn" id="addTextBtn" title="Add Text" aria-label="Add Text">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 5h16"></path><path d="M12 5v14"></path></svg>
            <span class="sr-only">Add Text</span>
          </button>
          <button class="icon-btn" id="addImageBtn" title="Add Image URL" aria-label="Add Image URL">
            <svg viewBox="0 0 24 24" aria-hidden="true"><rect x="3" y="5" width="18" height="14" rx="2"></rect><circle cx="9" cy="10" r="1.5"></circle><path d="m21 16-5-5-4 4-2-2-5 5"></path></svg>
            <span class="sr-only">Add Image URL</span>
          </button>
          <button class="icon-btn" id="addEmbeddedImageBtn" title="Add Embedded Image" aria-label="Add Embedded Image">
            <svg viewBox="0 0 24 24" aria-hidden="true"><rect x="3" y="5" width="18" height="14" rx="2"></rect><path d="m21 16-5-5-4 4-2-2-5 5"></path><path d="M18 4v4"></path><path d="M16 6h4"></path></svg>
            <span class="sr-only">Add Embedded Image</span>
          </button>
          <button class="icon-btn" id="addVideoBtn" title="Add Video URL" aria-label="Add Video URL">
            <svg viewBox="0 0 24 24" aria-hidden="true"><rect x="3" y="6" width="13" height="12" rx="2"></rect><path d="m16 10 5-3v10l-5-3z"></path><path class="fill" d="m9 10 4 2-4 2z"></path></svg>
            <span class="sr-only">Add Video URL</span>
          </button>
          <button class="icon-btn" id="addAudioBtn" title="Add Audio URL" aria-label="Add Audio URL">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 14h4l5 4V6L8 10H4z"></path><path d="M17 9a4 4 0 0 1 0 6"></path><path d="M19.8 7a7 7 0 0 1 0 10"></path></svg>
            <span class="sr-only">Add Audio URL</span>
          </button>
        </div>
      </div>
      <input class="hidden" type="file" id="openFileInput" accept=".html,.htm,text/html">
      <input class="hidden" type="file" id="embeddedImageInput" accept="image/*">
      <!-- The page title lands here in full screen, filling the space the authoring groups vacate. -->
      <span class="title-slot" id="toolbarTitleSlot"></span>
      <div class="toolbar-group">
        <div class="icon-cluster" aria-label="Zoom actions">
          <button class="icon-btn" id="zoomOutBtn" title="Zoom Out (Ctrl+-)" aria-label="Zoom Out">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 12h14"></path></svg>
            <span class="sr-only">Zoom Out</span>
          </button>
          <button class="icon-btn" id="zoomResetBtn" title="Reset Zoom (Ctrl+0)" aria-label="Reset Zoom">
            <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="7"></circle><path d="M12 9v6"></path><path d="M9 12h6"></path></svg>
            <span class="sr-only">Reset Zoom</span>
          </button>
          <button class="icon-btn" id="zoomInBtn" title="Zoom In (Ctrl++)" aria-label="Zoom In">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 5v14"></path><path d="M5 12h14"></path></svg>
            <span class="sr-only">Zoom In</span>
          </button>
        </div>
        <div class="icon-cluster" aria-label="Mode actions">
          <button class="icon-btn" id="viewModeBtn" title="View Mode" aria-label="View Mode">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M2 12s3.5-6 10-6 10 6 10 6-3.5 6-10 6-10-6-10-6z"></path><circle cx="12" cy="12" r="2.8"></circle></svg>
            <span class="sr-only">View Mode</span>
          </button>
          <button class="icon-btn active" id="editModeBtn" title="Edit Mode" aria-label="Edit Mode">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 21h6"></path><path d="m14.5 4.5 5 5"></path><path d="M8 19l10.5-10.5a2.1 2.1 0 0 0 0-3L18.5 4a2.1 2.1 0 0 0-3 0L5 14.5 4 20z"></path></svg>
            <span class="sr-only">Edit Mode</span>
          </button>
        </div>

        els.statusText.textContent = app.fullscreen ? 'Full screen mode enabled' : (app.dirty ? 'Unsaved changes' : 'Saved');
      }

      // The title lives in the strip above the canvas normally, and inside the toolbar in full
      // screen where it fills the space the authoring groups vacate. Moving the one element
      // rather than rendering two copies is what lets the fs* twin buttons stay deleted.
      function moveTitleToSlot() {
        const target = app.fullscreen ? els.toolbarTitleSlot : els.stripTitleSlot;
        const source = app.fullscreen ? els.stripTitleSlot : els.toolbarTitleSlot;
        if (!target || !source || !els.canvasPageTitle) return;
        if (els.canvasPageTitle.parentNode === target) return;
        target.appendChild(els.canvasPageTitle);
        if (els.canvasTitlePosition) target.appendChild(els.canvasTitlePosition);
      }

      function toggleFullScreenMode() {
        setFullScreenMode(!app.fullscreen);
      }

      function hideContextMenu() {
        if (!els.contextMenu) return;
        els.contextMenu.classList.add('hidden');
        els.contextMenu.setAttribute('aria-hidden', 'true');
        els.contextMenu.innerHTML = '';
      }

      function showContextMenu(x, y, items) {
        if (app.mode !== 'edit') return;
        if (!els.contextMenu || !Array.isArray(items) || !items.length) return;

        const menu = els.contextMenu;
        menu.innerHTML = '';

        for (const item of items) {
          // A separator carries no action, so it is a rule rather than a button. Leading,
          // trailing and doubled separators are dropped: entries are conditional, so a menu
          // that loses its last group would otherwise end on a stray line.
          if (item.separator) {
            if (!menu.childElementCount) continue;
            if (menu.lastElementChild.tagName === 'HR') continue;
            menu.appendChild(document.createElement('hr'));
            continue;
          }
          const button = document.createElement('button');
          button.type = 'button';
          button.className = `context-menu-item${item.danger ? ' danger' : ''}`;
          button.textContent = item.label;
          button.disabled = Boolean(item.disabled);
          button.addEventListener('click', (event) => {
            event.preventDefault();
            event.stopPropagation();
            hideContextMenu();
            if (!button.disabled && typeof item.onSelect === 'function') {
              item.onSelect();
            }
          });
          menu.appendChild(button);
        }

        while (menu.lastElementChild && menu.lastElementChild.tagName === 'HR') {
          menu.removeChild(menu.lastElementChild);
        }

        if (!menu.childElementCount) return;
        menu.classList.remove('hidden');
        menu.setAttribute('aria-hidden', 'false');

        const rect = menu.getBoundingClientRect();
        const pad = 8;
        const left = Math.max(pad, Math.min(x, window.innerWidth - rect.width - pad));
        const top = Math.max(pad, Math.min(y, window.innerHeight - rect.height - pad));
        menu.style.left = `${left}px`;
        menu.style.top = `${top}px`;
      }

      function createId(prefix) {
        const suffix = (crypto && crypto.randomUUID)
          ? crypto.randomUUID().replace(/-/g, '').slice(0, 10)
          : Math.random().toString(36).slice(2, 12);
        return `${prefix}-${suffix}`;
      }

      function nowIso() {
        return new Date().toISOString();
      }

      function blankDocument() {
        const pageId = createId('page');
        const elementId = createId('el');
        return {
          formatVersion: 1,
          storyBook: {
            id: createId('book'),
            title: 'Untitled Story Book',
            width: 1200,
            height: 800,
            imagePath: '',
            dropMode: 'reference',
            pageOrder: [pageId],
            // Authoritative order + grouping (mixed model): a list of page-refs and group-refs,
            // where a group-ref is { type:'group', id, name, collapsed, pages:[...] } and may be
            // empty. pageOrder above and each page.groupId are derived projections of this.
            structure: [{ type: 'page', id: pageId }],
            createdAt: nowIso(),
            updatedAt: nowIso()
          },
          pages: {
            [pageId]: {
              id: pageId,
              name: 'Page 1',
              width: 1200,
              height: 800,
              imagePath: '',
              background: { type: 'solid', color: '#ffffff' },
              elementOrder: [elementId]
            }
          },
          elements: {
            [elementId]: {
              id: elementId,
              pageId,
              type: 'text',
              x: 120,
              y: 120,
              width: 360,
              height: 120,
              zIndex: 1,
              visible: true,
              locked: false,
              text: 'Double-click me to edit text.',
              style: {
                fontFamily: 'Arial',
                fontSize: 24,
                fontWeight: 400,
                color: '#111111',
                align: 'left',
                lineHeight: 1.4
              },
              wrap: true
            }
          },
          assets: {},
          appState: {
            currentPageId: pageId,
            zoom: 1,
            mode: 'edit'
          }
        };
      }

      function cloneDoc(doc) {
        return JSON.parse(JSON.stringify(doc));
      }

      function getCurrentPage() {
        return app.document.pages[app.currentPageId] || null;
      }

      function getCurrentElement() {
        return app.selectedElementId ? app.document.elements[app.selectedElementId] || null : null;
      }

      function getPageElements(page) {
        return page.elementOrder
          .map((id) => app.document.elements[id])
          .filter(Boolean)
          .sort((a, b) => (a.zIndex || 0) - (b.zIndex || 0));
      }

      function createHistoryEntry() {
        return {
          document: cloneDoc(app.document),
          currentPageId: app.currentPageId,
          selectedElementId: app.selectedElementId
        };
      }

      function getDocumentSignature(doc = app.document) {
        const snapshot = cloneDoc(doc);
        if (snapshot.storyBook) {
          delete snapshot.storyBook.updatedAt;
        }
        return JSON.stringify(snapshot);
      }

      function restoreHistoryEntry(entry) {
        app.document = cloneDoc(entry.document);
        app.currentPageId = app.document.pages[entry.currentPageId] ? entry.currentPageId : app.document.storyBook.pageOrder[0] || null;
        app.selectedElementId = app.document.elements[entry.selectedElementId] ? entry.selectedElementId : null;
        app.editingElementId = null;
        // The selection is view state, so it is not stored in history entries; it is repaired
        // against the restored document instead, keeping the current page inside it.
        const restoredSelection = getSelectedPageIds();
        setPageSelection(
          restoredSelection.includes(app.currentPageId) ? restoredSelection : [app.currentPageId],
          { current: app.currentPageId }
        );
        renderAll();
      }

      function clearHistory() {
        app.history.undoStack = [];
        app.history.redoStack = [];
      }

      function captureHistory() {
        app.history.undoStack.push(createHistoryEntry());
        if (app.history.undoStack.length > 100) {
          app.history.undoStack.shift();
        }
        app.history.redoStack = [];
      }

      function undoHistory() {
        if (app.mode !== 'edit') return;
        if (!app.history.undoStack.length) return;
        app.history.redoStack.push(createHistoryEntry());
        const previous = app.history.undoStack.pop();
        restoreHistoryEntry(previous);
        setDirty();
      }

      function redoHistory() {
        if (app.mode !== 'edit') return;
        if (!app.history.redoStack.length) return;
        app.history.undoStack.push(createHistoryEntry());
        const next = app.history.redoStack.pop();
        restoreHistoryEntry(next);
        setDirty();
      }

      function setDirty(isDirty = true) {
        if (isDirty === false) {
          app.savedDocumentSignature = getDocumentSignature();
          app.dirty = false;
        } else {
          app.dirty = getDocumentSignature() !== app.savedDocumentSignature;
        }
        els.statusText.textContent = app.dirty ? 'Unsaved changes' : 'Saved';
        updateDocumentTitle();
      }

      function getWindowTitle(isDirty = app.dirty) {
        const baseTitle = app.document?.storyBook?.title?.trim() || 'Untitled Story Book';
        return `${isDirty ? '* ' : ''}${baseTitle} - Story Book Editor`;
      }

      function updateDocumentTitle() {
        document.title = getWindowTitle();
      }

      // The title carries the page's identity (group breadcrumb, name, size) and the counter is
      // returned separately because it is positional information, shown at the far right of the
      // bar rather than as part of the title.
      function getPageTitleParts() {
        const page = getCurrentPage();
        if (!page) {
          return { group: '', title: 'No page loaded', meta: '', position: '', positionDetail: '' };
        }
        const pageOrder = app.document?.storyBook?.pageOrder || [];
        const index = pageOrder.indexOf(page.id);
        const group = page.groupId ? (app.document?.storyBook?.groups || {})[page.groupId] : null;

        // The counter stays global so there is one authoritative page number. Where the page
        // sits inside its group is offered as detail rather than competing with it.
        let positionDetail = '';
        if (group && index >= 0) {
          const groupPages = pageOrder.filter((id) => app.document.pages[id]?.groupId === page.groupId);
          const withinGroup = groupPages.indexOf(page.id);
          if (withinGroup >= 0) {
            positionDetail = `Page ${withinGroup + 1} of ${groupPages.length} in ${group.name}`;
          }
        }

        return {
          group: group && group.name ? group.name : '',
          title: page.name || 'Untitled page',
          meta: `${page.width} × ${page.height}`,
          position: index >= 0 ? `Page ${index + 1} of ${pageOrder.length}` : '',
          positionDetail
        };
      }

      function updatePageTitleDisplays() {
        const parts = getPageTitleParts();
        if (els.canvasTitleGroup) els.canvasTitleGroup.textContent = parts.group;
        if (els.canvasTitleName) els.canvasTitleName.textContent = parts.title;
        if (els.canvasTitleMeta) els.canvasTitleMeta.textContent = parts.meta;
        if (els.canvasTitlePosition) {
          els.canvasTitlePosition.textContent = parts.position;
          if (parts.positionDetail) {
            els.canvasTitlePosition.title = parts.positionDetail;
          } else {
            els.canvasTitlePosition.removeAttribute('title');
          }
        }
        if (els.canvasPageTitle) {
          els.canvasPageTitle.setAttribute('draggable', app.mode === 'edit' ? 'true' : 'false');
        }
      }

      function applyPropSections() {
        for (const [name, open] of Object.entries(app.propSections)) {
          const section = document.getElementById(`${name}Section`);
          if (!section) continue;
          section.classList.toggle('collapsed', !open);
          const twisty = section.querySelector('.prop-twisty');
          if (twisty) twisty.textContent = open ? '▾' : '▸';
          const header = section.querySelector('.prop-section-header');
          if (header) header.setAttribute('aria-expanded', open ? 'true' : 'false');
        }
      }

      function togglePropSection(name) {
        if (!(name in app.propSections)) return;
        app.propSections[name] = !app.propSections[name];
        applyPropSections();
      }

      function updateStatus() {
        els.statusMode.textContent = app.mode === 'edit' ? 'Edit' : 'View';
        els.statusPage.textContent = getCurrentPage() ? getCurrentPage().name : 'No page';
        els.statusZoom.textContent = `${Math.round(app.zoom * 100)}%`;
        const missingCount = getMissingAssetCount();
        els.statusWarnings.textContent = missingCount > 0
          ? `${missingCount} missing asset${missingCount === 1 ? '' : 's'}`
          : 'No missing assets';
        els.statusWarnings.classList.toggle('status-warn', missingCount > 0);
        updatePageTitleDisplays();
      }

      // Writes the element's geometry into the X/Y/W/H/Rotation fields. Safe to call during a
      // drag: assigning .value from script does not dispatch 'input', so the listeners that
      // feed syncDocFromInspector never fire and there is no feedback loop.
      function updateGeometryFields(element) {
        if (!element) return;
        els.elementX.value = Math.round(element.x || 0);
        els.elementY.value = Math.round(element.y || 0);
        els.elementW.value = Math.round(element.width || 0);
        els.elementH.value = Math.round(element.height || 0);
        els.elementRotation.value = Math.round(Number(element.rotation || 0));
      }

      function normalizeRotation(value) {
        const raw = Number(value);
        if (!Number.isFinite(raw)) return 0;
        const normalized = ((raw % 360) + 360) % 360;
        return Math.round(normalized);
      }

      function getResizeCursorForHandle(rotationDeg, handle) {
        const baseAngles = {
          se: 45,
          ne: 315,
          nw: 225,
          sw: 135,
          e: 0,
          w: 180,
          n: 270,
          s: 90
        };
        const base = Number(baseAngles[handle]);
        const world = (normalizeRotation(rotationDeg) + (Number.isFinite(base) ? base : 45)) % 360;
        const axis = ((world % 180) + 180) % 180;
        if (axis < 22.5 || axis >= 157.5) return 'ew-resize';
        if (axis < 67.5) return 'nwse-resize';
        if (axis < 112.5) return 'ns-resize';
        return 'nesw-resize';
      }

      function applyElementFrameStyles(node, element) {
        node.style.left = `${Math.round(element.x || 0)}px`;
        node.style.top = `${Math.round(element.y || 0)}px`;
        node.style.width = `${Math.max(1, Math.round(element.width || 1))}px`;
        node.style.height = `${Math.max(1, Math.round(element.height || 1))}px`;
        node.style.transform = `rotate(${normalizeRotation(element.rotation)}deg)`;
        node.style.transformOrigin = 'center center';
      }

      function updateElementFrameOnStage(elementId) {
        const element = app.document.elements[elementId];
        if (!element) return;
        const node = els.stage.querySelector(`[data-element-id="${elementId}"]`);
        if (!node) return;
        applyElementFrameStyles(node, element);
      }

      // The page a document opens on. A saved id that no longer names a page in the current
      // order is discarded rather than honoured, since a blank canvas is the visible result.
      function resolveStartPageId(doc) {
        const saved = doc.appState?.currentPageId;
        if (saved && doc.pages[saved] && doc.storyBook.pageOrder.includes(saved)) return saved;
        return doc.storyBook.pageOrder[0] || Object.keys(doc.pages)[0] || null;
      }

      function loadDocument(nextDoc) {
        app.document = nextDoc;
        app.assetIssues = {};
        // A different document must never inherit the previous file's handle, or New Book
        // followed by Save would overwrite the file that was open before it.
        app.fileHandle = null;
        // Guarantee pageOrder + page.groupId reflect the authoritative structure, for a blank
        // document (which is not run through normalizePayload) as much as a loaded file.
        syncDerivedFromStructure(app.document);
        app.currentPageId = resolveStartPageId(nextDoc);
        setPageSelection(app.currentPageId ? [app.currentPageId] : [], { current: app.currentPageId });
        app.selectedElementId = null;
        app.mode = nextDoc.appState?.mode || 'edit';
        app.zoom = Number(nextDoc.appState?.zoom) || 1;
        clearHistory();
        renderAll();
        setDirty(false);
      }

      function setAssetIssue(assetId, issue, opts = {}) {
        if (!assetId) return;
        const previous = app.assetIssues[assetId] || null;
        const next = issue ? { code: issue.code || 'missing', message: issue.message || 'Missing asset reference' } : null;
        const unchanged = (previous?.code || null) === (next?.code || null)
          && (previous?.message || null) === (next?.message || null);
        if (unchanged) return;
        if (next) {
          app.assetIssues[assetId] = next;
        } else {
          delete app.assetIssues[assetId];
        }
        if (!opts.silent) {
          renderStage();
          renderInspector();
          updateStatus();
        }
      }

      function getReferenceIssueForElement(element) {
        if (!element || !['image', 'video', 'audio'].includes(element.type)) return null;
        if (!element.assetId) {
          return { code: 'missing-link', message: 'Missing asset link' };
        }
        const asset = app.document.assets[element.assetId];
        if (!asset) {
          return { code: 'missing-asset', message: 'Missing asset entry' };
        }
        if (getAssetSourceType(asset) === 'embedded') return null;
        if (!String(asset.pathOrUrl || '').trim()) {
          return { code: 'missing-path', message: 'Missing reference path or URL' };
        }
        return app.assetIssues[element.assetId] || null;
      }

      function getMissingAssetCount() {
        if (!app.document?.elements) return 0;
        let count = 0;
        for (const element of Object.values(app.document.elements)) {
          if (getReferenceIssueForElement(element)) count += 1;
        }
        return count;
      }

      function estimateEmbeddedDataSizeBytes(dataUri) {
        const raw = String(dataUri || '');
        const commaIndex = raw.indexOf(',');
        if (commaIndex < 0) return 0;
        const payload = raw.slice(commaIndex + 1).replace(/\s/g, '');
        if (!payload) return 0;
        return Math.max(0, Math.floor((payload.length * 3) / 4));
      }

      function formatBytes(bytes) {
        const value = Number(bytes);
        if (!Number.isFinite(value) || value <= 0) return '0 B';
        if (value < 1024) return `${value} B`;
        if (value < 1024 * 1024) return `${(value / 1024).toFixed(1)} KB`;
        return `${(value / (1024 * 1024)).toFixed(2)} MB`;
      }

      function isDataUriString(value) {
        return /^data:/i.test(String(value || '').trim());
      }

      function getAssetSourceType(asset) {
        if (!asset || typeof asset !== 'object') return 'reference';
        if (asset.dataUri || isDataUriString(asset.pathOrUrl) || asset.sourceType === 'embedded') {
          return 'embedded';
        }
        return 'reference';
      }

      function getAssetUsageSnapshot() {
        const usageCountByAssetId = {};
        const usageElementsByAssetId = {};
        const missingLinkElements = [];
        const referenceIssuesByAssetId = {};
        const elements = Object.values(app.document?.elements || {});
        const assets = app.document?.assets || {};

        for (const element of elements) {
          if (!element || !['image', 'video', 'audio'].includes(element.type)) continue;
          if (!element.assetId) {
            missingLinkElements.push({
              elementId: element.id,
              pageId: element.pageId,
              type: element.type,
              message: 'Missing asset link'
            });
            continue;
          }

          const asset = assets[element.assetId];
          if (!asset) {
            missingLinkElements.push({
              elementId: element.id,
              pageId: element.pageId,
              type: element.type,
              message: 'Missing asset entry'
            });
            continue;
          }

          usageCountByAssetId[element.assetId] = (usageCountByAssetId[element.assetId] || 0) + 1;
          if (!usageElementsByAssetId[element.assetId]) usageElementsByAssetId[element.assetId] = [];
          usageElementsByAssetId[element.assetId].push({
            elementId: element.id,
            pageId: element.pageId,
            type: element.type
          });

          const issue = getReferenceIssueForElement(element);
          if (getAssetSourceType(asset) !== 'embedded' && issue) {
            referenceIssuesByAssetId[element.assetId] = {
              assetId: element.assetId,
              message: issue.message,
              code: issue.code || 'missing'
            };
          }
        }

        const embeddedOrphan = [];
        const embeddedUsed = [];
        const referenceIssues = [];

        for (const [assetId, asset] of Object.entries(assets)) {
          if (!asset || typeof asset !== 'object') continue;
          const sourceType = getAssetSourceType(asset);
          const usageCount = usageCountByAssetId[assetId] || 0;
          if (sourceType === 'embedded') {
            const entry = { assetId, asset, usageCount };
            if (usageCount > 0) {
              embeddedUsed.push(entry);
            } else {
              embeddedOrphan.push(entry);
            }
          } else if (referenceIssuesByAssetId[assetId]) {
            referenceIssues.push({
              assetId,
              asset,
              usageCount,
              issue: referenceIssuesByAssetId[assetId]
            });
          }
        }

        return {
          usageCountByAssetId,
          usageElementsByAssetId,
          embeddedUsed,
          embeddedOrphan,
          referenceIssues,
          missingLinkElements
        };
      }

      function buildAssetRow(title, meta, actionsBuilder) {
        const row = document.createElement('div');
        row.className = 'asset-row';
        const main = document.createElement('div');
        main.className = 'asset-row-main';
        const titleEl = document.createElement('div');
        titleEl.className = 'asset-row-title';
        titleEl.textContent = title;
        const metaEl = document.createElement('div');
        metaEl.className = 'asset-row-meta';
        metaEl.textContent = meta;
        main.appendChild(titleEl);
        main.appendChild(metaEl);
        row.appendChild(main);
        const actions = document.createElement('div');
        actions.className = 'asset-row-actions';
        if (typeof actionsBuilder === 'function') {
          actionsBuilder(actions);
        }
        row.appendChild(actions);
        return row;
      }

      function cleanupUnusedEmbeddedAssets() {
        if (app.mode !== 'edit') return;
        const snapshot = getAssetUsageSnapshot();
        const orphanIds = snapshot.embeddedOrphan.map((entry) => entry.assetId);
        if (!orphanIds.length) {
          els.statusText.textContent = 'No unused embedded assets to clean up';
          renderAll();
          return;
        }
        if (!confirm(`Remove ${orphanIds.length} unused embedded asset${orphanIds.length === 1 ? '' : 's'}?`)) {
          return;
        }
        captureHistory();
        let removed = 0;
        for (const assetId of orphanIds) {
          if (app.document.assets[assetId]) {
            delete app.document.assets[assetId];
            delete app.assetIssues[assetId];
            removed += 1;
          }
        }
        if (!removed) {
          els.statusText.textContent = 'No unused embedded assets were removed';
          renderAll();
          return;
        }
        setDirty();
        renderAll();
        els.statusText.textContent = `Removed ${removed} unused embedded asset${removed === 1 ? '' : 's'}`;
      }

      function removeEmbeddedAssetIfUnused(assetId) {
        if (app.mode !== 'edit') return;
        const snapshot = getAssetUsageSnapshot();
        const usageCount = snapshot.usageCountByAssetId[assetId] || 0;
        if (usageCount > 0) {
          alert('That embedded asset is still referenced by one or more elements.');
          return;
        }
        const asset = app.document.assets[assetId];
        if (!asset || (asset.sourceType !== 'embedded' && !asset.dataUri)) return;
        captureHistory();
        delete app.document.assets[assetId];
        delete app.assetIssues[assetId];
        setDirty();
        renderAll();
      }

      function relinkReferenceAsset(assetId) {
        if (app.mode !== 'edit') return;
        const asset = app.document.assets[assetId];
        if (!asset) return;
        const initial = String(asset.pathOrUrl || '');
        const next = prompt('Enter new reference path or URL for this asset', initial);
        if (next === null) return;
        const normalized = normalizeReferencePath(next);
        captureHistory();
        asset.sourceType = 'reference';
        asset.pathOrUrl = normalized;
        asset.kind = asset.kind || inferKindFromMime(asset.mimeType) || 'image';
        asset.mimeType = asset.mimeType || `${asset.kind}/*`;
        setAssetIssue(asset.id || assetId, null, { silent: true });
        setDirty();
        renderAll();
      }

      function renderAssetManager() {
        if (!els.assetManagerSummary || !els.assetManagerList) return;
        const snapshot = getAssetUsageSnapshot();
        const issueCount = snapshot.referenceIssues.length + snapshot.missingLinkElements.length;
        els.assetManagerSummary.textContent = `Embedded used: ${snapshot.embeddedUsed.length} | Embedded unused: ${snapshot.embeddedOrphan.length} | Reference issues: ${issueCount}`;
        if (buttons.cleanupUnusedEmbedded) {
          buttons.cleanupUnusedEmbedded.disabled = app.mode !== 'edit' || !snapshot.embeddedOrphan.length;
        }

        els.assetManagerList.innerHTML = '';

        if (!snapshot.embeddedOrphan.length && !snapshot.referenceIssues.length && !snapshot.missingLinkElements.length) {
          const empty = document.createElement('div');
          empty.className = 'asset-manager-empty';
          empty.textContent = 'No asset cleanup or relink actions are needed right now.';
          els.assetManagerList.appendChild(empty);
          return;
        }

        if (snapshot.embeddedOrphan.length) {
          const section = document.createElement('div');
          section.className = 'asset-manager-section';
          const title = document.createElement('div');
          title.className = 'asset-manager-section-title';
          title.textContent = `Unused Embedded Assets (${snapshot.embeddedOrphan.length})`;
          section.appendChild(title);
          for (const entry of snapshot.embeddedOrphan) {
            const displayName = entry.asset.fileName || entry.asset.mimeType || entry.assetId;
            const approx = formatBytes(estimateEmbeddedDataSizeBytes(entry.asset.dataUri));
            const row = buildAssetRow(
              displayName,
              `${entry.assetId} | ${entry.asset.kind || 'media'} | approx ${approx}`,
              (actions) => {
                const removeBtn = document.createElement('button');
                removeBtn.type = 'button';
                removeBtn.textContent = 'Delete';
                removeBtn.disabled = app.mode !== 'edit';
                removeBtn.addEventListener('click', () => removeEmbeddedAssetIfUnused(entry.assetId));
                actions.appendChild(removeBtn);
              }
            );
            section.appendChild(row);
          }
          els.assetManagerList.appendChild(section);
        }

        if (snapshot.referenceIssues.length) {
          const section = document.createElement('div');
          section.className = 'asset-manager-section';
          const title = document.createElement('div');
          title.className = 'asset-manager-section-title';
          title.textContent = `Missing/Broken Reference Assets (${snapshot.referenceIssues.length})`;
          section.appendChild(title);
          for (const entry of snapshot.referenceIssues) {
            const row = buildAssetRow(
              entry.asset.fileName || entry.asset.pathOrUrl || entry.assetId,
              `${entry.issue.message} | ${entry.assetId} | used by ${entry.usageCount} element${entry.usageCount === 1 ? '' : 's'}`,
              (actions) => {
                const relinkBtn = document.createElement('button');
                relinkBtn.type = 'button';
                relinkBtn.textContent = 'Relink';
                relinkBtn.disabled = app.mode !== 'edit';
                relinkBtn.addEventListener('click', () => relinkReferenceAsset(entry.assetId));
                actions.appendChild(relinkBtn);
              }
            );
            section.appendChild(row);
          }
          els.assetManagerList.appendChild(section);
        }

        if (snapshot.missingLinkElements.length) {
          const section = document.createElement('div');
          section.className = 'asset-manager-section';
          const title = document.createElement('div');
          title.className = 'asset-manager-section-title';
          title.textContent = `Elements Missing Asset Links (${snapshot.missingLinkElements.length})`;
          section.appendChild(title);
          for (const entry of snapshot.missingLinkElements) {
            const row = buildAssetRow(
              `${entry.type} element ${entry.elementId}`,
              `${entry.message} | page ${entry.pageId}`,
              (actions) => {
                const selectBtn = document.createElement('button');
                selectBtn.type = 'button';
                selectBtn.textContent = 'Select';
                selectBtn.addEventListener('click', () => {
                  app.currentPageId = entry.pageId;
                  selectElement(entry.elementId, { source: 'pointer' });
                });
                actions.appendChild(selectBtn);
              }
            );
            section.appendChild(row);
          }
          els.assetManagerList.appendChild(section);
        }
      }

      function isLikelyUrl(input) {
        return /^[a-z][a-z0-9+.-]*:/i.test(input) || input.startsWith('//');
      }

      function inferKindFromMime(mimeType) {
        const value = String(mimeType || '').toLowerCase();
        if (value.startsWith('image/')) return 'image';
        if (value.startsWith('video/')) return 'video';
        if (value.startsWith('audio/')) return 'audio';
        return null;
      }

      function normalizeReferencePath(raw) {
        const input = String(raw || '').trim();
        if (!input) return '';
        const slashNormalized = input.replace(/\\/g, '/');

        if (/^file:\/\//i.test(slashNormalized)) {
          return slashNormalized;
        }

        if (/^[a-zA-Z]:\//.test(slashNormalized)) {
          const drivePath = slashNormalized.replace(/^([a-zA-Z]):/, (_, driveLetter) => `${driveLetter.toUpperCase()}:`);
          const encodedPath = drivePath
            .split('/')
            .map((part, index) => (index === 0 ? part : encodeURIComponent(part)))
            .join('/');
          return `file:///${encodedPath}`;
        }

        if (/^\/\/[^/]+\//.test(slashNormalized)) {
          const uncValue = slashNormalized.replace(/^\/\//, '');
          const segments = uncValue.split('/');
          const host = segments.shift() || '';
          const encodedPath = segments.map((part) => encodeURIComponent(part)).join('/');
          return encodedPath ? `file://${host}/${encodedPath}` : `file://${host}`;
        }

        if (isLikelyUrl(slashNormalized) || slashNormalized.startsWith('/')) {
          return slashNormalized;
        }
        const parts = slashNormalized.split('/');
        const output = [];
        for (const part of parts) {
          if (!part || part === '.') continue;
          if (part === '..') {
            if (output.length && output[output.length - 1] !== '..') {
              output.pop();
            } else {
              output.push('..');
            }
            continue;
          }
          output.push(part);
        }
        return output.join('/');
      }

      function normalizeImageBasePath(raw) {
        return normalizeReferencePath(raw);
      }

      function getEffectiveImageBasePath(pageId) {
        const page = app.document?.pages?.[pageId] || null;
        const pagePath = normalizeImageBasePath(page?.imagePath || '');
        if (pagePath) return pagePath;
        return normalizeImageBasePath(app.document?.storyBook?.imagePath || '');
      }

      function buildFallbackImageReference(fileName, pageId) {
        const basePath = getEffectiveImageBasePath(pageId);
        const cleanName = String(fileName || '').trim();
        if (!basePath) {
          return normalizeReferencePath(cleanName);
        }
        if (!cleanName) {
          return normalizeReferencePath(basePath);
        }
        const separator = basePath.endsWith('/') ? '' : '/';
        return normalizeReferencePath(`${basePath}${separator}${cleanName}`);
      }

      // Reference paths are edited as a directory part plus a file name part. Split on the
      // last separator so URLs and absolute paths round-trip unchanged through join.
