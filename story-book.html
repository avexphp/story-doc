                  // A file that will not decode still gets a page; it falls back to the book's
                  // default size and is reported, rather than being skipped for want of a size.
                  unmeasuredCount += 1;
                }
              }
              const newPageId = createId('page');
              const newPageObj = {
                id: newPageId,
                name: fileNameWithoutExtension(row.file?.name || `Page ${newPageCount + 1}`),
                width: docWidth,
                height: docHeight,
                imagePath: '',
                background: { type: 'solid', color: '#ffffff' },
                elementOrder: []
              };
              if (lastInsertedPageId) {
                insertPageAfter(lastInsertedPageId, newPageObj);
              } else if (intoGroupId) {
                // First page into an empty chapter: there is no neighbour to insert beside.
                app.document.pages[newPageId] = newPageObj;
                structAppendPageToGroup(newPageId, intoGroupId);
                syncDerivedFromStructure();
              } else {
                insertPageAfter(null, newPageObj);
              }
              lastInsertedPageId = newPageId;

              let element = null;
              if (row.mode === 'embedded') {
                const dataUri = await readFileAsDataUri(row.file);
                element = makeEmbeddedMediaElement(newPageId, 'image', row.file.name, row.file.type, dataUri, 0, 0);
              } else {
                // The review dialog shows the full effective path, so it wins as-is here;
                // re-applying the base path would double-prefix a user-edited path.
                let pathOrUrl = normalizeReferencePath(String(row.pathPreview || '').trim());
                if (!pathOrUrl) pathOrUrl = buildFallbackImageReference(row.file?.name || '', newPageId);
                element = makeImageElement(newPageId, pathOrUrl, 0, 0);
              }
              element.x = 0;
              element.y = 0;
              element.width = docWidth;
              element.height = docHeight;
              app.document.elements[element.id] = element;
              newPageObj.elementOrder.push(element.id);

              newPageCount += 1;
            } catch (error) {
              console.error(error);
              skippedCount += 1;
            }
            continue;
          }

          // Everything below places an element on a page. A chapter drop has no page to place
          // it on, so a non-image file (video, audio) is reported as skipped rather than
          // silently landing on whatever page happens to be current.
          if (!page) {
            skippedCount += 1;
            continue;
          }

          const x = Math.max(24, basePoint.x + addedCount * 18);
          const y = Math.max(24, basePoint.y + addedCount * 18);
          let element = null;

          if (row.mode === 'embedded') {
            try {
              const dataUri = await readFileAsDataUri(row.file);
              element = makeEmbeddedMediaElement(page.id, row.kind, row.file.name, row.file.type, dataUri, x, y);
            } catch (error) {
              console.error(error);
              skippedCount += 1;
              continue;
            }
          } else {
            let rawPath = String(row.pathPreview || '').trim();
            if (!rawPath && row.kind === 'image') {
              rawPath = buildFallbackImageReference(row.file?.name || '', page.id);
            }
            if (!rawPath) {
              skippedCount += 1;
              continue;
            }
            // Path shown in the review dialog is already the effective one; use it verbatim.
            const pathOrUrl = normalizeReferencePath(rawPath);
            if (row.kind === 'image') {
              element = makeImageElement(page.id, pathOrUrl, x, y);
            } else if (row.kind === 'video') {
              element = makeVideoElement(page.id, pathOrUrl, x, y);
            } else if (row.kind === 'audio') {
              element = makeAudioElement(page.id, pathOrUrl, x, y);
            }
          }

          if (!element) {
            skippedCount += 1;
            continue;
          }

          app.document.elements[element.id] = element;
          page.elementOrder.push(element.id);
          app.selectedElementId = element.id;
          addedCount += 1;
        }

        if (mutationStarted) {
          if (newPageCount > 0) {
            app.currentPageId = lastInsertedPageId;
            app.document.appState.currentPageId = lastInsertedPageId;
            app.selectedElementId = null;
          }
          setDirty();
          renderAll();
        }
        return { addedCount, newPageCount, skippedCount, sizedFromImageCount, unmeasuredCount };
      }

      // Handles a file drop against one of two destinations: the canvas, where resources become
      // elements on the current page, or a chapter in the page list, where images become new
      // pages appended to that chapter. A chapter has no canvas to position anything on, so a
      // chapter drop can only mean new pages and the review dialog's toggle is forced on.
      async function handleDroppedResources(event, target = null) {
        if (app.mode !== 'edit') return;
        const group = target && target.groupId ? getPageGroup(target.groupId) : null;
        const page = group ? null : getCurrentPage();
        if (!group && !page) return;
        // Reference paths are resolved against the current page even for a chapter drop: the
        // base path is a page/document setting, and the chapter may hold no page to ask.
        const pathContextPageId = page ? page.id : app.currentPageId;
        try {
          const dataTransfer = event.dataTransfer;
          const files = await getDroppedFiles(dataTransfer);
          if (!files.length) {
            els.statusText.textContent = 'No files were found in the drop';
            return;
          }

          const uriList = parseDroppedFileUriList(dataTransfer);
          const dropMode = getDropMode();
          const basePoint = page ? getDropPointOnPage(event, page) : { x: 0, y: 0 };
          const reviewRows = createDropReviewRows(files, uriList, dropMode, pathContextPageId);
          // Session memory wins over the document base path so repeat imports stay put.
          const initialGlobalPath = typeof app.lastImportDirPath === 'string'
            ? app.lastImportDirPath
            : getEffectiveImageBasePath(pathContextPageId);
          const reviewResult = await openDropReviewDialog(reviewRows, initialGlobalPath, {
            forceNewPages: Boolean(group),
            destinationName: group ? group.name : null
          });
          if (!reviewResult.approved) {
            els.statusText.textContent = 'Drop import canceled';
            return;
          }
          if (els.dropReviewGlobalPath) {
            app.lastImportDirPath = normalizeReferencePath(els.dropReviewGlobalPath.value || '');
          }

          const { addedCount, newPageCount, skippedCount, sizedFromImageCount, unmeasuredCount } =
            await importDroppedRows(
              reviewResult.rows, page, basePoint, reviewResult.newPageMode,
              {
                intoGroupId: group ? group.id : null,
                pageSizeFromImage: reviewResult.pageSizeFromImage
              }
            );

          const parts = [];
          if (addedCount) parts.push(`Added ${addedCount} resource${addedCount === 1 ? '' : 's'}`);
          if (newPageCount) parts.push(`Created ${newPageCount} new page${newPageCount === 1 ? '' : 's'}`);
          if (sizedFromImageCount) parts.push(`${sizedFromImageCount} sized from ${sizedFromImageCount === 1 ? 'its image' : 'their images'}`);
          // Named separately: a page at the default size among pages sized from their images is
          // a visible oddity, and the user should know which outcome they got.
          if (unmeasuredCount) parts.push(`${unmeasuredCount} could not be measured and used the default size`);
          if (skippedCount) parts.push(`${skippedCount} item${skippedCount === 1 ? '' : 's'} skipped`);
          if (parts.length) {
            els.statusText.textContent = parts.join('; ');
          } else {
            els.statusText.textContent = 'No supported media files found';
          }
        } catch (error) {
          console.error(error);
          els.statusText.textContent = 'Could not import dropped items';
        }
      }

      function createPage(copyFrom, options = {}) {
        if (app.mode !== 'edit') return;
        captureHistory();
        const source = copyFrom || {
          name: 'Page',
          width: Number(app.document.storyBook.width || 1200),
          height: Number(app.document.storyBook.height || 800),
          imagePath: '',
          background: { type: 'solid', color: '#ffffff' }
        };
        const pageId = createId('page');
        // A new page lands directly after the page it was created from and joins that page's
        // group (inherited from the anchor's container in the structure), matching duplicate
        // and paste. Falling through to the end would silently land it wherever the book ends.
        // `intoGroupId` is the exception: it names a chapter rather than a neighbouring page,
        // which is the only way to reach a chapter holding no pages yet.
        const anchorPageId = options.afterPageId || app.currentPageId;
        const page = {
          id: pageId,
          name: copyFrom ? `${source.name} Copy` : `Page ${app.document.storyBook.pageOrder.length + 1}`,
          width: source.width,
          height: source.height,
          imagePath: normalizeImageBasePath(source.imagePath || ''),
          background: cloneDoc(source.background || { type: 'solid', color: '#ffffff' }),
          elementOrder: []
        };
        app.document.pages[pageId] = page;
        if (!options.intoGroupId || !structAppendPageToGroup(pageId, options.intoGroupId)) {
          structInsertPageAdjacent(pageId, app.document.pages[anchorPageId] ? anchorPageId : null, false);
        }
        syncDerivedFromStructure();
        app.document.appState.currentPageId = pageId;
        app.currentPageId = pageId;
        app.selectedElementId = null;
        if (copyFrom) {
          clonePageElements(copyFrom, pageId, page.elementOrder);
        }
        setDirty();
        renderAll();
      }

      function clonePageElements(sourcePage, targetPageId, targetOrder) {
        for (const oldElementId of sourcePage.elementOrder || []) {
          const oldElement = app.document.elements[oldElementId];
          if (!oldElement) continue;
          const element = cloneDoc(oldElement);
          const newId = createId('el');
          element.id = newId;
          element.pageId = targetPageId;
          if (element.assetId && app.document.assets[element.assetId]) {
            const oldAsset = app.document.assets[element.assetId];
            const newAssetId = createId('asset');
            app.document.assets[newAssetId] = cloneDoc(oldAsset);
            app.document.assets[newAssetId].id = newAssetId;
            element.assetId = newAssetId;
          }
          element.x += 24;
          element.y += 24;
          app.document.elements[newId] = element;
          targetOrder.push(newId);
        }
      }

      function duplicatePageById(pageId) {
        duplicatePages([pageId]);
      }

      // Each copy lands directly after its own source, so a selection spanning chapters
      // produces copies that each stay in their source's chapter. Inserting the whole batch
      // after the last selected page would drag copies out of the chapters they came from.
      function duplicatePages(pageIds) {
        if (app.mode !== 'edit') return;
        const sources = (pageIds || []).filter((id) => app.document.pages[id]);
        if (!sources.length) return;
        captureHistory();
        const copies = [];
        for (const pageId of sources) {
          const source = app.document.pages[pageId];
          const nextPageId = createId('page');
          const duplicatedPage = {
            id: nextPageId,
            name: `${source.name} Copy`,
            width: source.width,
            height: source.height,
            imagePath: normalizeImageBasePath(source.imagePath || ''),
            background: cloneDoc(source.background || { type: 'solid', color: '#ffffff' }),
            elementOrder: []
          };
          app.document.pages[nextPageId] = duplicatedPage;
          // Inserted directly after its source, in the source's container, so it shares its group.
          structInsertPageAdjacent(nextPageId, pageId, false);
          clonePageElements(source, nextPageId, duplicatedPage.elementOrder);
          copies.push(nextPageId);
        }
        syncDerivedFromStructure();
        // The copies are what you now have in hand, so they become the selection and can be
        // moved somewhere without being picked out again.
        setPageSelection(copies, { current: copies[0] });
        app.selectedElementId = null;
        setDirty();
        renderAll();
        if (copies.length > 1) els.statusText.textContent = `Duplicated ${copies.length} pages`;
      }

      function deletePageById(pageId) {
        deletePages([pageId]);
      }

      function deletePages(pageIds) {
        if (app.mode !== 'edit') return;
        const targets = (pageIds || []).filter((id) => app.document.pages[id]);
        if (!targets.length) return;
        const order = app.document.storyBook.pageOrder;
        // The book must keep a page, so a selection covering all of them is refused outright
        // rather than being silently trimmed to all-but-one.
        if (targets.length >= order.length) {
          alert('A story book must have at least one page.');
          return;
        }
        const label = targets.length === 1
          ? app.document.pages[targets[0]].name
          : `${targets.length} pages`;
        if (!confirm(`Delete ${label}?`)) return;

        captureHistory();
        // Taken before the removals, so the survivor is chosen by where the batch used to be.
        const removedIndex = order.indexOf(targets[0]);
        for (const pageId of targets) {
          const page = app.document.pages[pageId];
          for (const elementId of page.elementOrder) {
            delete app.document.elements[elementId];
          }
          delete app.document.pages[pageId];
          structRemovePage(pageId);
        }
        syncDerivedFromStructure();

        const nextOrder = app.document.storyBook.pageOrder;
        const nextIndex = Math.max(0, Math.min(removedIndex, nextOrder.length - 1));
        const nextPageId = nextOrder[nextIndex] || null;
        app.currentPageId = nextPageId;
        app.document.appState.currentPageId = nextPageId;
        app.selectedElementId = null;
        setPageSelection(nextPageId ? [nextPageId] : [], { current: nextPageId });
        setDirty();
        renderAll();
        if (targets.length > 1) els.statusText.textContent = `Deleted ${targets.length} pages`;
      }

      function copyCurrentPage() {
        copyPages(getActionPageIds());
      }

      // The clipboard holds whole pages, deep-cloned at copy time, so editing or deleting the
      // originals afterwards cannot change what gets pasted. Session-only: never serialized.
      function copyPages(pageIds) {
        if (app.mode !== 'edit') return;
        const sources = (pageIds || []).filter((id) => app.document.pages[id]);
        if (!sources.length) return;
        app.clipboardPages = sources.map((id) => cloneDoc(app.document.pages[id]));
        els.statusText.textContent = sources.length === 1
          ? 'Page copied'
          : `${sources.length} pages copied`;
        renderAll();
      }

      function pasteClipboardPage(options = {}) {
        if (!app.clipboardPages.length || app.mode !== 'edit') return;
        // Pasting into a chapter appends to its end, matching Add Page to Chapter and dropped
        // images. Without a target the block follows the current page, joining its container.
        const intoGroupId = options.intoGroupId && getPageGroup(options.intoGroupId)
          ? options.intoGroupId
          : null;
        captureHistory();
        const pasted = [];
        // Each pasted page follows the one before it, so a copied block keeps its order and
        // lands as a block. The first joins the current page's container, hence its chapter.
        let anchorPageId = app.currentPageId;
        if (intoGroupId) {
          const group = getPageGroup(intoGroupId);
          // An empty chapter has no page to insert beside, which is the case that makes this
          // an action of its own rather than something reachable by navigating first.
          anchorPageId = group.pages.length ? group.pages[group.pages.length - 1] : null;
        }
        for (const source of app.clipboardPages) {
          const pageId = createId('page');
          const page = {
            id: pageId,
            name: `${source.name} Copy`,
            width: source.width,
            height: source.height,
            imagePath: normalizeImageBasePath(source.imagePath || ''),
            background: cloneDoc(source.background || { type: 'solid', color: '#ffffff' }),
            elementOrder: []
          };
          app.document.pages[pageId] = page;
          if (anchorPageId) {
            structInsertPageAdjacent(pageId, anchorPageId, false);
          } else if (intoGroupId) {
            structAppendPageToGroup(pageId, intoGroupId);
          } else {
            structInsertPageAdjacent(pageId, null, false);
          }
          clonePageElements(source, pageId, page.elementOrder);
          pasted.push(pageId);
          anchorPageId = pageId;
        }
        syncDerivedFromStructure();
        setPageSelection(pasted, { current: pasted[0] });
        app.selectedElementId = null;
        setDirty();
        renderAll();
        if (intoGroupId) {
          const name = getPageGroup(intoGroupId).name;
          els.statusText.textContent = pasted.length === 1
            ? `Pasted a page into ${name}`
            : `Pasted ${pasted.length} pages into ${name}`;
        } else if (pasted.length > 1) {
          els.statusText.textContent = `Pasted ${pasted.length} pages`;
        }
      }

      // The slot a page would move into, or null when it cannot. Each page moves only within
      // its own container (a chapter's page list, or the top level): a move that would cross a
      // chapter boundary is clamped rather than silently changing the page's chapter, so
      // Up/Down reorders within a chapter while dragging is what moves a page between them.
      function getPageMoveTarget(pageId, direction, blocked) {
        const loc = findPageLocation(pageId);
        if (!loc) return null;
        const list = loc.group ? loc.group.pages : getStructure();
        const from = loc.group ? loc.within : loc.topIndex;
        const to = from + direction;
        if (to < 0 || to >= list.length) return null;
        const neighbour = loc.group ? list[to] : (list[to].type === 'page' ? list[to].id : null);
        // A group-ref at the top level is a boundary, not something to swap with.
        if (!neighbour) return null;
        // A selected page never swaps past another selected page, or the block would scramble
        // its own order. A scattered selection therefore packs against the boundary first and
        // then travels as a unit.
        if (blocked && blocked.has(neighbour)) return null;
        return { list, from, to };
      }

      function canMovePages(pageIds, direction) {
        const blocked = new Set(pageIds);
        // If any page has a free neighbour it will move, and if none has, nothing can: every
        // other page is held up by a page that is itself held up, all the way to the boundary.
        return pageIds.some((pageId) => getPageMoveTarget(pageId, direction, blocked));
      }

      function moveCurrentPage(direction) {
        moveSelectedPages(direction);
      }

      function moveSelectedPages(direction) {
        if (app.mode !== 'edit') return;
        const ids = getActionPageIds();
        if (!ids.length || !canMovePages(ids, direction)) return;
        const blocked = new Set(ids);
        captureHistory();
        // Moving up, the topmost page goes first; moving down, the bottom one does. The other
        // order would have each page blocked by a sibling that has not moved out of the way yet.
        const sequence = direction < 0 ? ids : ids.slice().reverse();
        let moved = 0;
        let clamped = 0;
        for (const pageId of sequence) {
          const target = getPageMoveTarget(pageId, direction, blocked);
          if (!target) { clamped += 1; continue; }
          const { list, from, to } = target;
          [list[from], list[to]] = [list[to], list[from]];
          moved += 1;
        }
        syncDerivedFromStructure();
        setDirty();
        renderAll();
        if (ids.length > 1) {
          const where = direction < 0 ? 'up' : 'down';
          els.statusText.textContent = clamped
            ? `Moved ${moved} page${moved === 1 ? '' : 's'} ${where}; ${clamped} already at the edge of its chapter`
            : `Moved ${moved} pages ${where}`;
        }
      }

      // Relocate a block of pages next to a target page, keeping their relative order. Used by
      // drag and drop, where the block adopts the target's container and so its chapter.
      function movePagesAdjacentToPage(pageIds, targetPageId, before) {
        const ordered = app.document.storyBook.pageOrder
          .filter((id) => pageIds.includes(id) && id !== targetPageId);
        if (!ordered.length) return [];
        for (const pageId of ordered) structRemovePage(pageId);
        // Only the first lands against the target; each page after it follows the one before,
        // or inserting them all at the same point would reverse the block.
        let anchorPageId = targetPageId;
        let first = true;
        for (const pageId of ordered) {
          structInsertPageAdjacent(pageId, anchorPageId, first ? before : false);
          anchorPageId = pageId;
          first = false;
        }
        return ordered;
      }

      function movePagesIntoGroupAt(pageIds, groupId, atHead) {
        const group = getPageGroup(groupId);
        if (!group) return [];
        const ordered = app.document.storyBook.pageOrder.filter((id) => pageIds.includes(id));
        if (!ordered.length) return [];
        for (const pageId of ordered) structRemovePage(pageId);
        if (atHead) group.pages.unshift(...ordered);
        else group.pages.push(...ordered);
        return ordered;
      }

      // What a page drag carries: the whole selection when the dragged row is part of it, or
      // that row alone. The canvas title names one page, so a drag from it never widens.
      function getDraggedPageIds() {
        const dragged = app.pageDragState.pageId;
        if (!dragged) return [];
        if (app.pageDragState.fromTitle) return [dragged];
        return getActionPageIds(dragged);
      }

      function reportPagesMoved(count, where) {
        if (count > 1) els.statusText.textContent = `Moved ${count} pages to ${where}`;
      }

      function addElement(element) {
        const page = getCurrentPage();
        if (app.mode !== 'edit') return;
        if (!page) return;
        captureHistory();
        app.document.elements[element.id] = element;
        page.elementOrder.push(element.id);
        app.selectedElementId = element.id;
        setDirty();
        renderAll();
      }

      function createElementCopy(element) {
        const copy = cloneDoc(element);
        copy.id = createId('el');
        copy.x += 24;
        copy.y += 24;
        if (copy.assetId && app.document.assets[copy.assetId]) {
          const assetId = createId('asset');
          app.document.assets[assetId] = cloneDoc(app.document.assets[copy.assetId]);
          app.document.assets[assetId].id = assetId;
          copy.assetId = assetId;
        }
        const page = getCurrentPage();
        copy.pageId = page.id;
        return copy;
      }

      function copySelectedElement() {
        const element = getCurrentElement();
        if (!element || app.mode !== 'edit') return;
        app.clipboardElement = cloneDoc(element);
        els.statusText.textContent = 'Element copied';
        renderAll();
      }

      function pasteClipboardElement() {
        if (app.mode !== 'edit' || !app.clipboardElement) return;
        const page = getCurrentPage();
        if (!page) return;
        captureHistory();
        const pasted = createElementCopy(app.clipboardElement);
        pasted.pageId = page.id;
        app.document.elements[pasted.id] = pasted;
        page.elementOrder.push(pasted.id);
        app.selectedElementId = pasted.id;
        setDirty();
        renderAll();
      }

      function duplicateSelectedElement() {
        const element = getCurrentElement();
        if (app.mode !== 'edit') return;
        if (!element) return;
        duplicateElementById(element.id);
      }

      function duplicateElementById(elementId) {
        if (app.mode !== 'edit') return;
        const element = app.document.elements[elementId];
        if (!element) return;
        const page = app.document.pages[element.pageId];
        if (!page) return;

        const copy = createElementCopy(element);
        captureHistory();
        copy.pageId = page.id;
        app.document.elements[copy.id] = copy;
        page.elementOrder.push(copy.id);
        app.currentPageId = page.id;
        app.selectedElementId = copy.id;
        setDirty();
        renderAll();
      }

      function getPageElementIdsByZOrder(page) {
        if (!page) return [];
        return page.elementOrder
          .filter((id) => Boolean(app.document.elements[id]))
          .sort((aId, bId) => {
            const a = app.document.elements[aId];
            const b = app.document.elements[bId];
            return (Number(a?.zIndex) || 0) - (Number(b?.zIndex) || 0);
          });
      }

      function applyPageZOrder(page, orderedIds) {
        if (!page) return;
        orderedIds.forEach((id, index) => {
          const item = app.document.elements[id];
          if (item) item.zIndex = index + 1;
        });
      }

      function bringElementToFront(elementId) {
        if (app.mode !== 'edit') return;
        const element = app.document.elements[elementId];
        if (!element) return;
        const page = app.document.pages[element.pageId];
        if (!page) return;
        const orderedIds = getPageElementIdsByZOrder(page);
        if (!orderedIds.length || orderedIds[orderedIds.length - 1] === element.id) return;
        captureHistory();
        const nextOrder = orderedIds.filter((id) => id !== element.id);
        nextOrder.push(element.id);
        applyPageZOrder(page, nextOrder);
        app.selectedElementId = element.id;
        setDirty();
        renderAll();
      }

      function sendElementToBack(elementId) {
        if (app.mode !== 'edit') return;
        const element = app.document.elements[elementId];
        if (!element) return;
        const page = app.document.pages[element.pageId];
        if (!page) return;
        const orderedIds = getPageElementIdsByZOrder(page);
        if (!orderedIds.length || orderedIds[0] === element.id) return;
        captureHistory();
        const nextOrder = orderedIds.filter((id) => id !== element.id);
        nextOrder.unshift(element.id);
        applyPageZOrder(page, nextOrder);
        app.selectedElementId = element.id;
        setDirty();
        renderAll();
      }

      function fitElementToPage(elementId) {
        if (app.mode !== 'edit') return;
        const element = app.document.elements[elementId];
        if (!element) return;
        const page = app.document.pages[element.pageId];
        if (!page) return;

        const nextX = 0;
        const nextY = 0;
        const nextWidth = Math.max(1, Number(page.width) || 1);
        const nextHeight = Math.max(1, Number(page.height) || 1);

        if (
          Math.round(Number(element.x) || 0) === nextX
          && Math.round(Number(element.y) || 0) === nextY
          && Math.round(Number(element.width) || 0) === nextWidth
          && Math.round(Number(element.height) || 0) === nextHeight
        ) {
          return;
        }

        captureHistory();
        element.x = nextX;
        element.y = nextY;
        element.width = nextWidth;
        element.height = nextHeight;
        app.currentPageId = page.id;
        app.selectedElementId = element.id;
        setDirty();
        renderAll();
      }

      function bringSelectedElementToFront() {
        const element = getCurrentElement();
        if (!element || app.mode !== 'edit') return;
        bringElementToFront(element.id);
      }

      function sendSelectedElementToBack() {
        const element = getCurrentElement();
        if (!element || app.mode !== 'edit') return;
        sendElementToBack(element.id);
      }

      function deleteSelectedElement() {
        const element = getCurrentElement();
        if (app.mode !== 'edit') return;
        if (!element) return;
        deleteElementById(element.id);
      }

      function deleteElementById(elementId) {
        if (app.mode !== 'edit') return;
        const element = app.document.elements[elementId];
        if (!element) return;
        const page = app.document.pages[element.pageId];
        if (!page) return;
        if (!confirm(`Delete ${element.type} element?`)) return;

        captureHistory();
        page.elementOrder = page.elementOrder.filter((id) => id !== element.id);
        delete app.document.elements[element.id];
        if (app.selectedElementId === element.id) {
          app.selectedElementId = null;
        }
        setDirty();
        renderAll();
      }

      function addElementFromCanvas(kind, x, y) {
        if (app.mode !== 'edit') return;
        const page = getCurrentPage();
        if (!page) return;

        if (kind === 'text') {
          addElement(makeTextElement(page.id, x, y));
          return;
        }
        if (kind === 'image') {
          const src = prompt('Enter image URL, relative path, absolute path, or file:/// URL');
          if (!src) return;
          addElement(makeImageElement(page.id, src, x, y));
          return;
        }
        if (kind === 'video') {
          const src = prompt('Enter video URL, relative path, absolute path, or file:/// URL');
          if (!src) return;
          addElement(makeVideoElement(page.id, src, x, y));
          return;
        }
        if (kind === 'audio') {
          const src = prompt('Enter audio URL, relative path, absolute path, or file:/// URL');
          if (!src) return;
          addElement(makeAudioElement(page.id, src, x, y));
          return;
        }
        if (kind === 'embedded-image') {
          app.pendingEmbeddedInsert = { pageId: page.id, x, y };
          els.embeddedImageInput.click();
        }
      }

      function nudgeSelectedElement(dx, dy) {
        const element = getCurrentElement();
        if (!element || app.mode !== 'edit') return;
        app.focusSource = 'keyboard';
        captureHistory();
        element.x = Math.round((element.x || 0) + dx);
        element.y = Math.round((element.y || 0) + dy);
        setDirty();
        renderAll();
      }

      function resizeSelectedElement(dw, dh) {
        const element = getCurrentElement();
        if (!element || app.mode !== 'edit') return;
        app.focusSource = 'keyboard';
        captureHistory();
        element.width = Math.max(24, Math.round((element.width || 24) + dw));
        element.height = Math.max(24, Math.round((element.height || 24) + dh));
        setDirty();
        renderAll();
      }

      function rotateSelectedElement(delta) {
        const element = getCurrentElement();
        if (!element || app.mode !== 'edit') return;
        app.focusSource = 'keyboard';
        captureHistory();
        element.rotation = normalizeRotation((element.rotation || 0) + delta);
        setDirty();
        renderAll();
      }

      function selectElement(elementId, opts = {}) {
        if (app.selectedElementId === elementId && !opts.keepEditing) return;
        app.selectedElementId = elementId;
        app.focusSource = opts.source || app.focusSource || 'pointer';
        if (!opts.keepEditing) app.editingElementId = null;
        renderAll();
      }

      function isRepeatTextClick(elementId, timeStamp) {
        const last = app.lastTextClick;
        app.lastTextClick = { elementId, timeStamp };
        return Boolean(last && last.elementId === elementId && (timeStamp - last.timeStamp) < 450);
      }

      function setMode(mode) {
        app.mode = mode;
        app.lastTextClick = null;
        if (mode === 'view') {
          app.selectedElementId = null;
          app.editingElementId = null;
          app.focusSource = 'pointer';
          els.statusText.textContent = 'View mode: editing disabled';
        } else {
          els.statusText.textContent = app.dirty ? 'Unsaved changes' : 'Saved';
        }
        renderAll();
      }

      function setZoom(zoom) {
        app.zoom = Math.min(2.5, Math.max(0.35, zoom));
        renderAll();
      }

      // Whether the canvas overflows its viewport along one axis. Asked per axis because in
      // view mode each arrow pair decides independently whether it pans or turns the page.
      function canvasAxisOverflows(axis) {
        const wrap = els.canvasWrap;
        if (!wrap) return false;
        return axis === 'x'
          ? wrap.scrollWidth > wrap.clientWidth + 1
          : wrap.scrollHeight > wrap.clientHeight + 1;
      }

      function canvasCanScroll() {
        return canvasAxisOverflows('x') || canvasAxisOverflows('y');
      }

      // Arrow-key panning of the zoomed canvas. In edit mode only reachable when no element
      // is selected, so nudging a selected element keeps the arrows; in view mode reached
      // whenever the pressed arrow's own axis overflows.
      function panCanvas(key, coarse) {
        const wrap = els.canvasWrap;
        if (!wrap) return;
        const step = coarse ? 240 : 48;
        if (key === 'ArrowLeft') wrap.scrollLeft -= step;
        else if (key === 'ArrowRight') wrap.scrollLeft += step;
        else if (key === 'ArrowUp') wrap.scrollTop -= step;
        else if (key === 'ArrowDown') wrap.scrollTop += step;
      }

      function navigatePage(direction) {
        const pageOrder = app.document.storyBook.pageOrder;
        const currentIndex = pageOrder.indexOf(app.currentPageId);
        const nextIndex = currentIndex + direction;
        if (currentIndex < 0 || nextIndex < 0 || nextIndex >= pageOrder.length) return;
        app.currentPageId = pageOrder[nextIndex];
        app.selectedElementId = null;
        app.editingElementId = null;
        app.lastTextClick = null;
        renderAll();
      }

      const THUMB_MAX_W = 48;
      const THUMB_MAX_H = 40;

      // Changes whenever anything visible in the thumbnail changes, so cached nodes can be
      // reused across the many renderAll() calls that do not touch page content.
      function getPageThumbSignature(page) {
        const parts = [page.width, page.height, page.background?.color || ''];
        for (const element of getPageElements(page)) {
          const asset = element.assetId ? app.document.assets[element.assetId] : null;
          parts.push([
            element.type,
            Math.round(element.x), Math.round(element.y),
            Math.round(element.width), Math.round(element.height),
            element.zIndex || 0,
            asset ? (asset.dataUri ? `d${asset.dataUri.length}` : asset.pathOrUrl || '') : ''
          ].join(','));
        }
        return parts.join('|');
      }

      function renderPageThumbnail(page) {
        const thumb = document.createElement('div');
        thumb.className = 'page-thumb';
        thumb.style.background = page.background && page.background.type === 'solid' ? page.background.color || '#ffffff' : '#ffffff';

        // Frame follows the page's own aspect ratio. It used to be a fixed 54x72 portrait box,
        // so a 3:2 landscape page drew into the top half and left the rest blank.
        const pw = Math.max(page.width || 1, 1);
        const ph = Math.max(page.height || 1, 1);
        const scale = Math.min(THUMB_MAX_W / pw, THUMB_MAX_H / ph);
        thumb.style.width = `${Math.round(pw * scale)}px`;
        thumb.style.height = `${Math.round(ph * scale)}px`;

        for (const element of getPageElements(page)) {
          const preview = document.createElement('div');
          preview.className = `page-thumb-element ${element.type}`;
          preview.style.left = `${Math.max(0, element.x * scale)}px`;
          preview.style.top = `${Math.max(0, element.y * scale)}px`;
          preview.style.width = `${Math.max(2, element.width * scale)}px`;
          preview.style.height = `${Math.max(2, element.height * scale)}px`;
          preview.style.zIndex = `${element.zIndex || 0}`;

          // Real artwork rather than a coloured box: a story book page is recognised by its
          // picture. Resolved the same way the canvas does.
          if (element.type === 'image') {
            const asset = element.assetId ? app.document.assets[element.assetId] : null;
            const source = asset ? (asset.dataUri || asset.pathOrUrl) : '';
            if (source) {
              const img = document.createElement('img');
              img.src = source;
              img.alt = '';
              img.draggable = false;
              img.loading = 'lazy';
              // A broken reference falls back to the placeholder styling.
              img.addEventListener('error', () => img.remove(), { once: true });
              preview.appendChild(img);
              preview.classList.add('has-image');
            }
          }

          thumb.appendChild(preview);
        }

        return thumb;
      }

      function buildPageThumbnail(page) {
        const signature = getPageThumbSignature(page);
        const cached = app.thumbCache.get(page.id);
        if (cached && cached.signature === signature) {
          return cached.node;
        }
        const node = renderPageThumbnail(page);
        app.thumbCache.set(page.id, { signature, node });
        return node;
      }

      function pruneThumbCache() {
        for (const pageId of app.thumbCache.keys()) {
          if (!app.document?.pages?.[pageId]) app.thumbCache.delete(pageId);
        }
      }

      function buildPageGroupHeader(run, runIndex, runCount, dragState) {
        const group = run.group;
        const header = document.createElement('div');
        header.className = `page-group-header${group.collapsed ? ' collapsed' : ''}`;
        header.setAttribute('draggable', app.mode === 'edit' ? 'true' : 'false');
        // Lets a freshly created chapter be found after the re-render that built this node,
        // which is how Move to New Chapter opens the rename editor on it.
        header.dataset.groupId = group.id;

        const twisty = document.createElement('button');
        twisty.type = 'button';
        twisty.className = 'page-group-twisty';
        twisty.textContent = group.collapsed ? '▸' : '▾';
        twisty.title = group.collapsed ? 'Expand chapter' : 'Collapse chapter';
        twisty.setAttribute('aria-expanded', group.collapsed ? 'false' : 'true');
        twisty.addEventListener('click', (event) => {
          event.stopPropagation();
          togglePageGroupCollapsed(group.id);
        });

        const label = document.createElement('div');
        label.className = 'page-group-label';
        label.textContent = group.name;
        label.title = 'Double-click to rename';
        // Single click on the label is swallowed so it cannot collapse the group out from
        // under a double-click; collapsing stays on the twisty and the rest of the header.
        label.addEventListener('click', (event) => event.stopPropagation());
        label.addEventListener('dblclick', (event) => {
          if (app.mode !== 'edit') return;
          event.preventDefault();
          event.stopPropagation();
          startInlineRename(label, group.name, (nextName) => renamePageGroupTo(group.id, nextName));
        });

        const count = document.createElement('span');
        count.className = 'page-group-count';
        count.textContent = `${run.pageIds.length}`;

        header.appendChild(twisty);
        header.appendChild(label);
        header.appendChild(count);

        header.addEventListener('click', () => togglePageGroupCollapsed(group.id));
        header.addEventListener('contextmenu', (event) => {
          if (app.mode !== 'edit') return;
          event.preventDefault();
          event.stopPropagation();
          showContextMenu(event.clientX, event.clientY, [
            {
              label: 'Add Page to Chapter',
              onSelect: () => addPageToGroup(group.id)
            },
            {
              label: app.clipboardPages.length > 1
                ? `Paste ${app.clipboardPages.length} Pages into Chapter`
                : 'Paste Page into Chapter',
              disabled: !app.clipboardPages.length,
              onSelect: () => pasteIntoGroup(group.id)
            },
            {
              label: 'Rename Chapter',
              onSelect: () => startInlineRename(label, group.name, (nextName) => renamePageGroupTo(group.id, nextName))
            },
            { separator: true },
            {
              label: 'Move Chapter Up',
              disabled: runIndex <= 0,
              onSelect: () => movePageGroupByOffset(group.id, -1)
            },
            {
              label: 'Move Chapter Down',
              disabled: runIndex >= runCount - 1,
              onSelect: () => movePageGroupByOffset(group.id, 1)
            },
            { separator: true },
            {
              // The label carries the reassurance because this is the only chapter-level
              // removal there is, and "Ungroup" did not say what happened to the pages.
              label: 'Remove Chapter (Keep Pages)',
              danger: true,
              onSelect: () => deletePageGroup(group.id)
            }
          ]);
        });

        // Dragging a header moves the whole run, so groups relocate as a unit.
        header.addEventListener('dragstart', (event) => {
          if (app.mode !== 'edit') return;
          dragState.runIndex = runIndex;
          dragState.pageIndex = null;
          header.classList.add('dragging');
          event.dataTransfer.effectAllowed = 'move';
          event.dataTransfer.setData('text/plain', group.id);
        });
        header.addEventListener('dragend', () => {
          dragState.runIndex = null;
          header.classList.remove('dragging');
          clearPageListDropHighlights();
        });
        header.addEventListener('dragover', (event) => {
          if (app.mode !== 'edit') return;
          event.preventDefault();
          if (!isPageReorderDragActive()) event.dataTransfer.dropEffect = 'copy';
          clearPageListDropHighlights();
          header.classList.add('drag-over');
        });
        header.addEventListener('dragleave', () => header.classList.remove('drag-over'));
        header.addEventListener('drop', (event) => {
          if (app.mode !== 'edit') return;
          event.preventDefault();
          event.stopPropagation();
          header.classList.remove('drag-over');
          // Files dropped on a header import into that chapter. Anything with a page drag in
          // flight is a reorder, so the two gestures never compete for the same drop.
          if (!isPageReorderDragActive()) {
            // Not awaited: dataTransfer items are readable only during dispatch, and
            // handleDroppedResources reads them before its first await.
            handleDroppedResources(event, { groupId: group.id });
            return;
          }
          if (dragState.runIndex !== null && dragState.runIndex !== runIndex) {
            movePageRunToRunIndex(dragState.runIndex, runIndex);
          } else if (dragState.pageId) {
            // Pages dropped on a header join that chapter at its head, keeping their order.
            const dragged = getDraggedPageIds();
            if (dragged.length && getPageGroup(run.groupId)) {
              captureHistory();
              const moved = movePagesIntoGroupAt(dragged, run.groupId, true);
              syncDerivedFromStructure();
              setDirty();
              renderAll();
              reportPagesMoved(moved.length, group.name);
            }
          }
          dragState.runIndex = null;
          dragState.pageIndex = null;
          dragState.pageId = null;
        });

        return header;
      }

      // Scrolls the page list to the current page, expanding its group if needed. Only ever
      // runs on an explicit user request, never automatically, so it cannot fight keyboard
      // paging or move the panel out from under someone mid-task.
      function revealCurrentPageInList(options = {}) {
        const { expandGroup = true, flash = true } = options;
        const page = getCurrentPage();
        if (!page || !els.pageList) return;
        if (app.fullscreen) {
          els.statusText.textContent = 'Page list is hidden in full screen';
          return;
        }
        const group = page.groupId ? getPageGroup(page.groupId) : null;
        if (group && group.collapsed && expandGroup) {
          // Expanding is honest here: the user asked to see where this page lives. Skipped
          // when called from dragstart, where re-rendering the list would cancel the drag.
          group.collapsed = false;
          setDirty();
          renderPageList();
        }
        const row = els.pageList.querySelector(`[data-page-id="${page.id}"]`);
        if (!row) return;
        row.scrollIntoView({ block: 'nearest' });
        if (!flash) return;
        row.classList.remove('reveal-flash');
        // Force a reflow so the animation restarts on repeated reveals.
        void row.offsetWidth;
        row.classList.add('reveal-flash');
      }

      // Native drag does not scroll a list for you, so a drag held near either edge of the
      // page list scrolls it. Without this, dropping onto a far-away page is impractical in
      // exactly the long books this feature exists for.
      function autoScrollPageListDuringDrag(event) {
        const list = els.pageList;
        if (!list) return;
        const rect = list.getBoundingClientRect();
        const zone = 48;
        const step = 18;
        if (event.clientY < rect.top + zone) {
          list.scrollTop -= step;
        } else if (event.clientY > rect.bottom - zone) {
          list.scrollTop += step;
        }
      }

      function clearPageListDropHighlights() {
        Array.from(els.pageList.querySelectorAll('.drag-over'))
          .forEach((el) => el.classList.remove('drag-over'));
      }

      function applyPageListDensity() {
        if (els.pageList) {
          els.pageList.classList.toggle('compact', app.pageListCompact);
        }
        if (buttons.pageDensity) {
          buttons.pageDensity.textContent = app.pageListCompact ? '▦' : '▤';
          buttons.pageDensity.title = app.pageListCompact ? 'Switch to thumbnails' : 'Switch to compact list';
        }
      }

      function renderPageList() {
        els.pageList.innerHTML = '';
        pruneThumbCache();
        const dragState = app.pageDragState;
        const runs = getPageRuns();

        // Iterate runs, not pageOrder, so an empty group still renders its header. Each group
        // run emits a header; a collapsed or empty group emits the header only.
        let i = -1;
        for (let runIndex = 0; runIndex < runs.length; runIndex += 1) {
          const run = runs[runIndex];
          const runInfo = { run, runIndex };
          if (run.groupId) {
            els.pageList.appendChild(buildPageGroupHeader(run, runIndex, runs.length, dragState));
          }
          if (run.group && run.group.collapsed) { i += run.pageIds.length; continue; }
          if (run.groupId && run.pageIds.length === 0) {
            const emptyHint = document.createElement('div');
            emptyHint.className = 'page-group-empty';
            emptyHint.textContent = 'Empty chapter — click to add a page, or drop pages and images here';
            emptyHint.title = 'Click to add a page. Existing pages and image files can also be dropped here.';
            emptyHint.addEventListener('click', () => addPageToGroup(run.groupId));
            // Two kinds of drag land here: an existing page being moved in, and image files
            // being imported as new pages. They are told apart by whether a page drag is active.
            emptyHint.addEventListener('dragover', (event) => {
              if (app.mode !== 'edit') return;
              if (!dragState.pageId && !hasDroppedResourcePayload(event.dataTransfer)) return;
              event.preventDefault();
              if (!dragState.pageId) event.dataTransfer.dropEffect = 'copy';
              clearPageListDropHighlights();
              emptyHint.classList.add('drag-over');
            });
            emptyHint.addEventListener('dragleave', () => emptyHint.classList.remove('drag-over'));
            emptyHint.addEventListener('drop', (event) => {
              if (app.mode !== 'edit') return;
              event.preventDefault();
              event.stopPropagation();
              emptyHint.classList.remove('drag-over');
              const draggedId = dragState.pageId;
              const groupItem = getPageGroup(run.groupId);
              if (!draggedId && !isPageReorderDragActive()) {
                // Called without await: dataTransfer items are only readable during dispatch,
                // and handleDroppedResources reads them before its first await.
                handleDroppedResources(event, { groupId: run.groupId });
                return;
              }
              if (draggedId && groupItem) {
                captureHistory();
                const moved = movePagesIntoGroupAt(getDraggedPageIds(), run.groupId, false);
                syncDerivedFromStructure();
                setDirty();
                renderAll();
                reportPagesMoved(moved.length, groupItem.name);
              }
              dragState.pageId = null;
              dragState.pageIndex = null;
              dragState.runIndex = null;
            });
            els.pageList.appendChild(emptyHint);
          }
          for (const pageId of run.pageIds) {
            i += 1;
            const page = app.document.pages[pageId];
            if (!page) continue;

          const item = document.createElement('div');
          const grouped = Boolean(runInfo && runInfo.run.groupId);
          const selectedRow = isPageSelected(pageId);
          item.className = `page-item${pageId === app.currentPageId ? ' active' : ''}`
            + `${selectedRow ? ' selected' : ''}${grouped ? ' grouped' : ''}`;
          item.setAttribute('draggable', app.mode === 'edit' ? 'true' : 'false');
          item.dataset.pageIndex = i;
          item.dataset.pageId = pageId;
          const main = document.createElement('div');
          main.className = 'page-item-main';
          // Not built at all in compact mode. Hiding them with CSS would still construct every
          // node and assign every data-URI src, which is the cost compact mode exists to avoid.
          if (!app.pageListCompact) {
            main.appendChild(buildPageThumbnail(page));
          }

          const meta = document.createElement('div');
          meta.className = 'page-meta';
          // Built as nodes rather than innerHTML so a page name containing markup is shown
          // literally instead of being parsed as HTML.
          const nameEl = document.createElement('strong');
          nameEl.className = 'page-name';
          nameEl.textContent = page.name;
          nameEl.title = 'Double-click to rename';
          nameEl.addEventListener('dblclick', (event) => {
            if (app.mode !== 'edit') return;
            event.preventDefault();
            event.stopPropagation();
            startInlineRename(nameEl, page.name, (nextName) => renamePageTo(pageId, nextName));
          });
          const dimsEl = document.createElement('small');
          dimsEl.textContent = `${page.width} × ${page.height}`;
          meta.appendChild(nameEl);
          meta.appendChild(document.createElement('br'));
          meta.appendChild(dimsEl);
          main.appendChild(meta);

          const chevron = document.createElement('div');
          chevron.textContent = '›';

          item.appendChild(main);
          item.appendChild(chevron);
          item.addEventListener('click', (event) => {
            if (event.ctrlKey || event.metaKey) {
              togglePageInSelection(pageId);
              renderAll();
              return;
            }
            if (event.shiftKey) {
              selectPageRangeTo(pageId);
              renderAll();
              return;
            }
            // Re-rendering replaces this node, which would swallow the second click of a
            // double-click. When the click changes nothing there is nothing to re-render.
            const selected = getSelectedPageIds();
            const alreadyAlone = selected.length === 1 && selected[0] === pageId;
            if (app.currentPageId === pageId && !app.selectedElementId && alreadyAlone) return;
            setPageSelection([pageId], { current: pageId });
            app.selectedElementId = null;
            renderAll();
          });
          item.addEventListener('contextmenu', (event) => {
            if (app.mode !== 'edit') return;
            event.preventDefault();
            event.stopPropagation();
            // Right-clicking inside the selection keeps it and acts on all of it; right-clicking
            // outside replaces it, so the menu can never act on rows you cannot see it aimed at.
            const targets = getActionPageIds(pageId);
            if (!isPageSelected(pageId)) {
              setPageSelection([pageId], { current: pageId });
              app.selectedElementId = null;
            }
            const many = targets.length > 1;
            renderAll();
            // A chapter is offered when at least one target page is not already in it, so a
            // selection spanning chapters can still be gathered into any of them.
            const groupEntries = Object.values(getPageGroups())
              .filter((group) => targets.some((id) => (app.document.pages[id]?.groupId || null) !== group.id))
              .map((group) => ({
                label: many ? `Move ${targets.length} Pages to ${group.name}` : `Move to ${group.name}`,
                onSelect: () => setPagesGroup(targets, group.id)
              }));
            showContextMenu(event.clientX, event.clientY, [
              {
                // "Add" read as "append to the end of the book", which is what Slice 43 stopped
                // doing: the page lands directly after the one it was created from.
                label: 'Insert Page After',
                onSelect: () => createPage(null, { afterPageId: pageId })
              },
              {
                label: many ? `Duplicate ${targets.length} Pages` : 'Duplicate Page',
                onSelect: () => duplicatePages(targets)
              },
              { separator: true },
              // One "where does this page live" family. Moving to a new chapter belongs here
              // rather than as its own concept: it is a move that creates its destination.
              ...groupEntries,
              {
                label: many ? `Move ${targets.length} Pages to New Chapter` : 'Move to New Chapter',
                onSelect: () => movePagesToNewChapter(targets)
              },
              {
                label: many ? `Remove ${targets.length} Pages From Chapter` : 'Remove From Chapter',
                // Offered while any target is in a chapter; those already outside one are skipped.
                disabled: !targets.some((id) => app.document.pages[id]?.groupId),
                onSelect: () => setPagesGroup(targets, null)
              },
              { separator: true },
              {
                label: many ? `Delete ${targets.length} Pages` : 'Delete Page',
                danger: true,
                onSelect: () => deletePages(targets)
              }
            ]);
          });
          // Drag and drop events
          item.addEventListener('dragstart', (e) => {
            if (app.mode !== 'edit') return;
            dragState.pageIndex = i;
            dragState.pageId = pageId;
            dragState.runIndex = null;
            dragState.fromTitle = false;
            item.classList.add('dragging');
            e.dataTransfer.effectAllowed = 'move';
            e.dataTransfer.setData('text/plain', pageId);
          });
          item.addEventListener('dragend', () => {
            dragState.pageIndex = null;
            dragState.pageId = null;
            dragState.runIndex = null;
            item.classList.remove('dragging');
            clearPageListDropHighlights();
          });
          item.addEventListener('dragover', (e) => {
            if (app.mode !== 'edit') return;
            e.preventDefault();
            clearPageListDropHighlights();
            item.classList.add('drag-over');
          });
          item.addEventListener('dragleave', () => {
            item.classList.remove('drag-over');
          });
          item.addEventListener('drop', (e) => {
            if (app.mode !== 'edit') return;
            e.preventDefault();
            item.classList.remove('drag-over');
            // A whole group was dragged onto one of its sibling pages: move the run instead.
            if (dragState.runIndex !== null) {
              const targetRunIndex = runInfo ? runInfo.runIndex : null;
              if (targetRunIndex !== null) movePageRunToRunIndex(dragState.runIndex, targetRunIndex);
              dragState.runIndex = null;
              dragState.pageIndex = null;
              return;
            }
            const dragged = getDraggedPageIds().filter((id) => id !== pageId);
            if (dragged.length) {
              captureHistory();
              // The dragged pages move next to the drop target, into the target's container, so
              // they adopt that page's chapter and the structure stays contiguous.
              const moved = movePagesAdjacentToPage(dragged, pageId, true);
              syncDerivedFromStructure();
              setDirty();
              renderAll();
              reportPagesMoved(moved.length, app.document.pages[pageId].name
                ? `before ${app.document.pages[pageId].name}`
                : 'a new position');
            }
            dragState.pageIndex = null;
            dragState.pageId = null;
            dragState.runIndex = null;
          });
          els.pageList.appendChild(item);
          }
        }

        applyPageListDensity();
      }

      function renderInspector() {
        const doc = app.document;
        const page = getCurrentPage();
        const element = getCurrentElement();

        els.bookTitle.value = doc.storyBook.title || '';
        els.bookWidth.value = doc.storyBook.width || 1200;
        els.bookHeight.value = doc.storyBook.height || 800;
        els.bookImagePath.value = doc.storyBook.imagePath || '';
        if (els.bookDropMode) els.bookDropMode.value = getDropMode();

        if (page) {
          els.pageName.value = page.name || '';
          els.pageWidth.value = page.width || 1200;
          els.pageHeight.value = page.height || 800;
          els.pageImagePath.value = page.imagePath || '';
        }

        if (element) {
          els.elementType.value = element.type;
          updateGeometryFields(element);
          if (element.type === 'text') {
            els.elementContent.value = element.text || '';
            els.assetStatus.textContent = 'Asset status: Not applicable';
            els.assetStatus.classList.remove('warn');
          } else if (element.type === 'image' || element.type === 'video' || element.type === 'audio') {
            const asset = element.assetId ? doc.assets[element.assetId] : null;
            if (asset?.sourceType === 'embedded') {
              els.elementContent.value = `[embedded] ${asset.fileName || asset.mimeType || 'image'}`;
            } else {

        } else {

          els.elementY.value = '';
          els.elementW.value = '';

          els.elementRotation.value = '';
          els.elementContent.value = '';
          els.assetStatus.textContent = 'Asset status: No selection';
          els.assetStatus.classList.remove('warn');

          els.elementLoop.checked = false;

          els.elementTextAlign.value = 'left';

        const hasElement = Boolean(element);
        const isTextElement = hasElement && element.type === 'text';
        const isAssetElement = hasElement && (element.type === 'image' || element.type === 'video' || element.type === 'audio');

        }

        const inspectorDisabled = app.mode !== 'edit';
        for (const input of [els.bookTitle, els.bookWidth, els.bookHeight, els.bookImagePath, els.bookDropMode, els.pageName, els.pageWidth, els.pageHeight, els.pageImagePath, els.elementX, els.elementY, els.elementW, els.elementH, els.elementRotation, els.elementContent, els.elementFontSize, els.elementFontWeight, els.elementFontFamily, els.elementTextAlign, els.elementLineHeight, els.elementFontColor, els.elementBackgroundColor, els.elementBackgroundTransparent]) {

        els.elementFontWeight.disabled = inspectorDisabled || !isText;
        els.elementFontFamily.disabled = inspectorDisabled || !isText;
        els.elementTextAlign.disabled = inspectorDisabled || !isText;

      function renderStage() {

              img.alt = element.altText || 'Image';
              img.src = asset.dataUri || asset.pathOrUrl;
              img.draggable = false;
              img.addEventListener('dragstart', (event) => {
                event.preventDefault();

              if (!asset.dataUri) {
                img.addEventListener('error', () => {

                });
                img.addEventListener('load', () => {
                  setAssetIssue(element.assetId, null);
                });

              media.src = source;
              media.controls = element.controls !== false;
              media.loop = Boolean(element.loop);
              media.autoplay = Boolean(element.autoplay);
              media.draggable = false;
              media.addEventListener('dragstart', (event) => {
                event.preventDefault();
              });
              media.style.width = '100%';
              media.style.height = '100%';
              media.style.display = 'block';
              media.style.background = '#000';
              if (!asset?.dataUri) {
                media.addEventListener('error', () => {
                  setAssetIssue(element.assetId, { code: 'runtime-missing', message: 'Video failed to load' });
                });
                media.addEventListener('loadedmetadata', () => {
                  setAssetIssue(element.assetId, null);
                });
              }

            } else {
              setAssetIssue(element.assetId, { code: 'missing-path', message: 'Missing video reference path or URL' }, { silent: true });

              wrap.className = 'placeholder';
              wrap.style.background = 'linear-gradient(135deg, rgba(249,115,22,0.12), rgba(59,130,246,0.1))';
              const media = document.createElement('audio');

              media.loop = Boolean(element.loop);
              media.autoplay = Boolean(element.autoplay);

              media.style.width = '100%';
              if (!asset?.dataUri) {
                media.addEventListener('error', () => {
                  setAssetIssue(element.assetId, { code: 'runtime-missing', message: 'Audio failed to load' });
                });
                media.addEventListener('loadedmetadata', () => {
                  setAssetIssue(element.assetId, null);

              }
              wrap.appendChild(media);
              elementEl.appendChild(wrap);
            } else {
              setAssetIssue(element.assetId, { code: 'missing-path', message: 'Missing audio reference path or URL' }, { silent: true });
              const placeholder = document.createElement('div');

              placeholder.textContent = 'Missing audio reference';
              elementEl.appendChild(placeholder);

                {

                  onSelect: () => bringElementToFront(element.id)

                },

      function renderAll() {

        buttons.copyPage.disabled = !isEdit || !selectedCount;

      function syncDocFromInspector() {
        if (app.mode !== 'edit') return;
        const doc = app.document;
        doc.storyBook.title = els.bookTitle.value.trim() || 'Untitled Story Book';
        doc.storyBook.width = Number(els.bookWidth.value || 1200);

          page.name = els.pageName.value.trim() || page.name;

        if (element) {
          element.x = Number(els.elementX.value || 0);
          element.y = Number(els.elementY.value || 0);

          element.height = Math.max(1, Number(els.elementH.value || 1));
          element.rotation = normalizeRotation(els.elementRotation.value || 0);
          if (element.type === 'text') {
            element.text = els.elementContent.value;
            element.style = element.style || {};
            element.style.fontSize = Math.max(1, Number(els.elementFontSize.value || element.style.fontSize || 16));
            element.style.fontWeight = Math.max(100, Number(els.elementFontWeight.value || element.style.fontWeight || 400));
            element.style.fontFamily = els.elementFontFamily.value || element.style.fontFamily || 'Arial';
            element.style.align = els.elementTextAlign.value || element.style.align || 'left';
            element.style.lineHeight = Math.min(3, Math.max(0.8, Number(els.elementLineHeight.value || element.style.lineHeight || 1.4)));
            element.style.color = normalizeColorHex(els.elementFontColor.value, '#111111');
            element.style.backgroundColor = els.elementBackgroundTransparent.checked
              ? 'transparent'
              : normalizeColorHex(els.elementBackgroundColor.value, '#ffffff');
          } else if (element.type === 'image' || element.type === 'video' || element.type === 'audio') {
            const asset = element.assetId ? doc.assets[element.assetId] : null;
            if (asset && asset.sourceType !== 'embedded') {
              asset.pathOrUrl = normalizeReferencePath(els.elementContent.value);
              asset.sourceType = 'reference';
              asset.kind = asset.kind || element.type;
              asset.mimeType = asset.mimeType || `${asset.kind}/*`;
              setAssetIssue(asset.id, null, { silent: true });

          }
          if (element.type === 'video' || element.type === 'audio') {
            element.controls = els.elementControls.checked;
            element.autoplay = els.elementAutoplay.checked;
            element.loop = els.elementLoop.checked;
          }
        }

        setDirty();
        renderAll();
      }

      function normalizeColorHex(value, fallback) {
        const input = String(value || '').trim();
        const match = /^#([0-9a-f]{3}|[0-9a-f]{6})$/i.exec(input);
        if (!match) return fallback;
        const hex = match[1];
        if (hex.length === 3) {
          return `#${hex[0]}${hex[0]}${hex[1]}${hex[1]}${hex[2]}${hex[2]}`.toLowerCase();
        }
        return `#${hex.toLowerCase()}`;
      }

      function isTransparentBackground(value) {
        const normalized = String(value || '').trim().toLowerCase();
        return normalized === '' || normalized === 'transparent' || normalized === 'none' || normalized === 'rgba(0,0,0,0)' || normalized === 'rgba(0, 0, 0, 0)';
      }

      function openTextEditor(elementId, elementEl) {
        const page = getCurrentPage();
        const element = app.document.elements[elementId];
        if (!page || !element || element.type !== 'text' || app.mode !== 'edit') return;
        captureHistory();
        app.editingElementId = elementId;
        app.selectedElementId = elementId;
        const contentBox = elementEl.querySelector('.content');
        if (!contentBox) return;
        const editor = document.createElement('textarea');
        editor.className = 'text-editor';
        editor.value = element.text || '';
        editor.style.fontFamily = element.style?.fontFamily || 'Arial';
        editor.style.fontSize = `${element.style?.fontSize || 16}px`;
        editor.style.fontWeight = `${element.style?.fontWeight || 400}`;
        editor.style.color = element.style?.color || '#111827';
        editor.style.lineHeight = `${element.style?.lineHeight || 1.4}`;
        editor.style.textAlign = element.style?.align || 'left';
        editor.style.backgroundColor = element.style?.backgroundColor || 'transparent';
        contentBox.innerHTML = '';
        contentBox.appendChild(editor);
        editor.focus();
        editor.select();

        const finish = (commit) => {
          if (commit) {
            element.text = editor.value;
            setDirty();
          }
          app.editingElementId = null;
          renderAll();
        };

        editor.addEventListener('keydown', (event) => {
          if (event.key === 'Escape') {
            event.preventDefault();
            finish(false);
          }
          if ((event.metaKey || event.ctrlKey) && event.key === 'Enter') {
            event.preventDefault();
            finish(true);
          }
        });
        editor.addEventListener('blur', () => finish(true));
      }

      function beginPointerAction(event, elementId) {
        if (event.button !== 0 || app.mode !== 'edit') return;
        const element = app.document.elements[elementId];
        if (!element) return;
        if (event.target.classList.contains('resize-handle')) return;
        event.stopPropagation();
        const stageNode = els.stage.querySelector(`[data-element-id="${elementId}"]`);
        const start = { x: event.clientX, y: event.clientY, left: element.x, top: element.y };
        let dragging = false;

        const startDragging = () => {
          if (dragging) return;
          dragging = true;
          captureHistory();
          selectElement(elementId, { keepEditing: true, source: 'pointer' });
          if (stageNode) stageNode.classList.add('dragging');
        };

        const move = (moveEvent) => {
          const dx = (moveEvent.clientX - start.x) / app.zoom;
          const dy = (moveEvent.clientY - start.y) / app.zoom;
          if (!dragging) {
            if (Math.abs(dx) < 2 && Math.abs(dy) < 2) return;
            startDragging();
          }
          moveEvent.preventDefault();
          element.x = Math.round(start.left + dx);
          element.y = Math.round(start.top + dy);
          updateElementFrameOnStage(elementId);
          updateGeometryFields(element);
          setDirty();
        };
        const up = () => {
          window.removeEventListener('pointermove', move);
          window.removeEventListener('pointerup', up);
          if (dragging) {
            if (stageNode) stageNode.classList.remove('dragging');
            renderAll();
          }
        };
        window.addEventListener('pointermove', move);
        window.addEventListener('pointerup', up, { once: true });
      }

      function beginResizeAction(event, elementId, handle = 'se') {
        if (event.button !== 0 || app.mode !== 'edit') return;
        const element = app.document.elements[elementId];
        if (!element) return;
        event.preventDefault();
        event.stopPropagation();
        captureHistory();
        selectElement(elementId, { keepEditing: true, source: 'pointer' });
        const stageNode = els.stage.querySelector(`[data-element-id="${elementId}"]`);
        if (stageNode) stageNode.classList.add('resizing');
        const stageRect = els.stage.getBoundingClientRect();
        const start = {
          width: Number(element.width) || 24,
          height: Number(element.height) || 24,
          left: Number(element.x) || 0,
          top: Number(element.y) || 0
        };
        const handleConfigs = {
          se: { sx: 1, sy: 1 },
          ne: { sx: 1, sy: -1 },
          nw: { sx: -1, sy: -1 },
          sw: { sx: -1, sy: 1 },
          e: { sx: 1, sy: 0 },
          w: { sx: -1, sy: 0 },
          n: { sx: 0, sy: -1 },
          s: { sx: 0, sy: 1 }
        };
        const cfg = handleConfigs[handle] || handleConfigs.se;
        const rotation = (Number(element.rotation) || 0) * Math.PI / 180;
        const cos = Math.cos(rotation);
        const sin = Math.sin(rotation);
        // Local width axis (u) and height axis (v) in document coordinates
        const ux = cos;
        const uy = sin;
        const vx = -sin;
        const vy = cos;
        const startCx = start.left + start.width / 2;
        const startCy = start.top + start.height / 2;
        const anchorX = startCx - cfg.sx * (start.width / 2) * ux - cfg.sy * (start.height / 2) * vx;
        const anchorY = startCy - cfg.sx * (start.width / 2) * uy - cfg.sy * (start.height / 2) * vy;
        const move = (moveEvent) => {
          const pointerX = (moveEvent.clientX - stageRect.left) / app.zoom;
          const pointerY = (moveEvent.clientY - stageRect.top) / app.zoom;
          const dx = pointerX - anchorX;
          const dy = pointerY - anchorY;

          let nextWidth = start.width;
          let nextHeight = start.height;
          if (cfg.sx !== 0) {
            nextWidth = Math.max(24, cfg.sx * (dx * ux + dy * uy));
          }
          if (cfg.sy !== 0) {
            nextHeight = Math.max(24, cfg.sy * (dx * vx + dy * vy));
          }

          const nextCx = anchorX
            + (cfg.sx !== 0 ? cfg.sx * (nextWidth / 2) * ux : 0)
            + (cfg.sy !== 0 ? cfg.sy * (nextHeight / 2) * vx : 0);
          const nextCy = anchorY
            + (cfg.sx !== 0 ? cfg.sx * (nextWidth / 2) * uy : 0)
            + (cfg.sy !== 0 ? cfg.sy * (nextHeight / 2) * vy : 0);

          element.width = Math.round(nextWidth);
          element.height = Math.round(nextHeight);
          element.x = Math.round(nextCx - nextWidth / 2);
          element.y = Math.round(nextCy - nextHeight / 2);
          updateElementFrameOnStage(elementId);
          updateGeometryFields(element);
          setDirty();
        };
        const up = () => {
          window.removeEventListener('pointermove', move);
          window.removeEventListener('pointerup', up);
          if (stageNode) stageNode.classList.remove('resizing');
          renderAll();
        };
        window.addEventListener('pointermove', move);
        window.addEventListener('pointerup', up, { once: true });
      }

      function handleOpenFile(file) {

      }

      if (els.pageList) {

      buttons.movePageUp.addEventListener('click', () => moveCurrentPage(-1));
      buttons.movePageDown.addEventListener('click', () => moveCurrentPage(1));
      buttons.copyPage.addEventListener('click', () => copyCurrentPage());

      buttons.duplicatePage.addEventListener('click', () => duplicatePages(getActionPageIds()));

      buttons.addText.addEventListener('click', () => {

        addElement(el);

      buttons.addImage.addEventListener('click', () => {

        addElement(el);

      buttons.addVideo.addEventListener('click', () => {

        addElement(el);

      buttons.addAudio.addEventListener('click', () => {

        if (!src) return;
        const el = makeAudioElement(page.id, src, Math.max(24, Math.round(page.width / 2 - 180)), Math.max(24, Math.round(page.height / 2 - 32)));
        addElement(el);

      buttons.addEmbeddedImage.addEventListener('click', () => {

      for (const header of document.querySelectorAll('.prop-section-header')) {

      buttons.pasteElement.addEventListener('click', () => pasteClipboardElement());
      buttons.duplicateElement.addEventListener('click', () => duplicateSelectedElement());
      buttons.sendToBack.addEventListener('click', () => sendSelectedElementToBack());
      buttons.bringToFront.addEventListener('click', () => bringSelectedElementToFront());
      buttons.deleteElement.addEventListener('click', () => deleteSelectedElement());
      buttons.zoomOut.addEventListener('click', () => setZoom(app.zoom - 0.1));
      buttons.zoomReset.addEventListener('click', () => setZoom(1));
      buttons.zoomIn.addEventListener('click', () => setZoom(app.zoom + 0.1));
      if (buttons.fullScreenMode) {

      }
      if (buttons.cleanupUnusedEmbedded) {

      }
      if (els.dropReviewCancelBtn) {
        els.dropReviewCancelBtn.addEventListener('click', () => resolveDropReview(false));
      }
      if (els.dropReviewImportBtn) {

      if (els.dropReviewModal) {

      // A page-reorder drag (from a list row or the canvas title) is not a file drop, so the
      // canvas must not present itself as a drop target for it.
      function isPageReorderDragActive() {

      }

      els.canvasWrap.addEventListener('dragenter', (event) => {
        if (app.mode !== 'edit' || isPageReorderDragActive()) return;

      els.canvasWrap.addEventListener('dragover', (event) => {

      els.canvasWrap.addEventListener('drop', async (event) => {
        if (app.mode !== 'edit') return;
