      function splitReferencePathParts(fullPath) {
        const normalized = normalizeReferencePath(fullPath);
        if (!normalized) return { dir: '', name: '' };
        const cut = normalized.lastIndexOf('/');
        if (cut < 0) return { dir: '', name: normalized };
        return { dir: normalized.slice(0, cut), name: normalized.slice(cut + 1) };
      }

      function joinReferencePathParts(dir, name) {
        const cleanDir = String(dir || '').trim().replace(/[\\/]+$/, '');
        const cleanName = String(name || '').trim().replace(/^[\\/]+/, '');
        if (!cleanDir) return normalizeReferencePath(cleanName);
        if (!cleanName) return normalizeReferencePath(cleanDir);
        return normalizeReferencePath(`${cleanDir}/${cleanName}`);
      }

      function applyImageBasePathToReference(rawPath, pageId) {
        const normalized = normalizeReferencePath(rawPath);
        if (!normalized) return buildFallbackImageReference('', pageId);

        // Do not rewrite absolute paths or URLs.
        if (
          /^file:\/\//i.test(normalized)
          || /^[a-zA-Z]:\//.test(normalized)
          || /^\/\/[^/]+\//.test(normalized)
          || normalized.startsWith('/')
          || isLikelyUrl(normalized)
        ) {
          return normalized;
        }

        const basePath = getEffectiveImageBasePath(pageId);
        if (!basePath) return normalized;

        const basePrefix = normalizeReferencePath(basePath);
        if (!basePrefix) return normalized;
        if (normalized === basePrefix || normalized.startsWith(`${basePrefix}/`)) {
          return normalized;
        }

        const separator = basePrefix.endsWith('/') ? '' : '/';
        return normalizeReferencePath(`${basePrefix}${separator}${normalized}`);
      }

      function normalizePayload(payload) {
        const next = payload || blankDocument();
        if (!next.storyBook) next.storyBook = blankDocument().storyBook;
        if (!next.pages) next.pages = {};
        if (!next.elements) next.elements = {};
        if (!next.assets) next.assets = {};
        if (!next.storyBook.pageOrder) next.storyBook.pageOrder = Object.keys(next.pages);
        next.storyBook.imagePath = normalizeImageBasePath(next.storyBook.imagePath || '');
        // Books written before this was a document property have no dropMode and fall back to
        // Reference, which is the default the old session variable started from.
        next.storyBook.dropMode = next.storyBook.dropMode === 'embedded' ? 'embedded' : 'reference';

        // Page groups: documents written before groups existed simply have no groups map and
        // no groupId on pages, which normalizes to "everything ungrouped".
        if (!next.storyBook.groups || typeof next.storyBook.groups !== 'object') {
          next.storyBook.groups = {};
        }
        for (const [groupId, group] of Object.entries(next.storyBook.groups)) {
          if (!group || typeof group !== 'object') {
            delete next.storyBook.groups[groupId];
            continue;
          }
          group.id = group.id || groupId;
          group.name = String(group.name || 'Chapter');
          group.collapsed = Boolean(group.collapsed);
        }

        for (const page of Object.values(next.pages)) {
          if (!page || typeof page !== 'object') continue;
          page.imagePath = normalizeImageBasePath(page.imagePath || '');
          // A groupId pointing at a group that no longer exists reverts to ungrouped.
          const groupId = page.groupId || null;
          page.groupId = groupId && next.storyBook.groups[groupId] ? groupId : null;
        }

        // Group order is derived from pageOrder runs, so a group with no pages has no
        // position and is dropped rather than lingering as an unreachable record.
        const referencedGroupIds = new Set(
          Object.values(next.pages)
            .map((page) => page && page.groupId)
            .filter(Boolean)
        );
        for (const groupId of Object.keys(next.storyBook.groups)) {
          if (!referencedGroupIds.has(groupId)) delete next.storyBook.groups[groupId];
        }

        // Structure is authoritative. A file that carries one is validated/repaired; a file
        // that predates it is migrated from the legacy pageOrder/groupId/groups. Either way,
        // pageOrder and every page.groupId are then re-derived from the structure, and the old
        // groups map is dropped since group metadata now lives inside the structure.
        if (Array.isArray(next.storyBook.structure) && next.storyBook.structure.length) {
          normalizeStructure(next);
        } else {
          rebuildStructureFromLegacy(next);
        }
        delete next.storyBook.groups;
        syncDerivedFromStructure(next);

        for (const [assetId, asset] of Object.entries(next.assets)) {
          if (!asset || typeof asset !== 'object') {
            delete next.assets[assetId];
            continue;
          }
          asset.id = asset.id || assetId;
          asset.kind = asset.kind || inferKindFromMime(asset.mimeType) || 'image';
          const rawSource = asset.dataUri || asset.pathOrUrl || asset.path || asset.url || '';
          if (asset.dataUri || isDataUriString(rawSource)) {
            asset.sourceType = 'embedded';
            asset.dataUri = String(rawSource || '');
            delete asset.pathOrUrl;
            delete asset.path;
            delete asset.url;
          } else {
            asset.sourceType = 'reference';
            asset.pathOrUrl = normalizeReferencePath(rawSource);
            delete asset.path;
            delete asset.url;
          }
          if (!asset.mimeType) {
            asset.mimeType = `${asset.kind}/*`;
          }
        }

        for (const element of Object.values(next.elements)) {
          if (!element || typeof element !== 'object') continue;
          if (!Number.isFinite(Number(element.zIndex))) {
            element.zIndex = 1;
          } else {
            element.zIndex = Math.max(1, Math.round(Number(element.zIndex)));
          }
          if (!Number.isFinite(Number(element.rotation))) {
            element.rotation = 0;
          } else {
            element.rotation = normalizeRotation(element.rotation);
          }
          if (element.type === 'image' || element.type === 'video' || element.type === 'audio') {
            const asset = element.assetId ? next.assets[element.assetId] : null;
            if (!element.sourceType) {
              element.sourceType = asset?.sourceType || 'reference';
            }
            if (element.type === 'image' && !element.fit) {
              element.fit = 'contain';
            }
          }
        }

        next.appState = next.appState || {};
        // A stored page id is not trusted: it may name a page deleted after the file was saved,
        // in which case it has to be corrected here rather than opening the book on nothing.
        if (!next.pages[next.appState.currentPageId] || !next.storyBook.pageOrder.includes(next.appState.currentPageId)) {
          next.appState.currentPageId = next.storyBook.pageOrder[0] || null;
        }
        if (!next.appState.zoom) next.appState.zoom = 1;
        if (!next.appState.mode) next.appState.mode = 'edit';
        return next;
      }

      function parseHtmlDocument(htmlText) {
        const parser = new DOMParser();
        const parsed = parser.parseFromString(htmlText, 'text/html');
        const script = parsed.getElementById(PAYLOAD_ID);
        if (!script) {
          return null;
        }
        return parseEmbeddedPayload(script.textContent);
      }

      function parseEmbeddedPayload(scriptText) {
        const raw = String(scriptText || '').trim();
        if (!raw) {
          return null;
        }
        return normalizePayload(JSON.parse(raw));
      }

      function serializePayload(doc) {
        return JSON.stringify(doc).replace(/</g, '\\u003c');
      }

      function exportCurrentHtml() {
        const payloadEl = document.getElementById(PAYLOAD_ID);
        const titleEl = document.querySelector('title');
        const previous = payloadEl.textContent;
        const previousTitle = titleEl ? titleEl.textContent : '';
        const snapshot = cloneDoc(app.document);
        snapshot.storyBook.updatedAt = nowIso();
        snapshot.appState.currentPageId = app.currentPageId;
        snapshot.appState.zoom = app.zoom;
        snapshot.appState.mode = app.mode;
        payloadEl.textContent = serializePayload(snapshot);
        if (titleEl) {
          titleEl.textContent = getWindowTitle(false);
        }
        const html = '<!doctype html>\n' + document.documentElement.outerHTML;
        payloadEl.textContent = previous;
        if (titleEl) {
          titleEl.textContent = previousTitle;
        }
        return html;
      }

      function buildPersistedSnapshot() {
        const snapshot = cloneDoc(app.document);
        snapshot.storyBook.updatedAt = nowIso();
        snapshot.appState = snapshot.appState || {};
        snapshot.appState.currentPageId = app.currentPageId;
        snapshot.appState.zoom = app.zoom;
        snapshot.appState.mode = app.mode;
        return snapshot;
      }

      function normalizeForValidation(doc) {
        const next = cloneDoc(doc);
        if (next.storyBook) {
          delete next.storyBook.updatedAt;
        }
        return next;
      }

      function arraysEqual(a = [], b = []) {
        if (a.length !== b.length) return false;
        for (let i = 0; i < a.length; i += 1) {
          if (a[i] !== b[i]) return false;
        }
        return true;
      }

      function safeString(value) {
        return String(value || '').trim();
      }

      // Accepts the exact HTML about to be written so the check covers the bytes being saved
      // rather than a second, separately generated export.
      function runRoundTripValidation(html) {
        // The reopened side always passes through normalizePayload (that is what loading a file
        // does), so the source must too, or benign defaults it fills in — e.g. rotation: 0 on a
        // freshly created element — read as a round-trip failure. This is why a brand-new
        // document failed while an opened one, already normalized on load, did not.
        const source = normalizeForValidation(normalizePayload(buildPersistedSnapshot()));
        const exportedHtml = typeof html === 'string' ? html : exportCurrentHtml();
        const parsed = parseHtmlDocument(exportedHtml);
        if (!parsed) {
          return {
            passed: false,
            checks: [{ name: 'payload-parse', passed: false, details: 'Unable to parse exported payload' }],
            summary: 'Round-trip validation failed: exported payload could not be parsed.'
          };
        }
        const reopened = normalizeForValidation(parsed);

        const checks = [];

        const pageOrderPassed = arraysEqual(source.storyBook.pageOrder || [], reopened.storyBook.pageOrder || []);
        checks.push({
          name: 'page-order',
          passed: pageOrderPassed,
          details: pageOrderPassed ? 'Page order preserved' : 'Page order changed after round-trip'
        });

        let geometryPassed = true;
        for (const [elementId, element] of Object.entries(source.elements || {})) {
          const next = reopened.elements?.[elementId];
          if (!next) {
            geometryPassed = false;
            break;
          }
          if (Number(element.x || 0) !== Number(next.x || 0)
            || Number(element.y || 0) !== Number(next.y || 0)
            || Number(element.width || 0) !== Number(next.width || 0)
            || Number(element.height || 0) !== Number(next.height || 0)
            || safeString(element.pageId) !== safeString(next.pageId)) {
            geometryPassed = false;
            break;
          }
        }
        checks.push({
          name: 'element-geometry',
          passed: geometryPassed,
          details: geometryPassed ? 'Element geometry preserved' : 'Element geometry mismatch found'
        });

        let textStylePassed = true;
        for (const [elementId, element] of Object.entries(source.elements || {})) {
          if (element.type !== 'text') continue;
          const next = reopened.elements?.[elementId];
          if (!next || next.type !== 'text') {
            textStylePassed = false;
            break;
          }
          const sA = element.style || {};
          const sB = next.style || {};
          if (safeString(element.text) !== safeString(next.text)
            || safeString(sA.fontFamily) !== safeString(sB.fontFamily)
            || Number(sA.fontSize || 0) !== Number(sB.fontSize || 0)
            || Number(sA.fontWeight || 0) !== Number(sB.fontWeight || 0)
            || safeString(sA.color).toLowerCase() !== safeString(sB.color).toLowerCase()
            || safeString(sA.backgroundColor).toLowerCase() !== safeString(sB.backgroundColor).toLowerCase()
            || safeString(sA.align) !== safeString(sB.align)
            || Number(sA.lineHeight || 0) !== Number(sB.lineHeight || 0)) {
            textStylePassed = false;
            break;
          }
        }
        checks.push({
          name: 'text-styles',
          passed: textStylePassed,
          details: textStylePassed ? 'Text styles preserved' : 'Text style mismatch found'
        });

        let mediaOptionsPassed = true;
        for (const [elementId, element] of Object.entries(source.elements || {})) {
          if (!(element.type === 'video' || element.type === 'audio')) continue;
          const next = reopened.elements?.[elementId];
          if (!next || next.type !== element.type) {
            mediaOptionsPassed = false;
            break;
          }
          if (Boolean(element.controls) !== Boolean(next.controls)
            || Boolean(element.autoplay) !== Boolean(next.autoplay)
            || Boolean(element.loop) !== Boolean(next.loop)) {
            mediaOptionsPassed = false;
            break;
          }
        }
        checks.push({
          name: 'media-options',
          passed: mediaOptionsPassed,
          details: mediaOptionsPassed ? 'Media options preserved' : 'Media option mismatch found'
        });

        let assetRefsPassed = true;
        for (const [assetId, asset] of Object.entries(source.assets || {})) {
          const next = reopened.assets?.[assetId];
          if (!next) {
            assetRefsPassed = false;
            break;
          }
          if (safeString(asset.sourceType) !== safeString(next.sourceType)
            || safeString(asset.kind) !== safeString(next.kind)
            || safeString(asset.mimeType) !== safeString(next.mimeType)) {
            assetRefsPassed = false;
            break;
          }
          if (asset.sourceType === 'reference' && safeString(asset.pathOrUrl) !== safeString(next.pathOrUrl)) {
            assetRefsPassed = false;
            break;
          }
        }
        checks.push({
          name: 'asset-references',
          passed: assetRefsPassed,
          details: assetRefsPassed ? 'Asset references preserved' : 'Asset reference mismatch found'
        });

        const signaturePassed = getDocumentSignature(source) === getDocumentSignature(reopened);
        checks.push({
          name: 'document-signature',
          passed: signaturePassed,
          details: signaturePassed ? 'Document signature matches' : 'Document signature differs'
        });

        const passed = checks.every((check) => check.passed);
        const summary = passed
          ? 'Round-trip validation passed all checks.'
          : `Round-trip validation failed ${checks.filter((check) => !check.passed).length} check(s).`;

        return { passed, checks, summary };
      }

      function downloadFile(filename, contents) {
        const blob = new Blob([contents], { type: 'text/html;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        const anchor = document.createElement('a');
        anchor.href = url;
        anchor.download = filename;
        document.body.appendChild(anchor);
        anchor.click();
        anchor.remove();
        setTimeout(() => URL.revokeObjectURL(url), 500);
      }

      function hasFileSystemAccess() {
        return typeof window.showSaveFilePicker === 'function';
      }

      function hasFileOpenPicker() {
        return typeof window.showOpenFilePicker === 'function';
      }

      // Prefer the name of the file this document is running from: a story book is opened as
      // the saved HTML itself, so its own filename is the most accurate suggestion.
      function getSuggestedFileName() {
        try {
          const base = decodeURIComponent(window.location.pathname).split('/').pop() || '';
          if (/\.html?$/i.test(base)) return base;
        } catch (error) {
          /* fall through to the title-derived name */
        }
        const title = app.document?.storyBook?.title || 'Untitled Story Book';
        const safeTitle = title
          .replace(/[^a-z0-9-_]+/gi, '-')
          .replace(/-+/g, '-')
          .replace(/^-|-$/g, '') || 'story-book';
        return `${safeTitle}.html`;
      }

      // story-doc skips this and silently degrades to a download when a permission has been
      // revoked. Asking explicitly means the user gets the file they expect, where they
      // expect it, rather than a surprise copy in Downloads.
      async function ensureWritePermission(handle) {
        if (!handle || typeof handle.queryPermission !== 'function') return true;
        const opts = { mode: 'readwrite' };
        if (await handle.queryPermission(opts) === 'granted') return true;
        return await handle.requestPermission(opts) === 'granted';
      }

      async function writeHtmlToHandle(handle, html) {
        const writable = await handle.createWritable();
        try {
          await writable.write(html);
        } finally {
          // Closing in a finally avoids leaking the writable when the write throws.
          await writable.close();
        }
      }

      function markDocumentSaved(label) {
        clearHistory();
        setDirty(false);
        els.statusText.textContent = label;
      }

      // Every save is checked for round-trip fidelity before the file is touched. Silent when
      // it passes; when it fails the user decides, with the original file still intact.
      function confirmSaveDespiteValidation(html) {
        let report = null;
        try {
          report = runRoundTripValidation(html);
        } catch (error) {
          console.error(error);
          // A validator that throws must not block saving; the document is the priority.
          return true;
        }
        if (!report || report.passed) return true;

        const failed = report.checks.filter((check) => !check.passed);
        const detail = failed.map((check) => `- ${check.name}: ${check.details}`).join('\n');
        return confirm(
          `${report.summary}\n\n${detail}\n\n`
          + 'This means reopening the saved file may not reproduce the document exactly. '
          + 'The existing file has not been changed yet.\n\nSave anyway?'
        );
      }

      // The book title follows the file name it was saved to. Applied before the document is
      // serialized, so the written file and the in-memory document agree — setting it afterwards
      // would leave the document reading dirty the moment it was saved. Updates the tab (via the
      // title) and the two inspector spots directly, avoiding a full re-render inside save.
      function applyBookTitleFromFileName(fileName) {
        const base = String(fileName || '').replace(/\.html?$/i, '').trim();
        if (!base || !app.document?.storyBook) return;
        if (app.document.storyBook.title === base) return;
        app.document.storyBook.title = base;
        if (els.bookTitle) els.bookTitle.value = base;
        if (els.documentSectionContext) els.documentSectionContext.textContent = base;
      }

      async function saveBook(options = {}) {
        const { forcePicker = false } = options;

        let handle = forcePicker ? null : app.fileHandle;

        if (!handle && !hasFileSystemAccess()) {
          // Firefox and Safari: the download path is the only option, and it offers no
          // user-chosen file name to sync the title to, so the title is left as it is.
          const html = exportCurrentHtml();
          if (!confirmSaveDespiteValidation(html)) {
            els.statusText.textContent = 'Save canceled after validation warning';
            return;
          }
          downloadFile(getSuggestedFileName(), html);
          markDocumentSaved('Downloaded a copy (this browser cannot save in place)');
          return;
        }

        if (!handle) {
          try {
            handle = await window.showSaveFilePicker({
              suggestedName: getSuggestedFileName(),
              // A stable id makes the picker reopen in the folder used last time.
              id: 'storybook',
              types: [{ description: 'Story Book HTML', accept: { 'text/html': ['.html'] } }]
            });
          } catch (error) {
            if (error && error.name === 'AbortError') {
              els.statusText.textContent = 'Save canceled';
              return;
            }
            console.error(error);
            // A picker call that lost its user gesture throws here; retrying from a fresh
            // click works, so say that rather than dumping a copy in Downloads.
            els.statusText.textContent = 'Could not open the save dialog. Click Save again.';
            return;
          }
        }

        try {
          if (!await ensureWritePermission(handle)) {
            els.statusText.textContent = 'Write permission denied. Use Save As to choose another file.';
            return;
          }
          // Title follows the file name, then export, so the change is in the written bytes.
          applyBookTitleFromFileName(handle.name);
          const html = exportCurrentHtml();
          // Validated after the picker and the permission prompt, never before: confirm()
          // below would otherwise consume the user activation those calls depend on.
          if (!confirmSaveDespiteValidation(html)) {
            els.statusText.textContent = 'Save canceled after validation warning';
            return;
          }
          await writeHtmlToHandle(handle, html);
          app.fileHandle = handle;
          markDocumentSaved(`Saved to ${handle.name}`);
        } catch (error) {
          if (error && error.name === 'AbortError') {
            els.statusText.textContent = 'Save canceled';
            return;
          }
          console.error(error);
          downloadFile(getSuggestedFileName(), exportCurrentHtml());
          markDocumentSaved('Could not write to the file; downloaded a copy instead');
        }
      }

      async function openBookWithPicker() {
        // Matches the New Book guard so opening a file cannot silently discard unsaved work.
        // A synchronous confirm keeps the click's user activation, which the picker requires;
        // an awaited async dialog here would consume it and make showOpenFilePicker throw.
        if (app.dirty && !confirm('Discard unsaved changes and open another book?')) return;
        if (!hasFileOpenPicker()) {
          els.openFileInput.click();
          return;
        }
        let handle = null;
        try {
          const picked = await window.showOpenFilePicker({
            types: [{ description: 'Story Book HTML', accept: { 'text/html': ['.html', '.htm'] } }],
            multiple: false,
            id: 'storybook'
          });
          handle = picked && picked[0];
        } catch (error) {
          if (!error || error.name !== 'AbortError') {
            console.error(error);
            els.statusText.textContent = 'Could not open the file dialog';
          }
          return;
        }
        if (!handle) return;
        try {
          const file = await handle.getFile();
          const parsed = parseHtmlDocument(await file.text());
          if (!parsed) {
            alert('No story-book payload was found in that HTML file.');
            return;
          }
          loadDocument(parsed);
          // Must follow loadDocument, which clears the handle.
          app.fileHandle = handle;
          els.statusText.textContent = `Opened ${handle.name}`;
        } catch (error) {
          console.error(error);
          alert(`Unable to open story book: ${error.message}`);
        }
      }

      function makeTextElement(pageId, x, y) {
        const id = createId('el');
        return {
          id,
          pageId,
          type: 'text',
          x,
          y,
          width: 320,
          height: 100,
          rotation: 0,
          zIndex: Date.now(),
          visible: true,
          locked: false,
          text: 'New text',
          style: {
            fontFamily: 'Arial',
            fontSize: 22,
            fontWeight: 400,
            color: '#111111',
            align: 'left',
            lineHeight: 1.4
          },
          wrap: true
        };
      }

      function makeImageElement(pageId, src, x, y) {
        const normalizedPath = normalizeReferencePath(src);
        const assetId = createId('asset');
        const elId = createId('el');
        app.document.assets[assetId] = {
          id: assetId,
          kind: 'image',
          sourceType: 'reference',
          mimeType: 'image/*',
          pathOrUrl: normalizedPath
        };
        return {
          id: elId,
          pageId,
          type: 'image',
          x,
          y,
          width: 320,
          height: 220,
          rotation: 0,
          zIndex: Date.now(),
          visible: true,
          locked: false,
          assetId,
          sourceType: 'reference',
          altText: 'Image',
          fit: 'contain'
        };
      }

      function makeVideoElement(pageId, src, x, y) {
        const normalizedPath = normalizeReferencePath(src);
        const assetId = createId('asset');
        const elId = createId('el');
        app.document.assets[assetId] = {
          id: assetId,
          kind: 'video',
          sourceType: 'reference',
          mimeType: 'video/*',
          pathOrUrl: normalizedPath
        };
        return {
          id: elId,
          pageId,
          type: 'video',
          x,
          y,
          width: 360,
          height: 220,
          rotation: 0,
          zIndex: Date.now(),
          visible: true,
          locked: false,
          assetId,
          sourceType: 'reference',
          controls: true,
          autoplay: false,
          loop: false
        };
      }

      function makeAudioElement(pageId, src, x, y) {
        const normalizedPath = normalizeReferencePath(src);
        const assetId = createId('asset');
        const elId = createId('el');
        app.document.assets[assetId] = {
          id: assetId,
          kind: 'audio',
          sourceType: 'reference',
          mimeType: 'audio/*',
          pathOrUrl: normalizedPath
        };
        return {
          id: elId,
          pageId,
          type: 'audio',
          x,
          y,
          width: 360,
          height: 64,
          rotation: 0,
          zIndex: Date.now(),
          visible: true,
          locked: false,
          assetId,
          sourceType: 'reference',
          controls: true,
          autoplay: false,
          loop: false
        };
      }

      function makeEmbeddedMediaElement(pageId, kind, fileName, mimeType, dataUri, x, y) {
        const assetId = createId('asset');
        const elId = createId('el');
        const mediaKind = kind === 'video' || kind === 'audio' ? kind : 'image';
        app.document.assets[assetId] = {
          id: assetId,
          kind: mediaKind,
          sourceType: 'embedded',
          mimeType: mimeType || `${mediaKind}/*`,
          fileName: fileName || `embedded-${mediaKind}`,
          dataUri
        };
        let width = 320;
        let height = 220;
        if (mediaKind === 'audio') {
          width = 360;
          height = 64;
        } else if (mediaKind === 'video') {
          width = 360;
          height = 220;
        }
        return {
          id: elId,
          pageId,
          type: mediaKind,
          x,
          y,
          width,
          height,
          rotation: 0,
          zIndex: Date.now(),
          visible: true,
          locked: false,
          assetId,
          sourceType: 'embedded',
          altText: fileName || `Embedded ${mediaKind}`,
          fit: 'contain'
        };
      }

      function makeEmbeddedImageElement(pageId, fileName, mimeType, dataUri, x, y) {
        return makeEmbeddedMediaElement(pageId, 'image', fileName, mimeType, dataUri, x, y);
      }

      function inferKindFromFileName(name) {
        const value = String(name || '').toLowerCase();
        if (value.match(/\.(png|jpg|jpeg|gif|webp|bmp|svg)$/)) return 'image';
        if (value.match(/\.(mp4|webm|mov|m4v|ogv)$/)) return 'video';
        if (value.match(/\.(mp3|wav|ogg|m4a|aac|flac)$/)) return 'audio';
        return null;
      }

      function inferKindFromFile(file) {
        return inferKindFromMime(file?.type) || inferKindFromFileName(file?.name) || null;
      }

      function readFileAsDataUri(file) {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = () => resolve(String(reader.result || ''));
          reader.onerror = () => reject(new Error('Unable to read file'));
          reader.readAsDataURL(file);
        });
      }

      // Import behaviour for this book, stored alongside imagePath, which answers the same
      // kind of question. A book of local scans wants Reference; one meant to be emailed as a
      // single file wants Embedded. Previously a session variable that reset on every open.
      function getDropMode() {
        return app.document?.storyBook?.dropMode === 'embedded' ? 'embedded' : 'reference';
      }

      function parseDroppedFileUriList(dataTransfer) {
        const raw = String(dataTransfer?.getData('text/uri-list') || '');
        if (!raw.trim()) return [];
        return raw
          .split(/\r?\n/)
          .map((line) => line.trim())
          .filter((line) => line && !line.startsWith('#'));
      }

      function hasDroppedResourcePayload(dataTransfer) {
        if (!dataTransfer) return false;
        if (dataTransfer.files && dataTransfer.files.length > 0) return true;
        if (dataTransfer.items && dataTransfer.items.length > 0) return true;
        const types = Array.from(dataTransfer.types || []);
        if (types.includes('Files')) return true;
        if (types.includes('text/uri-list')) return true;
        return false;
      }

      function readDirectoryEntries(reader) {
        return new Promise((resolve, reject) => {
          reader.readEntries(resolve, reject);
        });
      }

      async function collectDroppedEntryFiles(entry, outFiles, prefix = '') {
        if (!entry) return;
        if (entry.isFile) {
          const file = await new Promise((resolve, reject) => {
            entry.file(resolve, reject);
          });
          const relativePath = `${prefix}${file.name}`;
          file.storyBookDroppedPath = relativePath;
          outFiles.push(file);
          return;
        }
        if (!entry.isDirectory || !entry.createReader) return;
        const reader = entry.createReader();
        while (true) {
          const entries = await readDirectoryEntries(reader);
          if (!entries.length) break;
          for (const childEntry of entries) {
            await collectDroppedEntryFiles(childEntry, outFiles, `${prefix}${entry.name}/`);
          }
        }
      }

      async function collectDroppedHandleFiles(handle, outFiles, prefix = '') {
        if (!handle) return;
        if (handle.kind === 'file') {
          const file = await handle.getFile();
          const relativePath = `${prefix}${file.name}`;
          file.storyBookDroppedPath = relativePath;
          outFiles.push(file);
          return;
        }
        if (handle.kind !== 'directory') return;
        for await (const childHandle of handle.values()) {
          await collectDroppedHandleFiles(childHandle, outFiles, `${prefix}${handle.name}/`);
        }
      }

      async function getDroppedFiles(dataTransfer) {
        const directFiles = Array.from(dataTransfer?.files || []);
        const items = Array.from(dataTransfer?.items || []);

        const supportsHandles = items.some((item) => item?.kind === 'file' && typeof item.getAsFileSystemHandle === 'function');
        if (supportsHandles) {
          const handleCollected = [];
          try {
            // Drag data items are only readable during the drop event dispatch, so
            // request every handle before the first await neuters the remaining items.
            const handles = await Promise.all(items
              .filter((item) => item?.kind === 'file' && typeof item.getAsFileSystemHandle === 'function')
              .map((item) => item.getAsFileSystemHandle()));
            for (const handle of handles) {
              if (!handle) continue;
              await collectDroppedHandleFiles(handle, handleCollected, '');
            }
            if (handleCollected.length) {
              return handleCollected;
            }
          } catch (error) {
            console.error(error);
          }
        }

        const supportsEntries = items.some((item) => item?.kind === 'file' && typeof item.webkitGetAsEntry === 'function');
        if (!supportsEntries) {
          return directFiles;
        }
        const collected = [];
        try {
          // Same constraint as the handle path: resolve every entry synchronously first.
          const entries = items
            .filter((item) => item?.kind === 'file' && typeof item.webkitGetAsEntry === 'function')
            .map((item) => item.webkitGetAsEntry())
            .filter(Boolean);
          for (const entry of entries) {
            await collectDroppedEntryFiles(entry, collected, '');
          }
        } catch (error) {
          console.error(error);
          return directFiles;
        }
        return collected.length ? collected : directFiles;
      }

      function getDropPointOnPage(event, page) {
        const pageNode = els.stage.querySelector('.page');
        if (!pageNode || !page) {
          return {
            x: Math.max(24, Math.round((page?.width || 320) / 2 - 160)),
            y: Math.max(24, Math.round((page?.height || 220) / 2 - 110))
          };
        }
        const rect = pageNode.getBoundingClientRect();
        const rawX = (event.clientX - rect.left) / app.zoom;
        const rawY = (event.clientY - rect.top) / app.zoom;
        return {
          x: Math.max(0, Math.min(Math.round(rawX), page.width - 24)),
          y: Math.max(0, Math.min(Math.round(rawY), page.height - 24))
        };
      }

      function getDropKindLabel(kind) {
        if (kind === 'image') return 'Image';
        if (kind === 'video') return 'Video';
        if (kind === 'audio') return 'Audio';
        return 'Unsupported';
      }

      function deriveDroppedReferencePath(file, uriHint, opts = {}) {
        let pathOrUrl = String(uriHint || '').trim();
        if (!pathOrUrl && file?.path) {
          pathOrUrl = String(file.path || '');
        }
        if (!pathOrUrl && file?.storyBookDroppedPath) {
          pathOrUrl = String(file.storyBookDroppedPath || '');
        }
        if (!pathOrUrl && opts.kind === 'image') {
          pathOrUrl = buildFallbackImageReference(file?.name || '', opts.pageId);
        }
        if (!pathOrUrl) {
          pathOrUrl = String(file?.name || '').trim();
        }
        if (opts.kind === 'image') {
          return applyImageBasePathToReference(pathOrUrl, opts.pageId);
        }
        return normalizeReferencePath(pathOrUrl);
      }

      const droppedNameCollator = new Intl.Collator(undefined, { numeric: true, sensitivity: 'base' });

      function compareDroppedFiles(a, b) {
        const aKey = a?.file?.storyBookDroppedPath || a?.file?.name || '';
        const bKey = b?.file?.storyBookDroppedPath || b?.file?.name || '';
        return droppedNameCollator.compare(aKey, bKey);
      }

      function createDropReviewRows(files, uriList, defaultMode, pageId) {
        const rows = [];
        // uri-list entries only line up with files on a flat drop; folder recursion
        // expands the file list, so positional hints would be misattributed.
        const uriHints = files.length === uriList.length ? uriList : [];
        for (let i = 0; i < files.length; i += 1) {
          const file = files[i];
          const kind = inferKindFromFile(file);
          const supported = Boolean(kind && ['image', 'video', 'audio'].includes(kind));
          const fullPath = supported ? deriveDroppedReferencePath(file, uriHints[i] || '', { kind, pageId }) : '';
          const parts = splitReferencePathParts(fullPath);
          rows.push({
            id: `${Date.now()}-${i}-${Math.random().toString(36).slice(2, 8)}`,
            index: i,
            file,
            kind,
            supported,
            mode: supported ? (defaultMode === 'embedded' ? 'embedded' : 'reference') : 'reference',
            dirPath: parts.dir,
            fileName: parts.name,
            // Kept in sync with dirPath/fileName; this is what the importer consumes.
            pathPreview: fullPath,
            status: supported ? 'Ready' : 'Unsupported file type'
          });
        }
        // Drop order follows OS/filesystem order, which is effectively arbitrary. Sort by
        // name so review order, cascade offsets and new-page order are predictable. This
        // runs after uri hints are paired above, so pairing is unaffected.
        rows.sort(compareDroppedFiles);
        return rows;
      }

      // The image's own pixel size, measured from the dropped File rather than from the
      // reference path it will be saved as. The file is in hand and always readable; the path
      // may be wrong, or point somewhere that does not exist yet.
      function readImageSize(file) {
        return new Promise((resolve) => {
          if (!file) { resolve(null); return; }
          const url = URL.createObjectURL(file);
          const probe = new Image();
          const done = (value) => {
            URL.revokeObjectURL(url);
            resolve(value);
          };
          probe.onload = () => {
            // An SVG without intrinsic dimensions reports 0, which is not a page size.
            const width = Math.round(probe.naturalWidth || 0);
            const height = Math.round(probe.naturalHeight || 0);
            done(width > 0 && height > 0 ? { width, height } : null);
          };
          probe.onerror = () => done(null);
          probe.src = url;
        });
      }

      function fileNameWithoutExtension(name) {
        const str = String(name || '').trim();
        const dot = str.lastIndexOf('.');
        return dot > 0 ? str.slice(0, dot) : str;
      }

      function updateDropReviewSummary(rows) {
        if (!els.dropReviewSummary) return;
        const supported = rows.filter((row) => row.supported);
        const embedded = supported.filter((row) => row.mode === 'embedded').length;
        const reference = supported.filter((row) => row.mode === 'reference').length;
        const images = supported.filter((row) => row.kind === 'image').length;
        const newPageMode = els.dropReviewNewPageToggle ? els.dropReviewNewPageToggle.checked : false;
        const unsupported = rows.length - supported.length;
        const destination = app.dropReviewDestination;
        const pageSizeFromImage = els.dropReviewPageSizeToggle
          ? els.dropReviewPageSizeToggle.checked
          : false;
        let summary = `Total: ${rows.length} | Supported: ${supported.length} | Embedded: ${embedded} | Reference: ${reference} | Unsupported: ${unsupported}`;
        if (newPageMode && images > 0) {
          summary += ` | ${images} image${images === 1 ? '' : 's'} → new page`;
          summary += pageSizeFromImage ? ' at its own size' : ' at the default size';
        }
        if (destination) {
          summary += ` | Into ${destination}`;
          // Only images become pages, so anything else has no destination in a chapter.
          const nonImages = supported.length - images;
          if (nonImages > 0) summary += ` | ${nonImages} non-image item${nonImages === 1 ? '' : 's'} will be skipped`;
        }
        els.dropReviewSummary.textContent = summary;
      }

      // pathPreview stays the joined dirPath + fileName so importDroppedRows has one value to read.
      function syncRowReferencePath(row) {
        if (!row) return;
        row.pathPreview = joinReferencePathParts(row.dirPath, row.fileName);
      }

      // Applies the dialog's global path to reference rows. Rows the user edited by hand keep
      // their own path unless force is set (the explicit "Apply to all" button).
      function applyGlobalDropPath(rows, dirPath, force) {
        if (!Array.isArray(rows)) return;
        for (const row of rows) {
          if (!row.supported) continue;
          if (!force && row.pathTouched) continue;
          row.dirPath = dirPath;
          syncRowReferencePath(row);
          if (row.dirInputEl) row.dirInputEl.value = dirPath;
          if (force) row.pathTouched = false;
        }
      }

      function renderDropReviewRows(rows) {
        if (!els.dropReviewList) return;
        els.dropReviewList.innerHTML = '';
        for (const row of rows) {
          const rowEl = document.createElement('div');
          rowEl.className = `drop-review-row${row.supported ? '' : ' unsupported'}`;

          const fileCell = document.createElement('div');
          fileCell.className = 'drop-review-cell';
          const fileName = document.createElement('div');
          fileName.className = 'drop-review-name';
          fileName.textContent = row.file?.name || `Item ${row.index + 1}`;
          const fileMeta = document.createElement('div');
          fileMeta.className = 'drop-review-meta';
          fileMeta.textContent = row.file?.storyBookDroppedPath || row.file?.type || 'No path metadata';
          fileCell.appendChild(fileName);
          fileCell.appendChild(fileMeta);

          const kindCell = document.createElement('div');
          kindCell.className = 'drop-review-cell drop-review-kind';
          kindCell.textContent = getDropKindLabel(row.kind);

          const modeCell = document.createElement('div');
          modeCell.className = 'drop-review-cell';
          const modeSelect = document.createElement('select');
          const refOpt = document.createElement('option');
          refOpt.value = 'reference';
          refOpt.textContent = 'Reference';
          const embOpt = document.createElement('option');
          embOpt.value = 'embedded';
          embOpt.textContent = 'Embedded';
          modeSelect.appendChild(refOpt);
          modeSelect.appendChild(embOpt);
          if (row.kind === 'image') {
            const newPageOpt = document.createElement('option');
            newPageOpt.value = 'new-page';
            newPageOpt.textContent = 'New Page';
            modeSelect.appendChild(newPageOpt);
          }
          modeSelect.value = row.mode;
          modeSelect.disabled = !row.supported;
          modeSelect.addEventListener('change', () => {
            row.mode = modeSelect.value;
            const pathDisabled = !row.supported || row.mode === 'embedded' || row.mode === 'new-page';
            pathInput.disabled = pathDisabled;
            nameInput.disabled = pathDisabled;
            updateDropReviewSummary(rows);
          });
          modeCell.appendChild(modeSelect);

          const pathCell = document.createElement('div');
          pathCell.className = 'drop-review-cell';
          const pathInput = document.createElement('input');
          pathInput.type = 'text';
          pathInput.value = row.dirPath || '';
          pathInput.placeholder = 'Folder path';
          pathInput.disabled = !row.supported || row.mode === 'embedded' || row.mode === 'new-page';
          pathInput.addEventListener('input', () => {
            row.dirPath = pathInput.value;
            // Editing a row opts it out of later global-path applications.
            row.pathTouched = true;
            syncRowReferencePath(row);
          });
          pathCell.appendChild(pathInput);
          row.dirInputEl = pathInput;

          const nameCell = document.createElement('div');
          nameCell.className = 'drop-review-cell';
          const nameInput = document.createElement('input');
          nameInput.type = 'text';
          nameInput.value = row.fileName || '';
          nameInput.placeholder = 'File name';
          nameInput.disabled = !row.supported || row.mode === 'embedded' || row.mode === 'new-page';
          nameInput.addEventListener('input', () => {
            row.fileName = nameInput.value;
            syncRowReferencePath(row);
          });
          nameCell.appendChild(nameInput);

          rowEl.appendChild(fileCell);
          rowEl.appendChild(kindCell);
          rowEl.appendChild(modeCell);
          rowEl.appendChild(pathCell);
          rowEl.appendChild(nameCell);
          els.dropReviewList.appendChild(rowEl);
        }
      }

      function closeDropReviewDialog() {
        if (els.dropReviewModal) {
          els.dropReviewModal.classList.add('hidden');
        }
      }

      // Page size only means anything when pages are being created, so the toggle follows the
      // one above it rather than sitting there offering a choice that would be ignored.
      function syncDropReviewPageSizeToggle() {
        if (!els.dropReviewPageSizeToggle) return;
        const creatingPages = els.dropReviewNewPageToggle
          ? els.dropReviewNewPageToggle.checked
          : false;
        els.dropReviewPageSizeToggle.disabled = !creatingPages;
        if (!creatingPages) els.dropReviewPageSizeToggle.checked = false;
        if (els.dropReviewPageSizeLabel) {
          els.dropReviewPageSizeLabel.classList.toggle('is-disabled', !creatingPages);
        }
      }

      function resolveDropReview(approved) {
        const state = app.dropReviewState;
        if (!state) return;
        const newPageMode = els.dropReviewNewPageToggle ? els.dropReviewNewPageToggle.checked : false;
        const pageSizeFromImage = newPageMode && els.dropReviewPageSizeToggle
          ? els.dropReviewPageSizeToggle.checked
          : false;
        app.dropReviewState = null;
        closeDropReviewDialog();
        state.resolve({ approved, rows: state.rows, newPageMode, pageSizeFromImage });
      }

      function openDropReviewDialog(rows, initialGlobalPath, options = {}) {
        const forceNewPages = Boolean(options.forceNewPages);
        app.dropReviewDestination = options.destinationName || null;
        if (!els.dropReviewModal || !els.dropReviewList || !els.dropReviewSummary) {
          return Promise.resolve({ approved: true, rows, newPageMode: forceNewPages });
        }
        if (els.dropReviewNewPageToggle) {
          // Forced on for a chapter drop: there is no page to put an element on, so new pages
          // are the only possible outcome. Disabled rather than hidden, so the rule is visible.
          els.dropReviewNewPageToggle.checked = forceNewPages;
          els.dropReviewNewPageToggle.disabled = forceNewPages;
          els.dropReviewNewPageToggle.onchange = () => {
            syncDropReviewPageSizeToggle();
            updateDropReviewSummary(rows);
          };
        }
        if (els.dropReviewPageSizeToggle) {
          els.dropReviewPageSizeToggle.checked = false;
          els.dropReviewPageSizeToggle.onchange = () => updateDropReviewSummary(rows);
        }
        syncDropReviewPageSizeToggle();
        if (els.dropReviewGlobalPath) {
          const startPath = normalizeReferencePath(initialGlobalPath || '');
          els.dropReviewGlobalPath.value = startPath;
          // Seed untouched rows so the table matches the field on open.
          applyGlobalDropPath(rows, startPath, false);
          els.dropReviewGlobalPath.oninput = () => {
            applyGlobalDropPath(rows, els.dropReviewGlobalPath.value, false);
          };
        }
        if (els.dropReviewApplyPathBtn) {
          els.dropReviewApplyPathBtn.onclick = () => {
            const value = els.dropReviewGlobalPath ? els.dropReviewGlobalPath.value : '';
            applyGlobalDropPath(rows, value, true);
          };
        }
        renderDropReviewRows(rows);
        updateDropReviewSummary(rows);
        els.dropReviewModal.classList.remove('hidden');
        app.dropReviewState = {
          rows,
          resolve: null
        };
        return new Promise((resolve) => {
          app.dropReviewState.resolve = resolve;
        });
      }

      // Swaps a label for a text input in place. Enter or blur commits, Escape cancels.
      // The caller's onCommit is responsible for history/dirty/render.
      function startInlineRename(anchorEl, currentValue, onCommit) {
        if (app.mode !== 'edit' || !anchorEl || app.inlineRenameActive) return;
        app.inlineRenameActive = true;

        const input = document.createElement('input');
        input.type = 'text';
        input.className = 'inline-rename-input';
        input.value = String(currentValue || '');
        anchorEl.style.display = 'none';
        anchorEl.parentNode.insertBefore(input, anchorEl);

        let settled = false;
        const finish = (commit) => {
          if (settled) return;
          settled = true;
          app.inlineRenameActive = false;
          const nextValue = input.value.trim();
          input.remove();
          anchorEl.style.display = '';
          if (commit && nextValue && nextValue !== String(currentValue || '')) {
            onCommit(nextValue);
          }
        };

        // Clicks inside the editor must not reach the row's select/collapse handlers.
        for (const type of ['click', 'dblclick', 'mousedown', 'contextmenu']) {
          input.addEventListener(type, (event) => event.stopPropagation());
        }
        input.addEventListener('keydown', (event) => {
          event.stopPropagation();
          if (event.key === 'Enter') {
            event.preventDefault();
            finish(true);
          } else if (event.key === 'Escape') {
            event.preventDefault();
            finish(false);
          }
        });
        input.addEventListener('blur', () => finish(true));

        input.focus();
        input.select();
      }

      function renamePageGroupTo(groupId, nextName) {
        const group = getPageGroup(groupId);
        if (!group || !nextName || nextName === group.name) return;
        captureHistory();
        group.name = nextName;
        setDirty();
        renderAll();
      }

      function renamePageTo(pageId, nextName) {
        const page = app.document.pages[pageId];
        if (!page || !nextName || nextName === page.name) return;
        captureHistory();
        page.name = nextName;
        setDirty();
        renderAll();
      }

      // ---- Structure is authoritative for order and grouping. groups/getPageGroup derive from
      // it, and pageOrder + page.groupId are one-way projections written only by
      // syncDerivedFromStructure. No other code writes those two fields. ----

      function getStructure() {
        const storyBook = app.document && app.document.storyBook;
        if (!storyBook) return [];
        if (!Array.isArray(storyBook.structure)) storyBook.structure = [];
        return storyBook.structure;
      }

      // A {id: group-item} view. The values are the actual structure items, so setting
      // group.name / group.collapsed mutates the authoritative structure directly.
      // ---- Page selection. A flat set of page ids that may span chapters; chapters themselves
      // are never selected. Normalized lazily here rather than maintained by every mutator, so
      // a deleted page cannot linger in it: filtered to pages that still exist, and always
      // returned in document order rather than the order they were clicked.
      // An icon button says what it does in three places: the tooltip, the accessible name, and
      // the visually hidden text. All three move together or they start contradicting.
      function setPageActionLabel(button, label) {
        if (!button) return;
        button.title = label;
        button.setAttribute('aria-label', label);
        const srOnly = button.querySelector('.sr-only');
        if (srOnly) srOnly.textContent = label;
      }

      function getSelectedPageIds() {
        const chosen = new Set(app.selectedPageIds);
        app.selectedPageIds = app.document.storyBook.pageOrder.filter((id) => chosen.has(id));
        return app.selectedPageIds;
      }

      function isPageSelected(pageId) {
        return getSelectedPageIds().includes(pageId);
      }

      // Which pages an action applies to. Right-clicking inside the selection acts on all of
      // it; right-clicking a row outside it acts on that row alone, which is also what the
      // caller gets by passing an explicit anchor from a surface that shows no selection.
      function getActionPageIds(anchorPageId = null) {
        const selected = getSelectedPageIds();
        if (anchorPageId && !selected.includes(anchorPageId)) return [anchorPageId];
        if (selected.length) return selected.slice();
        return app.currentPageId ? [app.currentPageId] : [];
      }

      function setPageSelection(pageIds, options = {}) {
        const chosen = new Set((pageIds || []).filter((id) => app.document.pages[id]));
        app.selectedPageIds = app.document.storyBook.pageOrder.filter((id) => chosen.has(id));
        const preferred = options.current && chosen.has(options.current)
          ? options.current
          : app.selectedPageIds[0];
        if (preferred && preferred !== app.currentPageId) {
          app.currentPageId = preferred;
          app.document.appState.currentPageId = preferred;
          app.selectedElementId = null;
        }
        if (options.anchor !== false) app.pageSelectionAnchorId = options.current || preferred || null;
      }

      // The rows a Shift+click can span: what the list actually shows, so a range never picks
      // up pages hidden inside a collapsed chapter.
      function getVisiblePageIds() {
        const visible = [];
        for (const run of getPageRuns()) {
          if (run.group && run.group.collapsed) continue;
          for (const pageId of run.pageIds) visible.push(pageId);
        }
        return visible;
      }

      function togglePageInSelection(pageId) {
        const selected = getSelectedPageIds();
        if (!selected.includes(pageId)) {
          setPageSelection([...selected, pageId], { current: pageId });
          return;
        }
        // The selection always holds the current page, so removing the last one would break
        // that invariant with nothing to fall back to.
        if (selected.length === 1) return;
        const next = selected.filter((id) => id !== pageId);
        setPageSelection(next, { current: pageId === app.currentPageId ? next[0] : app.currentPageId });
      }

      function selectPageRangeTo(pageId) {
        const visible = getVisiblePageIds();
        const anchor = visible.includes(app.pageSelectionAnchorId)
          ? app.pageSelectionAnchorId
          : app.currentPageId;
        const from = visible.indexOf(anchor);
        const to = visible.indexOf(pageId);
        if (from < 0 || to < 0) {
          setPageSelection([pageId], { current: pageId });
          return;
        }
        const range = visible.slice(Math.min(from, to), Math.max(from, to) + 1);
        // The anchor is kept, so extending the range with further Shift+clicks works from the
        // row the range started at rather than walking away from it.
        setPageSelection(range, { current: pageId, anchor: false });
      }

      function selectAllPages() {
        if (!app.document.storyBook.pageOrder.length) return;
        setPageSelection(app.document.storyBook.pageOrder.slice(), { current: app.currentPageId });
      }

      function getPageGroups() {
        const map = {};
        for (const item of getStructure()) {
          if (item && item.type === 'group') map[item.id] = item;
        }
        return map;
      }

      function getPageGroup(groupId) {
        if (!groupId) return null;
        for (const item of getStructure()) {
          if (item && item.type === 'group' && item.id === groupId) return item;
        }
        return null;
      }

      // Locate a page within the structure: top-level page-ref, or inside a group.
      function findPageLocation(pageId) {
        const structure = getStructure();
        for (let i = 0; i < structure.length; i += 1) {
          const item = structure[i];
          if (item.type === 'page' && item.id === pageId) return { topIndex: i, group: null };
          if (item.type === 'group') {
            const within = item.pages.indexOf(pageId);
            if (within >= 0) return { topIndex: i, group: item, within };
          }
        }
        return null;
      }

      function findGroupIndex(groupId) {
        return getStructure().findIndex((item) => item.type === 'group' && item.id === groupId);
      }

      // Remove a page-ref from wherever it sits. Returns its former location or null.
      function structRemovePage(pageId) {
        const loc = findPageLocation(pageId);
        if (!loc) return null;
        if (loc.group) loc.group.pages.splice(loc.within, 1);
        else getStructure().splice(loc.topIndex, 1);
        return loc;
      }

      // Insert a page-ref for pageId adjacent to afterPageId, in afterPageId's own container
      // (so it inherits that page's group). Appends at top level when the anchor is absent.
      function structInsertPageAdjacent(pageId, anchorPageId, before) {
        const structure = getStructure();
        if (anchorPageId != null) {
          const loc = findPageLocation(anchorPageId);
          if (loc) {
            if (loc.group) loc.group.pages.splice(loc.within + (before ? 0 : 1), 0, pageId);
            else structure.splice(loc.topIndex + (before ? 0 : 1), 0, { type: 'page', id: pageId });
            return;
          }
        }
        structure.push({ type: 'page', id: pageId });
      }

      // Append a page-ref at the end of a group-ref. The one placement that cannot be
      // expressed as "adjacent to a page": an empty chapter has no page to anchor to, which
      // is why it was impossible to add anything to one before this existed.
      function structAppendPageToGroup(pageId, groupId) {
        const group = getPageGroup(groupId);
        if (!group) return false;
        group.pages.push(pageId);
        return true;
      }

      // The only writer of pageOrder and page.groupId — both are projections of the structure.
      function syncDerivedFromStructure(doc = app.document) {
        const storyBook = doc && doc.storyBook;
        if (!storyBook) return;
        const structure = Array.isArray(storyBook.structure) ? storyBook.structure : [];
        const order = [];
        const groupOf = {};
        for (const item of structure) {
          if (item.type === 'group') {
            for (const pageId of item.pages) {
              if (doc.pages[pageId]) { order.push(pageId); groupOf[pageId] = item.id; }
            }
          } else if (doc.pages[item.id]) {
            order.push(item.id);
            groupOf[item.id] = null;
          }
        }
        storyBook.pageOrder = order;
        for (const page of Object.values(doc.pages)) {
          if (page && typeof page === 'object') {
            page.groupId = Object.prototype.hasOwnProperty.call(groupOf, page.id) ? groupOf[page.id] : null;
          }
        }
      }

      // Legacy migration: build an authoritative structure from an old pageOrder + groupId +
      // groups map. Group metadata (name, collapsed) is folded into the group-refs, since the
      // separate groups map no longer exists once structure is authoritative.
      function rebuildStructureFromLegacy(doc) {
        const storyBook = doc && doc.storyBook;
        if (!storyBook) return [];
        const pageOrder = storyBook.pageOrder || [];
        const pages = doc.pages || {};
        const legacyGroups = storyBook.groups || {};
        const structure = [];
        // A group id maps to its single structure item. Reusing it means a non-contiguous
        // legacy group (a page of the group separated from the rest — a quirk the old model
        // permitted) is repaired into one contiguous group at its first occurrence, rather than
        // producing two group-refs sharing an id.
        const groupRefById = new Map();
        for (const pageId of pageOrder) {
          const page = pages[pageId];
          if (!page) continue;
          const groupId = page.groupId || null;
          if (groupId && legacyGroups[groupId]) {
            let groupRef = groupRefById.get(groupId);
            if (!groupRef) {
              const meta = legacyGroups[groupId];
              groupRef = {
                type: 'group', id: groupId,
                name: String(meta.name || 'Chapter'), collapsed: Boolean(meta.collapsed), pages: []
              };
              groupRefById.set(groupId, groupRef);
              structure.push(groupRef);
            }
            groupRef.pages.push(pageId);
          } else {
            structure.push({ type: 'page', id: pageId });
          }
        }
        storyBook.structure = structure;
        return structure;
      }

      // Validate/repair a stored structure: well-form group-refs, drop refs to missing pages,
      // and ensure every page in the map appears exactly once (orphans appended at top level).
      function normalizeStructure(doc) {
        const storyBook = doc.storyBook;
        const pages = doc.pages || {};
        // Fallback source for group metadata when a stored group-ref lacks it (e.g. an early
        // structure format that kept name/collapsed only in the separate groups map).
        const legacyGroups = storyBook.groups || {};
        const seen = new Set();
        const clean = [];
        for (const item of Array.isArray(storyBook.structure) ? storyBook.structure : []) {
          if (!item || typeof item !== 'object') continue;
          if (item.type === 'group') {
            const groupPages = [];
            for (const pageId of Array.isArray(item.pages) ? item.pages : []) {
              if (pages[pageId] && !seen.has(pageId)) { seen.add(pageId); groupPages.push(pageId); }
            }
            const meta = legacyGroups[item.id] || {};
            clean.push({
              type: 'group',
              id: item.id || createId('group'),
              name: String(item.name || meta.name || 'Chapter'),
              collapsed: Boolean(item.collapsed !== undefined ? item.collapsed : meta.collapsed),
              pages: groupPages
            });
          } else if (item.type === 'page') {
            if (pages[item.id] && !seen.has(item.id)) { seen.add(item.id); clean.push({ type: 'page', id: item.id }); }
          }
        }
        // Any page not referenced anywhere is appended so nothing is silently lost.
        for (const pageId of Object.keys(pages)) {
          if (!seen.has(pageId)) clean.push({ type: 'page', id: pageId });
        }
        storyBook.structure = clean;
        return clean;
      }

      // Contiguous runs derived from the structure. A group-ref is one run; a maximal sequence
      // of adjacent page-refs is one ungrouped run.
      function getPageRuns() {
        const runs = [];
        let idx = 0;
        let ungrouped = null;
        for (const item of getStructure()) {
          if (item.type === 'group') {
            ungrouped = null;
            const pageIds = (item.pages || []).filter((id) => app.document.pages[id]);
            runs.push({ groupId: item.id, group: item, pageIds, startIndex: idx, endIndex: idx + pageIds.length - 1 });
            idx += pageIds.length;
          } else {
            if (!app.document.pages[item.id]) continue;
            if (!ungrouped) {
              ungrouped = { groupId: null, group: null, pageIds: [], startIndex: idx };
              runs.push(ungrouped);
            }
            ungrouped.pageIds.push(item.id);
            ungrouped.endIndex = idx;
            idx += 1;
          }
        }
        return runs;
      }

      // Rebuild the whole structure from an ordered list of runs (used by run reordering).
      // Group metadata is taken from each run's group-ref so name/collapsed survive.
      function rebuildStructureFromRuns(runs) {
        const structure = [];
        for (const run of runs) {
          if (run.groupId) {
            structure.push({
              type: 'group', id: run.groupId,
              name: run.group ? run.group.name : 'Chapter',
              collapsed: run.group ? Boolean(run.group.collapsed) : false,
              pages: [...run.pageIds]
            });
          } else {
            for (const pageId of run.pageIds) structure.push({ type: 'page', id: pageId });
          }
        }
        app.document.storyBook.structure = structure;
      }

      // Empty groups are pruned during this stage to preserve current behavior; a later stage
      // removes this so scaffold-first empty chapters can persist.

      // Wrap a single page in a new group in place.
      // Moves a page into a chapter created for it. Framed as a move rather than a creation
      // because that is what it does: the page leaves wherever it was. The new chapter lands as
      // close to the page's old position as possible — in its slot when the page was ungrouped,
      // or directly after its former chapter when it was not.
      function movePageToNewChapter(seedPageId) {
        movePagesToNewChapter([seedPageId]);
      }

      // With several pages this is the gather operation: scattered pages, even across chapters,
      // collected into one new chapter. The chapter takes the position of the first of them in
      // document order, which extends the single-page rule of landing where the page was.
      function movePagesToNewChapter(pageIds) {
        if (app.mode !== 'edit') return;
        const order = app.document.storyBook.pageOrder;
        const movers = order.filter((id) => (pageIds || []).includes(id));
        const seedPageId = movers[0] || app.currentPageId;
        const page = app.document.pages[seedPageId];
        if (!page) return;
        captureHistory();
        const members = movers.length ? movers.slice() : [page.id];
        // Every page but the seed is pulled out of its old container first. Doing it afterwards
        // would mean looking each page up while it already sits in the new chapter, and
        // findPageLocation returns the first match — so a page positioned after the new chapter
        // would resolve to it and be left behind as a second, duplicate ref.
        for (const pageId of members) {
          if (pageId !== seedPageId) structRemovePage(pageId);
        }
        const groupCount = getStructure().filter((item) => item.type === 'group').length;
        const groupItem = {
          type: 'group', id: createId('group'),
          name: `Chapter ${groupCount + 1}`, collapsed: false, pages: members
        };
        // The seed is still where it was, so the chapter can take its place.
        const loc = findPageLocation(page.id);
        if (loc && !loc.group) {
          getStructure().splice(loc.topIndex, 1, groupItem);
        } else if (loc && loc.group) {
          loc.group.pages.splice(loc.within, 1);
          getStructure().splice(findGroupIndex(loc.group.id) + 1, 0, groupItem);
        } else {
          getStructure().push(groupItem);
        }
        syncDerivedFromStructure();
        setDirty();
        renderAll();
        els.statusText.textContent = groupItem.pages.length > 1
          ? `Moved ${groupItem.pages.length} pages to ${groupItem.name}`
          : `Moved ${page.name} to ${groupItem.name}`;
        // The moment the chapter exists is the moment its name is known, so the auto-assigned
        // one is offered for typing over rather than left for a later double-click.
        startInlineRenameForGroup(groupItem.id);
      }

      // Opens the inline rename editor on a chapter header that has just been rendered. The
      // header is rebuilt by renderAll, so it can only be found afterwards, by id.
      function startInlineRenameForGroup(groupId) {
        const group = getPageGroup(groupId);
        if (!group) return;
        const label = els.pageList.querySelector(`[data-group-id="${groupId}"] .page-group-label`);
        if (!label) return;
        startInlineRename(label, group.name, (nextName) => renamePageGroupTo(groupId, nextName));
      }

      // Scaffold-first: append a new empty chapter. Pages are dragged in afterwards. This is
      // possible only because structure is authoritative — an empty group has no pages to
      // position it, so it could not exist in the old pageOrder-derived model.
      function createEmptyPageGroup() {
        if (app.mode !== 'edit') return;
        captureHistory();
        const groupCount = getStructure().filter((item) => item.type === 'group').length;
        const groupItem = {
          type: 'group', id: createId('group'),
          name: `Chapter ${groupCount + 1}`, collapsed: false, pages: []
        };
        getStructure().push(groupItem);
        syncDerivedFromStructure();
        setDirty();
        renderAll();
        els.statusText.textContent = `Created empty ${groupItem.name}`;
      }

      // Add a page at the end of a chapter, whether or not it already has pages. A collapsed
      // chapter is expanded first, since the new page becomes current and would otherwise be
      // hidden. Expanding before createPage's captureHistory keeps it out of the undo step,
      // matching how collapse state is treated everywhere else.
      function addPageToGroup(groupId) {
        if (app.mode !== 'edit') return;
        const group = getPageGroup(groupId);
        if (!group) return;
        if (group.collapsed) group.collapsed = false;
        createPage(null, { intoGroupId: groupId });
        els.statusText.textContent = `Added a page to ${group.name}`;
      }

      // Paste is the third way to put content in a chapter, beside a new page and dropped image
      // files. Expanding first for the same reason: the pasted pages become the selection, and
      // would otherwise land somewhere the user cannot see.
      function pasteIntoGroup(groupId) {
        if (app.mode !== 'edit') return;
        const group = getPageGroup(groupId);
        if (!group || !app.clipboardPages.length) return;
        if (group.collapsed) group.collapsed = false;
        pasteClipboardPage({ intoGroupId: groupId });
      }

      // Removes the grouping, never the pages: the group-ref is replaced by its page-refs
      // in place, so the pages keep their position. An empty group is simply removed.
      function deletePageGroup(groupId) {
        if (app.mode !== 'edit') return;
        const groupIndex = findGroupIndex(groupId);
        if (groupIndex < 0) return;
        const group = getStructure()[groupIndex];
        captureHistory();
        const pageRefs = group.pages.map((id) => ({ type: 'page', id }));
        getStructure().splice(groupIndex, 1, ...pageRefs);
        syncDerivedFromStructure();
        setDirty();
        renderAll();
        els.statusText.textContent = `Removed ${group.name}; its pages were kept`;
      }

      function setPageGroup(pageId, groupId) {
        setPagesGroup([pageId], groupId);
      }

      // Move pages into a chapter (appended) or out of one. Leaving a chapter places the page as
      // a top-level ref immediately after that chapter, so the chapter stays contiguous.
      // A batch may span chapters, so each page is judged against its own container.
      function setPagesGroup(pageIds, groupId) {
        if (app.mode !== 'edit') return;
        const target = groupId && getPageGroup(groupId) ? groupId : null;
        // Pages already where they are being sent are skipped, so a mixed selection moves only
        // what actually needs moving and a no-op batch captures no history.
        const movers = (pageIds || []).filter((id) => {
          if (!app.document.pages[id]) return false;
          const loc = findPageLocation(id);
          return (loc && loc.group ? loc.group.id : null) !== target;
        });
        if (!movers.length) return;
        captureHistory();
        for (const pageId of movers) {
          const loc = findPageLocation(pageId);
          const fromGroup = loc && loc.group ? loc.group : null;
          structRemovePage(pageId);
          if (target) {
            getPageGroup(target).pages.push(pageId);
          } else if (fromGroup) {
            // Inserted one past the chapter each time, so a batch leaving together keeps its
            // order rather than reversing as each page is placed at the same index.
            const at = findGroupIndex(fromGroup.id) + 1;
            let offset = 0;
            const structure = getStructure();
            while (structure[at + offset] && structure[at + offset].type === 'page'
              && movers.includes(structure[at + offset].id)) offset += 1;
            structure.splice(at + offset, 0, { type: 'page', id: pageId });
          } else {
            getStructure().push({ type: 'page', id: pageId });
          }
        }
        syncDerivedFromStructure();
        setDirty();
        renderAll();
        if (movers.length > 1) {
          const where = target ? getPageGroup(target).name : 'no chapter';
          els.statusText.textContent = `Moved ${movers.length} pages to ${where}`;
        }
      }

      function togglePageGroupCollapsed(groupId) {
        const group = getPageGroup(groupId);
        if (!group) return;
        group.collapsed = !group.collapsed;
        // Collapse state is view preference; it persists with the document but is not a
        // structural edit, so it does not capture history.
        setDirty();
        renderPageList();
      }

      function movePageRunToRunIndex(fromRunIndex, toRunIndex) {
        const runs = getPageRuns();
        if (fromRunIndex < 0 || fromRunIndex >= runs.length) return;
        if (toRunIndex < 0 || toRunIndex >= runs.length) return;
        if (fromRunIndex === toRunIndex) return;
        captureHistory();
        const moved = runs.splice(fromRunIndex, 1)[0];
        runs.splice(toRunIndex, 0, moved);
        rebuildStructureFromRuns(runs);
        syncDerivedFromStructure();
        setDirty();
        renderAll();
      }

      function movePageGroupByOffset(groupId, offset) {
        const runs = getPageRuns();
        const fromRunIndex = runs.findIndex((run) => run.groupId === groupId);
        if (fromRunIndex < 0) return;
        movePageRunToRunIndex(fromRunIndex, fromRunIndex + offset);
      }

      function insertPageAfter(afterPageId, newPage) {
        // Inserted into the anchor page's container, so it inherits that page's group. groupId
        // is derived, so any value carried on newPage is ignored in favour of the structure.
        app.document.pages[newPage.id] = newPage;
        structInsertPageAdjacent(newPage.id, afterPageId, false);
        syncDerivedFromStructure();
      }

      async function importDroppedRows(rows, page, basePoint, newPageMode, options = {}) {
        const intoGroupId = options.intoGroupId || null;
        // Each new page takes its own image's pixel size instead of the book's default, which
        // is what a book of scans or screenshots wants: one page per image, at its own size.
        const pageSizeFromImage = Boolean(options.pageSizeFromImage) && newPageMode;
        let addedCount = 0;
        let newPageCount = 0;
        let skippedCount = 0;
        let sizedFromImageCount = 0;
        let unmeasuredCount = 0;
        let mutationStarted = false;
        // Each new page is inserted after the previous one, so the batch keeps its order. The
        // seed decides where the batch begins: the current page for a canvas drop, or the
        // chapter's last page for a chapter drop, which appends to the end of that chapter.
        let lastInsertedPageId = page ? page.id : null;
        if (intoGroupId) {
          const group = getPageGroup(intoGroupId);
          lastInsertedPageId = group && group.pages.length ? group.pages[group.pages.length - 1] : null;
        }

        for (let i = 0; i < rows.length; i += 1) {
          const row = rows[i];
          if (!row.supported) {
            skippedCount += 1;
            continue;
          }

          if (!mutationStarted) {
            captureHistory();
            mutationStarted = true;
          }

          if (newPageMode && row.kind === 'image') {
            try {
              let docWidth = Number(app.document.storyBook.width || 1200);
              let docHeight = Number(app.document.storyBook.height || 800);
              if (pageSizeFromImage) {
                const measured = await readImageSize(row.file);
                if (measured) {
                  docWidth = measured.width;
                  docHeight = measured.height;
                  sizedFromImageCount += 1;
                } else {
